function useLS(key,def){
  const[v,setV]=useState(()=>{
    try{const s=localStorage.getItem(key);return s?JSON.parse(s):def;}catch{return def;}
  });
  const set=useCallback(val=>{
    setV(prev=>{
      const next=typeof val==='function'?val(prev):val;
      try{localStorage.setItem(key,JSON.stringify(next));}catch{}
      return next;
    });
  },[key]);
  return[v,set];
}

// ── APP ─────────────────────────────────────────────────────────────────────
// ── LOCK SCREEN ──────────────────────────────────────────────────────────────
const PASSCODE_KEY='fin2_passcode';
const GDRIVE_TOKEN_KEY='fin2_gdrive_token';
const GDRIVE_FILE_KEY='fin2_gdrive_fileid';
const BACKUP_FILENAME='breeks_finance_data.json';
const DATA_KEYS=['fin2_entries','fin2_accounts','fin2_custom_cats','fin2_budgets','fin2_liabilities','fin2_plans','fin2_company'];
const CLIENT_ID='';// Set your Google OAuth Client ID here
const SCOPES='https://www.googleapis.com/auth/drive.appdata https://www.googleapis.com/auth/drive.file';
const AUTO_LOCK_MINUTES=10;

// ── GOOGLE DRIVE SYNC ────────────────────────────────────────────────────────
const GDrive={
  getToken:()=>localStorage.getItem(GDRIVE_TOKEN_KEY),
  setToken:(t)=>localStorage.setItem(GDRIVE_TOKEN_KEY,t),
  clearToken:()=>localStorage.removeItem(GDRIVE_TOKEN_KEY),
  getFileId:()=>localStorage.getItem(GDRIVE_FILE_KEY),
  setFileId:(id)=>localStorage.setItem(GDRIVE_FILE_KEY,id),

  async signIn(){
    return new Promise((resolve,reject)=>{
      if(!CLIENT_ID){reject(new Error('NO_CLIENT_ID'));return;}
      if(typeof google==='undefined'||!google.accounts){reject(new Error('GAPI_NOT_LOADED'));return;}
      const client=google.accounts.oauth2.initTokenClient({
        client_id:CLIENT_ID,scope:SCOPES,
        callback:(resp)=>{
          if(resp.error){reject(new Error(resp.error));return;}
          GDrive.setToken(resp.access_token);resolve(resp.access_token);
        }
      });
      client.requestAccessToken();
    });
  },

  async request(method,url,body,token){
    const headers={'Authorization':'Bearer '+(token||GDrive.getToken())};
    if(body&&!(body instanceof FormData))headers['Content-Type']='application/json';
    const res=await fetch(url,{method,headers,body:body instanceof FormData?body:body?JSON.stringify(body):undefined});
    if(res.status===401){GDrive.clearToken();throw new Error('TOKEN_EXPIRED');}
    return res;
  },

  async findFile(token){
    const res=await GDrive.request('GET',
      `https://www.googleapis.com/drive/v3/files?q=name='${BACKUP_FILENAME}'+and+trashed=false&fields=files(id,name,modifiedTime)&spaces=drive`,
      null,token);
    const data=await res.json();
    return data.files&&data.files.length>0?data.files[0]:null;
  },

  async saveData(token){
    const payload={};
    DATA_KEYS.forEach(k=>{const v=localStorage.getItem(k);if(v)payload[k]=v;});
    payload._savedAt=new Date().toISOString();
    payload._version=2;
    const content=JSON.stringify(payload);
    const fileId=GDrive.getFileId();
    let res;
    if(fileId){
      // Update existing
      const form=new FormData();
      form.append('metadata',new Blob([JSON.stringify({name:BACKUP_FILENAME})],{type:'application/json'}));
      form.append('file',new Blob([content],{type:'application/json'}));
      res=await GDrive.request('PATCH',
        `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`,form,token);
    } else {
      // Create new
      const form=new FormData();
      form.append('metadata',new Blob([JSON.stringify({name:BACKUP_FILENAME})],{type:'application/json'}));
      form.append('file',new Blob([content],{type:'application/json'}));
      res=await GDrive.request('POST',
        'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',form,token);
      const created=await res.json();
      if(created.id)GDrive.setFileId(created.id);
    }
    return res.ok;
  },

  async loadData(token){
    let file=null;
    const fileId=GDrive.getFileId();
    if(fileId){
      // Try known file first
      try{
        const res=await GDrive.request('GET',`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,null,token);
        if(res.ok){file=await res.json();}
      }catch(e){}
    }
    if(!file){
      // Search for it
      const found=await GDrive.findFile(token);
      if(found){
        GDrive.setFileId(found.id);
        const res=await GDrive.request('GET',`https://www.googleapis.com/drive/v3/files/${found.id}?alt=media`,null,token);
        if(res.ok)file=await res.json();
      }
    }
    if(file){
      DATA_KEYS.forEach(k=>{if(file[k])localStorage.setItem(k,file[k]);});
      return{ok:true,savedAt:file._savedAt};
    }
    return{ok:false};
  }
};


function LockScreen({onUnlock}){
  const savedCode=localStorage.getItem(PASSCODE_KEY)||'';
  const needsSetup=!savedCode;

  const[step,setStep]=useState(needsSetup?'new':'enter');
  const[input,setInput]=useState('');
  const[confirm,setConfirm]=useState('');
  const[error,setError]=useState('');
  const[shake,setShake]=useState(false);

  const doShake=()=>{setShake(true);setTimeout(()=>setShake(false),500);};

  const handleKey=(digit)=>{
    setError('');
    if(digit==='del'){
      if(step==='confirm') setConfirm(p=>p.slice(0,-1));
      else setInput(p=>p.slice(0,-1));
      return;
    }

    if(step==='enter'){
      const next=input+digit;
      setInput(next);
      if(next.length===4){
        if(next===savedCode){ onUnlock(); }
        else{ setError('Wrong passcode. Try again.');setInput('');doShake(); }
      }
    }
    else if(step==='new'){
      const next=input+digit;
      setInput(next);
      if(next.length===4){ setStep('confirm'); }
    }
    else if(step==='confirm'){
      const next=confirm+digit;
      setConfirm(next);
      if(next.length===4){
        if(next===input){
          localStorage.setItem(PASSCODE_KEY,input);
          onUnlock();
        } else {
          setError("Passcodes don't match. Start over.");
          setInput('');setConfirm('');setStep('new');doShake();
        }
      }
    }
  };

  const current=step==='confirm'?confirm:input;
  const titles={enter:'🔒 Enter Passcode',new:'🔑 Set New Passcode',confirm:'✅ Confirm Passcode'};
  const subs={enter:'Enter your 4-digit PIN',new:'Choose a 4-digit PIN',confirm:'Re-enter your PIN to confirm'};

  return(
    <div style={{position:'fixed',inset:0,background:'#0a0820',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',zIndex:9999,fontFamily:'Arial,sans-serif'}}>
      <div style={{marginBottom:28,textAlign:'center'}}>
        <div style={{fontSize:44,marginBottom:8}}>💰</div>
        <div style={{fontSize:22,fontWeight:900,color:'#fff',letterSpacing:1}}>BREEKS Finance</div>
        <div style={{fontSize:12,color:'#475569',marginTop:3}}>Digital Marketing Services</div>
      </div>

      <div style={{background:'#131035',border:'1px solid #2d2a5e',borderRadius:20,padding:'28px 24px',width:290,textAlign:'center',
        animation:shake?'shake .4s ease':'none'}}
        onAnimationEnd={()=>setShake(false)}>
        <style>{`@keyframes shake{0%,100%{transform:translateX(0)}15%,45%,75%{transform:translateX(-8px)}30%,60%,90%{transform:translateX(8px)}}`}</style>

        <div style={{fontSize:15,fontWeight:800,color:'#f1f5f9',marginBottom:3}}>{titles[step]}</div>
        <div style={{fontSize:11,color:'#64748b',marginBottom:22}}>{subs[step]}</div>

        {/* 4 dots */}
        <div style={{display:'flex',gap:14,justifyContent:'center',marginBottom:24}}>
          {[0,1,2,3].map(i=>(
            <div key={i} style={{
              width:14,height:14,borderRadius:'50%',transition:'all .15s',
              background:i<current.length?'#00c4d4':'transparent',
              border:`2px solid ${i<current.length?'#00c4d4':'#334155'}`,
              transform:i<current.length?'scale(1.2)':'scale(1)',
            }}/>
          ))}
        </div>

        {error&&<div style={{fontSize:11,color:'#ef4444',marginBottom:12,fontWeight:600,padding:'6px 10px',background:'rgba(239,68,68,.1)',borderRadius:6}}>{error}</div>}

        {/* Numpad */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:16}}>
          {[1,2,3,4,5,6,7,8,9,'',0,'del'].map((k,i)=>(
            k===''
              ?<div key={i}/>
              :<button key={i} onClick={()=>handleKey(String(k))}
                style={{padding:'15px 0',background:k==='del'?'rgba(239,68,68,.1)':'rgba(255,255,255,.04)',
                  border:`1px solid ${k==='del'?'rgba(239,68,68,.3)':'#1e293b'}`,borderRadius:10,
                  color:k==='del'?'#ef4444':'#f1f5f9',fontSize:k==='del'?13:19,
                  fontWeight:700,cursor:'pointer',fontFamily:'inherit',transition:'background .1s'}}
                onMouseEnter={e=>e.currentTarget.style.background=k==='del'?'rgba(239,68,68,.2)':'rgba(255,255,255,.09)'}
                onMouseLeave={e=>e.currentTarget.style.background=k==='del'?'rgba(239,68,68,.1)':'rgba(255,255,255,.04)'}>
                {k==='del'?'⌫':k}
              </button>
          ))}
        </div>

        {step==='enter'&&(
          <button onClick={()=>{
            if(window.confirm('Reset passcode? You will set a new one now.')){
              localStorage.removeItem(PASSCODE_KEY);
              setStep('new');setInput('');setConfirm('');setError('');
            }
          }} style={{background:'transparent',border:'none',color:'#475569',fontSize:11,cursor:'pointer',textDecoration:'underline'}}>
            Forgot passcode? Reset
          </button>
        )}
      </div>
    </div>
  );
}

function App(){
  const[locked,setLocked]=useState(true);

  // ── CTRL+S GLOBAL SAVE ──────────────────────────────────────────────────
  useEffect(()=>{
    const handleKeyDown=(e)=>{
      if((e.ctrlKey||e.metaKey)&&e.key==='s'){
        e.preventDefault();
        if(GDrive.getToken())driveSave();
        showBadge();
      }
    };
    window.addEventListener('keydown',handleKeyDown);
    return()=>window.removeEventListener('keydown',handleKeyDown);
  },[locked]);

  // ── AUTO-LOCK TIMER ──────────────────────────────────────────────────────
  const lockTimer=useRef(null);
  const resetLockTimer=useCallback(()=>{
    if(lockTimer.current)clearTimeout(lockTimer.current);
    lockTimer.current=setTimeout(()=>setLocked(true),AUTO_LOCK_MINUTES*60*1000);
  },[]);
  useEffect(()=>{
    if(locked)return;
    resetLockTimer();
    const events=['mousedown','keydown','touchstart','scroll'];
    events.forEach(e=>window.addEventListener(e,resetLockTimer,{passive:true}));
    return()=>{
      if(lockTimer.current)clearTimeout(lockTimer.current);
      events.forEach(e=>window.removeEventListener(e,resetLockTimer));
    };
  },[locked,resetLockTimer]);

  // ── GOOGLE DRIVE SYNC ────────────────────────────────────────────────────
  const[driveStatus,setDriveStatus]=useState('idle'); // idle|connecting|syncing|synced|error|no_client_id
  const[driveMsg,setDriveMsg]=useState('');
  const[lastSync,setLastSync]=useState(localStorage.getItem('fin2_last_sync')||'');
  const[showDriveSetup,setShowDriveSetup]=useState(false);
  const[clientIdInput,setClientIdInput]=useState(localStorage.getItem('fin2_client_id')||'');

  // Check if client ID configured
  const getClientId=()=>localStorage.getItem('fin2_client_id')||'';

  const driveSignIn=async()=>{
    const cid=getClientId();
    if(!cid){setShowDriveSetup(true);return;}
    setDriveStatus('connecting');setDriveMsg('Connecting to Google…');
    try{
      // Temporarily set CLIENT_ID from stored value
      const origInit=window._driveClientId;
      window._driveClientId=cid;
      const token=await new Promise((resolve,reject)=>{
        if(typeof google==='undefined'||!google.accounts){reject(new Error('GAPI_NOT_LOADED'));return;}
        const client=google.accounts.oauth2.initTokenClient({
          client_id:cid,scope:SCOPES,
          callback:(resp)=>{if(resp.error)reject(new Error(resp.error));else{GDrive.setToken(resp.access_token);resolve(resp.access_token);}}
        });
        client.requestAccessToken();
      });
      setDriveStatus('syncing');setDriveMsg('Loading from Drive…');
      const result=await GDrive.loadData(token);
      if(result.ok){
        const ts=new Date().toLocaleString('en-PH');
        setLastSync(ts);localStorage.setItem('fin2_last_sync',ts);
        setDriveStatus('synced');setDriveMsg('Loaded from Drive ✅');
        // Force reload data from localStorage into React state
        window.location.reload();
      } else {
        // No file yet — save current data
        await GDrive.saveData(token);
        const ts=new Date().toLocaleString('en-PH');
        setLastSync(ts);localStorage.setItem('fin2_last_sync',ts);
        setDriveStatus('synced');setDriveMsg('Saved to Drive ✅ (new file created)');
      }
    }catch(e){
      if(e.message==='GAPI_NOT_LOADED'){setDriveStatus('error');setDriveMsg('Google API not loaded. Try refreshing.');}
      else{setDriveStatus('error');setDriveMsg('Connection failed: '+e.message);}
    }
  };

  const driveSave=async()=>{
    const token=GDrive.getToken();
    if(!token){driveSignIn();return;}
    setDriveStatus('syncing');setDriveMsg('Saving to Drive…');
    try{
      const ok=await GDrive.saveData(token);
      if(ok){const ts=new Date().toLocaleString('en-PH');setLastSync(ts);localStorage.setItem('fin2_last_sync',ts);setDriveStatus('synced');setDriveMsg('Saved ✅');}
      else{setDriveStatus('error');setDriveMsg('Save failed');}

    if(cid&&token){

      setDriveStatus('syncing');setDriveMsg('Auto-syncing…');
      GDrive.loadData(token).then(result=>{
        if(result.ok){
          const ts=new Date().toLocaleString('en-PH');
          setLastSync(ts);localStorage.setItem('fin2_last_sync',ts);
          setDriveStatus('synced');setDriveMsg('Drive Synced ✅');
        } else {
          // File not found yet — save current data
          GDrive.saveData(token).then(ok=>{
            if(ok){
              const ts=new Date().toLocaleString('en-PH');
              setLastSync(ts);localStorage.setItem('fin2_last_sync',ts);
              setDriveStatus('synced');setDriveMsg('Drive Synced ✅');
            }
          });

          // Token expired — try silent re-auth
          GDrive.clearToken();
          setDriveStatus('idle');setDriveMsg('Session expired — tap to reconnect');
        } else {
          setDriveStatus('error');setDriveMsg('Auto-sync failed');
        }
      });

            {last7.days.map((day,i)=>{

                  {(last7.inc[i]>0||last7.exp[i]>0)&&<div style={{fontSize:7,color:last7.inc[i]>last7.exp[i]?'#22c55e':'#ef4444',marginTop:1}}>
                    {last7.inc[i]>0&&last7.exp[i]>0?`+${(last7.inc[i]/1000).toFixed(1)}k`:`${last7.inc[i]>0?'+':'-'}${(Math.max(last7.inc[i],last7.exp[i])/1000).toFixed(1)}k`}

          <div style={{display:'flex',gap:14,marginTop:8,fontSize:10,color:'var(--muted)'}}>
            <span><span style={{display:'inline-block',width:8,height:8,borderRadius:2,background:'#22c55e',marginRight:4}}/>Income</span>
            <span><span style={{display:'inline-block',width:8,height:8,borderRadius:2,background:'#ef4444',marginRight:4}}/>Expense</span>

        {/* Recent entries */}
        <div className="card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div style={{fontWeight:800,fontSize:13,color:'#fff'}}>🕐 Recent Entries</div>
            <button onClick={()=>{setFilterGroup(grp);setView('journal');}} style={{fontSize:11,color:accent,background:'transparent',border:'none',cursor:'pointer',fontWeight:700}}>View All →</button>

          {grpEntries.length===0&&<div style={{textAlign:'center',color:'var(--muted)',fontSize:12,padding:20}}>No {grp} entries yet. Tap ＋ to add!</div>}
        </div>

  // ── ENTRY ROW ──────────────────────────────────────────────────────────────
  const EntryRow=({e})=>{
    const info=CAT_TYPE[e.category]||{};
    const typ=info.type||e.type||'income';
    const acc=accounts.find(a=>a.id===e.accountId);
    return(
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 0',borderBottom:'1px solid var(--border)'}}>
        <div style={{width:34,height:34,borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,background:typ==='income'?'rgba(34,197,94,.12)':'rgba(239,68,68,.12)',fontSize:16}}>
          {typ==='income'?'⬆️':'⬇️'}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,fontWeight:700,color:'#f1f5f9',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.category}</div>
          <div style={{fontSize:10,color:'var(--muted)'}}>{fmtShort(e.date)}{acc?' · '+acc.icon+' '+acc.name:''}{e.note?' · '+e.note:''}</div>
        </div>
        <div style={{textAlign:'right',flexShrink:0}}>
          <div style={{fontSize:13,fontWeight:900,color:typ==='income'?'#22c55e':'#ef4444'}}>{typ==='income'?'+':'-'}{peso(e.amount)}</div>
        </div>
        <div style={{display:'flex',gap:4,flexShrink:0}}>
          <button onClick={()=>openEdit(e)} style={{width:24,height:24,background:'rgba(168,85,247,.12)',border:'1px solid #a855f7',color:'#c084fc',borderRadius:4,cursor:'pointer',fontSize:10}}>✏️</button>
          <button onClick={()=>deleteEntry(e.id)} style={{width:24,height:24,background:'rgba(239,68,68,.1)',border:'1px solid #ef4444',color:'#ef4444',borderRadius:4,cursor:'pointer',fontSize:10}}>✕</button>
        </div>
      </div>
    );
  };

  // ── JOURNAL VIEW ───────────────────────────────────────────────────────────
  const JournalView=()=>{
    // Each row = one journal line; blank rows at bottom for new entry
    const BLANK_ROWS = 8; // always show N empty lines at bottom
    const[activeCell,setActiveCell]=useState(null); // {rowId, col}
    const[editingVal,setEditingVal]=useState('');

    const headerGreen='#4caf50';
    const lightGreen='#e8f5e9';
    const darkGreen='#2e7d32';
    const borderClr='#c8e6c9';
    const COL='38px 100px 170px 1fr 130px 130px 130px 80px';

    // Sort oldest→newest for running balance
    const sortedEntries=useMemo(()=>[...entries].sort((a,b)=>a.date.localeCompare(b.date)||a.id.localeCompare(b.id)),[entries]);

    const filtered=useMemo(()=>sortedEntries.filter(e=>{
      const info=CAT_TYPE[e.category]||{};
      const grp=e.group||info.group||'business';
      const typ=info.type||e.type||'income';
      if(filterGroup!=='all'&&grp!==filterGroup)return false;
      if(filterType!=='all'&&typ!==filterType)return false;
      if(filterAcc!=='all'&&e.accountId!==filterAcc)return false;
      if(searchQ&&!(e.category+(e.note||'')+(e.amount||'')).toLowerCase().includes(searchQ.toLowerCase()))return false;
      return true;
    }),[sortedEntries,filterGroup,filterType,filterAcc,searchQ]);

    const openingBal=useMemo(()=>{
      if(filterAcc!=='all'){const a=accounts.find(x=>x.id===filterAcc);return parseFloat(a?.openingBalance)||0;}
      return accounts.reduce((s,a)=>s+(parseFloat(a.openingBalance)||0),0);
    },[filterAcc,accounts]);

    const rows=useMemo(()=>{
      let bal=openingBal;
      return filtered.map(e=>{
        const info=CAT_TYPE[e.category]||{};
        const typ=info.type||e.type||'income';
        const isInc=typ==='income';
        bal=isInc?bal+(parseFloat(e.amount)||0):bal-(parseFloat(e.amount)||0);
        return{...e,typ,isInc,runBal:bal};
      });
    },[filtered,openingBal]);

    const totInc=rows.filter(r=>r.isInc).reduce((s,r)=>s+(r.amount||0),0);
    const totExp=rows.filter(r=>!r.isInc).reduce((s,r)=>s+(r.amount||0),0);
    const closingBal=rows.length>0?rows[rows.length-1].runBal:openingBal;

    // Blank row state — keyed by index
    const[blankRows,setBlankRows]=useState(()=>
      Array.from({length:BLANK_ROWS},(_,i)=>({_bid:'b'+i,date:today(),accountId:'',category:'',note:'',amount:'',type:'income',group:'business'}))
    );

    const updateBlank=(bid,field,val)=>{
      setBlankRows(rows=>{
        const updated=rows.map(r=>{
          if(r._bid!==bid)return r;
          if(field==='category'){
            const info=CAT_TYPE[val]||{};
            return{...r,category:val,type:info.type||r.type,group:info.group||r.group};
          }
          return{...r,[field]:val};
        });
        // If user typed in last blank row, add another
        const lastIdx=updated.length-1;
        if(updated[lastIdx]._bid===bid&&(field==='amount'||field==='note'))
          return[...updated,{_bid:'b'+Date.now(),date:today(),accountId:'',category:'',note:'',amount:'',type:'income',group:'business'}];
        return updated;
      });
    };

    const saveBlankRow=(bid)=>{
      const r=blankRows.find(x=>x._bid===bid);
      if(!r||!r.accountId||!r.category||!r.amount||parseFloat(r.amount)<=0)return;
      const info=CAT_TYPE[r.category]||{};
      const e={...r,id:'e_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),amount:parseFloat(r.amount),type:info.type||r.type||'expense',group:info.group||r.group||'business'};
      delete e._bid;
      setEntries(p=>[...p,e]);
      setBlankRows(rows=>rows.map(x=>x._bid===bid?{_bid:bid,date:today(),accountId:'',category:'',note:'',amount:'',type:'income',group:'business'}:x));
      showBadge();
    };

    // Edit existing entry inline
    const updateEntry=(id,field,val)=>{
      setEntries(prev=>prev.map(e=>{
        if(e.id!==id)return e;
        if(field==='category'){
          const info=CAT_TYPE[val]||{};
          return{...e,category:val,type:info.type||e.type,group:info.group||e.group};
        }
        if(field==='amount')return{...e,amount:parseFloat(val)||0};
        return{...e,[field]:val};
      }));
    };

    // Shared cell styles
    const cellBase={
      padding:0,borderRight:`1px solid ${borderClr}`,borderBottom:`1px solid ${borderClr}`,
      background:'#fff',position:'relative',minHeight:38,
    };
    const cellInp={
      width:'100%',height:'100%',minHeight:38,padding:'8px 9px',border:'none',
      background:'transparent',color:'#1a1a1a',fontSize:12,outline:'none',
      fontFamily:'inherit',boxSizing:'border-box',cursor:'default',
    };
    const cellFocus={
      position:'absolute',inset:0,zIndex:10,
      background:'#fffde7',border:'2px solid #fbc02d',
      padding:'6px 8px',fontSize:12,color:'#1a1a1a',outline:'none',
      fontFamily:'inherit',boxSizing:'border-box',
    };

    // Reusable cell components
    const TextCell=({rowId,field,value,placeholder,style={}})=>{
      const isActive=activeCell?.rowId===rowId&&activeCell?.col===field;
      return(
        <div style={{...cellBase,...style}} onClick={()=>{if(!isActive){setActiveCell({rowId,col:field});setEditingVal(value||'');}}}>
          {isActive
            ?<input autoFocus value={editingVal} onChange={e=>setEditingVal(e.target.value)}
                onBlur={()=>{
                  if(rowId.startsWith('b'))updateBlank(rowId,field,editingVal);
                  else updateEntry(rowId,field,editingVal);
                  setActiveCell(null);
                }}
                onKeyDown={e=>{if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();
                  if(rowId.startsWith('b'))updateBlank(rowId,field,editingVal);
                  else updateEntry(rowId,field,editingVal);
                  setActiveCell(null);
                }if(e.key==='Escape')setActiveCell(null);}}
                style={cellFocus}/>
            :<div style={{...cellInp,color:value?'#1a1a1a':'#bbb',fontStyle:value?'normal':'italic',display:'flex',alignItems:'center'}}>
              {value||placeholder}
            </div>}
        </div>
      );
    };

    const SelectCell=({rowId,field,value,options,placeholder,style={}})=>{
      const isActive=activeCell?.rowId===rowId&&activeCell?.col===field;
      const display=value||'';
      return(
        <div style={{...cellBase,...style}} onClick={()=>{if(!isActive){setActiveCell({rowId,col:field});setEditingVal(value||'');}}}>
          {isActive
            ?<select autoFocus value={display}
                onChange={e=>{
                  const val=e.target.value;
                  if(rowId.startsWith('b'))updateBlank(rowId,field,val);
                  else updateEntry(rowId,field,val);
                  setTimeout(()=>setActiveCell(null),0);
                }}
                onBlur={()=>{setTimeout(()=>setActiveCell(null),150);}}
                style={{...cellFocus,cursor:'pointer'}}>
                <option value="">{placeholder}</option>
                {options}
              </select>
            :<div style={{...cellInp,color:display?'#1a1a1a':'#bbb',fontStyle:display?'normal':'italic',display:'flex',alignItems:'center',justifyContent:style.textAlign==='right'?'flex-end':'flex-start'}}>
              {display||placeholder}
            </div>}
        </div>
      );
    };

    const AmountCell=({rowId,field,value,color,placeholder,style={}})=>{
      const isActive=activeCell?.rowId===rowId&&activeCell?.col===field;
      const display=value>0?'₱'+Number(value).toLocaleString('en-PH',{minimumFractionDigits:2}):'';
      return(
        <div style={{...cellBase,...style}} onClick={()=>{if(!isActive){setActiveCell({rowId,col:field});setEditingVal(value>0?String(value):'');}}}>
          {isActive
            ?<input autoFocus type="number" min="0" step="0.01" value={editingVal}
                onChange={e=>setEditingVal(e.target.value)}
                onBlur={()=>{
                  if(rowId.startsWith('b')){
                    updateBlank(rowId,'amount',editingVal);
                    // Auto-save blank row when amount entered and has account+category
                    const r=blankRows.find(x=>x._bid===rowId);
                    if(r&&r.accountId&&r.category&&parseFloat(editingVal)>0){
                      setTimeout(()=>saveBlankRow(rowId),100);
                    }
                  } else updateEntry(rowId,'amount',editingVal);
                  setActiveCell(null);
                }}
                onKeyDown={e=>{if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();
                  if(rowId.startsWith('b')){
                    updateBlank(rowId,'amount',editingVal);
                    const r=blankRows.find(x=>x._bid===rowId);
                    if(r&&r.accountId&&r.category&&parseFloat(editingVal)>0)setTimeout(()=>saveBlankRow(rowId),100);
                  } else updateEntry(rowId,'amount',editingVal);
                  setActiveCell(null);
                }if(e.key==='Escape')setActiveCell(null);}}
                style={{...cellFocus,textAlign:'right',color,fontWeight:700}}/>
            :<div style={{...cellInp,justifyContent:'flex-end',display:'flex',alignItems:'center',color:display?color:'#ddd',fontWeight:display?700:400}}>
              {display||placeholder}
            </div>}
        </div>
      );
    };

    const accOptions=(
      <>
        <optgroup label="💼 Business">{accounts.filter(a=>a.type==='business').map(a=><option key={a.id} value={a.id}>{a.icon} {a.name}</option>)}</optgroup>
        <optgroup label="👤 Personal">{accounts.filter(a=>a.type==='personal').map(a=><option key={a.id} value={a.id}>{a.icon} {a.name}</option>)}</optgroup>
      </>
    );
    const catOptions=(
      <>
        <optgroup label="💼 Business Income">{getCats('business','income').map(c=><option key={c} value={c}>{c}</option>)}</optgroup>
        <optgroup label="💼 Business Expense">{getCats('business','expense').map(c=><option key={c} value={c}>{c}</option>)}</optgroup>
        <optgroup label="👤 Personal Income">{getCats('personal','income').map(c=><option key={c} value={c}>{c}</option>)}</optgroup>
        <optgroup label="👤 Personal Expense">{getCats('personal','expense').map(c=><option key={c} value={c}>{c}</option>)}</optgroup>
      </>
    );

    return(
      <div style={{padding:'14px 16px',maxWidth:1280,margin:'0 auto',fontFamily:'Arial,sans-serif'}}>

        {/* Summary header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14,flexWrap:'wrap',gap:12}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:0,border:`2px solid ${headerGreen}`,borderRadius:6,overflow:'hidden',minWidth:480}}>
            {[
              {l:'INCOME',v:peso(totInc),c:'#2e7d32',bg:'#fff'},
              {l:'OPENING BALANCE',v:peso(openingBal),c:darkGreen,bg:lightGreen},
              {l:'EXPENSE',v:peso(totExp),c:'#c62828',bg:'#fff'},
              {l:'CLOSING BALANCE',v:peso(closingBal),c:darkGreen,bg:lightGreen},
            ].map((x,i)=>(
              <div key={i} style={{padding:'10px 14px',background:x.bg,borderRight:i<3?`1px solid ${borderClr}`:'none'}}>
                <div style={{fontSize:9,fontWeight:700,color:'#666',textTransform:'uppercase',letterSpacing:.5,marginBottom:3}}>{x.l}</div>
                <div style={{fontSize:14,fontWeight:900,color:x.c}}>{x.v}</div>
              </div>
            ))}
          </div>
          <div style={{background:headerGreen,borderRadius:8,padding:'12px 20px',textAlign:'center'}}>
            <div style={{fontSize:13,fontWeight:900,color:'#fff',letterSpacing:1,lineHeight:1.5}}>ACCOUNTING<br/>JOURNAL ENTRY</div>
          </div>
        </div>

        {/* Filters */}
        <div style={{display:'flex',gap:6,marginBottom:10,flexWrap:'wrap',alignItems:'center'}}>
          <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="🔍 Search…"
            style={{flex:1,minWidth:120,padding:'6px 10px',background:'#fff',border:`1px solid ${borderClr}`,borderRadius:5,color:'#1a1a1a',fontSize:11,outline:'none'}}/>
          <select value={filterAcc} onChange={e=>setFilterAcc(e.target.value)} style={{padding:'6px 9px',background:'#fff',border:`1px solid ${borderClr}`,borderRadius:5,color:'#1a1a1a',fontSize:11,outline:'none',cursor:'pointer'}}>
            <option value="all">All Accounts</option>
            {accounts.map(a=><option key={a.id} value={a.id}>{a.icon} {a.name}</option>)}
          </select>
          <select value={filterGroup} onChange={e=>setFilterGroup(e.target.value)} style={{padding:'6px 9px',background:'#fff',border:`1px solid ${borderClr}`,borderRadius:5,color:'#1a1a1a',fontSize:11,outline:'none',cursor:'pointer'}}>
            <option value="all">All Groups</option><option value="business">💼 Business</option><option value="personal">👤 Personal</option>
          </select>
          <select value={filterType} onChange={e=>setFilterType(e.target.value)} style={{padding:'6px 9px',background:'#fff',border:`1px solid ${borderClr}`,borderRadius:5,color:'#1a1a1a',fontSize:11,outline:'none',cursor:'pointer'}}>
            <option value="all">All Types</option><option value="income">Income</option><option value="expense">Expense</option>
          </select>
        </div>

        {/* Spreadsheet */}
        <div style={{border:`2px solid ${headerGreen}`,borderRadius:8,overflow:'auto',boxShadow:'0 2px 16px rgba(76,175,80,.12)'}}>

          {/* Header */}
          <div style={{display:'grid',gridTemplateColumns:COL,minWidth:750,background:headerGreen}}>
            {[['#','center'],['Date',''],['Account Title',''],['Category / Description',''],['Income (₱)','right'],['Expense (₱)','right'],['Balance (₱)','right'],['Save','center']].map(([h,a])=>(
              <div key={h} style={{padding:'10px 10px',fontSize:10,fontWeight:800,color:'#fff',textTransform:'uppercase',letterSpacing:.5,
                borderRight:'1px solid rgba(255,255,255,.2)',textAlign:a||'left',whiteSpace:'nowrap'}}>
                {h}
              </div>
            ))}
          </div>

          {/* Opening balance row */}
          <div style={{display:'grid',gridTemplateColumns:COL,minWidth:750,background:lightGreen,borderBottom:`1px solid ${borderClr}`}}>
            <div style={{padding:'8px 10px',textAlign:'center',fontWeight:700,color:'#888',borderRight:`1px solid ${borderClr}`,fontSize:11}}>—</div>
            <div style={{padding:'8px 10px',fontSize:11,fontWeight:600,color:'#555',borderRight:`1px solid ${borderClr}`}}>Opening</div>
            <div style={{padding:'8px 10px',fontSize:11,fontWeight:700,color:darkGreen,borderRight:`1px solid ${borderClr}`}}>Opening Balance</div>
            <div style={{padding:'8px 10px',fontSize:11,color:'#888',fontStyle:'italic',borderRight:`1px solid ${borderClr}`}}>Starting balance</div>
            <div style={{padding:'8px 10px',borderRight:`1px solid ${borderClr}`}}/>
            <div style={{padding:'8px 10px',borderRight:`1px solid ${borderClr}`}}/>
            <div style={{padding:'8px 10px',textAlign:'right',fontWeight:900,fontSize:13,color:darkGreen}}>
              ₱{Number(openingBal).toLocaleString('en-PH',{minimumFractionDigits:2})}
            </div>
            <div style={{padding:'8px 10px',borderRight:`1px solid ${borderClr}`}}/>
          </div>

          {/* Existing entry rows */}
          {rows.map((e,i)=>{
            const acc=accounts.find(a=>a.id===e.accountId);
            const rowBg=i%2===0?'#fff':'#f9fff9';
            return(
              <div key={e.id} style={{display:'grid',gridTemplateColumns:COL,minWidth:750,background:rowBg}}
                onMouseEnter={ev=>ev.currentTarget.style.background='#f1f8e9'}
                onMouseLeave={ev=>ev.currentTarget.style.background=rowBg}>
                {/* Row # */}
                <div style={{...cellBase,background:'inherit',display:'flex',alignItems:'center',justifyContent:'center',borderLeft:`3px solid ${e.isInc?headerGreen:'#ef5350'}`}}>
                  <span style={{fontSize:10,fontWeight:600,color:'#aaa'}}>{i+1}</span>
                  <button onClick={()=>deleteEntry(e.id)} className="del-btn" style={{display:'none',position:'absolute',right:2,top:'50%',transform:'translateY(-50%)',width:16,height:16,background:'#ffebee',border:'1px solid #ef9a9a',color:'#c62828',borderRadius:3,cursor:'pointer',fontSize:9,padding:0,lineHeight:1}}>✕</button>
                </div>
                {/* Date */}
                <TextCell rowId={e.id} field="date" value={e.date} placeholder="YYYY-MM-DD" style={{background:'inherit'}}/>
                {/* Account */}
                <SelectCell rowId={e.id} field="accountId" value={acc?.name||e.accountId} placeholder="Select account…"
                  options={accOptions} style={{background:'inherit'}}/>
                {/* Category + note */}
                <div style={{...cellBase,background:'inherit'}}>
                  <SelectCell rowId={e.id} field="category" value={e.category} placeholder="Category…"
                    options={catOptions} style={{borderBottom:'1px solid #eee',borderRight:'none',background:'transparent'}}/>
                  <TextCell rowId={e.id} field="note" value={e.note||''} placeholder="Description…"
                    style={{borderRight:'none',background:'transparent',fontSize:10}}/>
                </div>
                {/* Income */}
                <AmountCell rowId={e.id} field="inc_amount" value={e.isInc?e.amount:0}
                  color={headerGreen} placeholder="—" style={{background:'inherit'}}/>
                {/* Expense */}
                <AmountCell rowId={e.id} field="exp_amount" value={!e.isInc?e.amount:0}
                  color='#e53935' placeholder="—" style={{background:'inherit'}}/>
                {/* Balance */}
                <div style={{...cellBase,background:'inherit',display:'flex',alignItems:'center',justifyContent:'flex-end',padding:'8px 10px',fontWeight:900,fontSize:12,color:e.runBal>=0?'#1a1a1a':'#c62828'}}>
                  ₱{Number(Math.abs(e.runBal)).toLocaleString('en-PH',{minimumFractionDigits:2})}
                </div>
                {/* Actions */}
                <div style={{...cellBase,background:'inherit',borderRight:'none',display:'flex',alignItems:'center',justifyContent:'center',gap:4,padding:'4px 6px'}}>
                  <button onClick={()=>openEdit(e)} title="Edit" style={{flex:1,padding:'4px 0',background:'#e8f5e9',border:`1px solid ${headerGreen}`,color:darkGreen,borderRadius:4,cursor:'pointer',fontSize:10,fontWeight:700}}>✏️</button>
                  <button onClick={()=>deleteEntry(e.id)} title="Delete" style={{flex:1,padding:'4px 0',background:'#ffebee',border:'1px solid #ef9a9a',color:'#c62828',borderRadius:4,cursor:'pointer',fontSize:10,fontWeight:700}}>🗑</button>
                </div>
              </div>
            );
          })}

          {/* Totals row */}
          {rows.length>0&&(
            <div style={{display:'grid',gridTemplateColumns:COL,minWidth:750,background:lightGreen,borderTop:`2px solid ${headerGreen}`}}>
              <div style={{padding:'9px 10px',gridColumn:'1/5',textAlign:'right',fontWeight:800,fontSize:11,color:darkGreen,borderRight:`1px solid ${borderClr}`}}>TOTAL — {rows.length} entries</div>
              <div style={{padding:'9px 10px',textAlign:'right',fontWeight:900,fontSize:13,color:'#2e7d32',borderRight:`1px solid ${borderClr}`}}>₱{Number(totInc).toLocaleString('en-PH',{minimumFractionDigits:2})}</div>
              <div style={{padding:'9px 10px',textAlign:'right',fontWeight:900,fontSize:13,color:'#c62828',borderRight:`1px solid ${borderClr}`}}>₱{Number(totExp).toLocaleString('en-PH',{minimumFractionDigits:2})}</div>
              <div style={{padding:'9px 10px',textAlign:'right',fontWeight:900,fontSize:13,color:closingBal>=0?darkGreen:'#c62828'}}>₱{Number(Math.abs(closingBal)).toLocaleString('en-PH',{minimumFractionDigits:2})}</div>
              <div style={{padding:'9px 10px'}}/>
            </div>
          )}

          {/* ── BLANK ENTRY ROWS (notebook lines) ── */}
          {blankRows.map((r,i)=>{
            const info=CAT_TYPE[r.category]||{};
            const isInc=info.type==='income';
            const isExp=info.type==='expense';
            const hasCat=!!r.category;
            const rowBg=(rows.length+i)%2===0?'#fff':'#f9fff9';
            return(
              <div key={r._bid} style={{display:'grid',gridTemplateColumns:COL,minWidth:750,background:rowBg}}>
                {/* Date */}
                <TextCell rowId={r._bid} field="date" value={r.date} placeholder="Date" style={{background:'inherit',borderLeft:'3px solid #e0e0e0'}}/>
                {/* Account */}
                <SelectCell rowId={r._bid} field="accountId" value={r.accountId?accounts.find(a=>a.id===r.accountId)?.name||r.accountId:''} placeholder="Account…"
                  options={accOptions} style={{background:'inherit'}}
                  />
                {/* Category + note */}
                <div style={{...cellBase,background:'inherit'}}>
                  <div style={{borderBottom:'1px dashed #e0e0e0'}}>
                    <SelectCell rowId={r._bid} field="category" value={r.category} placeholder="Category…"
                      options={catOptions} style={{borderRight:'none',background:'transparent'}}/>
                  </div>
                  <TextCell rowId={r._bid} field="note" value={r.note||''} placeholder="Description…"
                    style={{borderRight:'none',background:'transparent',fontSize:10}}/>
                </div>
                {/* Income amount */}
                <div style={{...cellBase,background:'inherit'}}>
                  {(!hasCat||isInc||(!isInc&&!isExp))&&(
                    <AmountCell rowId={r._bid} field="amount"
                      value={hasCat&&isInc?parseFloat(r.amount)||0:hasCat&&!isInc&&!isExp?parseFloat(r.amount)||0:0}
                      color={headerGreen} placeholder={hasCat&&isExp?'—':'₱ 0.00'}
                      style={{background:'transparent',border:'none'}}/>
                  )}
                  {hasCat&&isExp&&<div style={{width:'100%',padding:'8px 10px',border:'none',background:'transparent',color:'#ddd',fontSize:12,display:'flex',alignItems:'center',justifyContent:'flex-end'}}>—</div>}
                </div>
                {/* Expense amount */}
                <div style={{...cellBase,background:'inherit'}}>
                  {(!hasCat||isExp)&&!(hasCat&&!isInc&&!isExp)&&(
                    <AmountCell rowId={r._bid} field="amount"
                      value={hasCat&&isExp?parseFloat(r.amount)||0:0}
                      color='#e53935' placeholder={hasCat&&isInc?'—':'₱ 0.00'}
                      style={{background:'transparent',border:'none'}}/>
                  )}
                  {hasCat&&isInc&&<div style={{width:'100%',padding:'8px 10px',border:'none',background:'transparent',color:'#ddd',fontSize:12,display:'flex',alignItems:'center',justifyContent:'flex-end'}}>—</div>}
                </div>
                {/* Balance auto */}
                <div style={{...cellBase,background:'inherit',display:'flex',alignItems:'center',justifyContent:'flex-end',padding:'8px 10px',fontSize:10,color:'#ccc',fontStyle:'italic'}}>
                  auto
                </div>
                {/* Save button */}
                <div style={{...cellBase,background:'inherit',borderRight:'none',display:'flex',alignItems:'center',justifyContent:'center',padding:'4px 6px'}}>
                  {(r.accountId&&r.category&&parseFloat(r.amount)>0)?(
                    <button onClick={()=>saveBlankRow(r._bid)}
                      style={{width:'100%',padding:'6px 0',background:headerGreen,border:'none',borderRadius:5,color:'#fff',fontWeight:800,cursor:'pointer',fontSize:11,whiteSpace:'nowrap'}}>
                      💾 Save
                    </button>
                  ):(
                    <div style={{width:'100%',padding:'6px 0',textAlign:'center',fontSize:9,color:'#ccc',fontStyle:'italic'}}>
                      fill row
                    </div>
                  )}
                </div>
              </div>
            );
          })}

        </div>
        <div style={{marginTop:8,fontSize:10,color:'#888',textAlign:'center'}}>
          💡 Fill in a row (Account → Category → Amount) then click <b style={{color:'#2e7d32'}}>💾 Save</b> · Or press <b>Enter</b> after typing the amount
        </div>
      </div>
    );
  };

  // ── PANEL JOURNAL (reusable for split view) ────────────────────────────────
  const PanelJournal=({group})=>{
    const isBiz=group==='business';
    const accentColor=isBiz?'#4caf50':'#9c27b0';
    const accentLight=isBiz?'#e8f5e9':'#f3e5f5';
    const accentDark=isBiz?'#2e7d32':'#6a1b9a';
    const borderClr=isBiz?'#c8e6c9':'#e1bee7';
    const COL='80px 110px 130px 1fr 95px 95px 100px 28px';

    const BLANK_ROWS=20;
    const[blankRows,setBlankRows]=useState(()=>
      Array.from({length:BLANK_ROWS},(_,i)=>({_bid:`${group}_b${i}`,date:today(),accountId:'',category:'',note:'',amount:'',type:'income',group}))
    );

    // Reset blank rows when switching between Business/Personal
    const prevGroup=React.useRef(group);
    React.useEffect(()=>{
      if(prevGroup.current!==group){
        prevGroup.current=group;
        setBlankRows(Array.from({length:BLANK_ROWS},(_,i)=>({_bid:`${group}_b${i}`,date:today(),accountId:'',category:'',note:'',amount:'',type:'income',group})));
      }
    },[group]);
    const[activeCell,setActiveCell]=useState(null);
    const[editingVal,setEditingVal]=useState('');


    // Entries for this group only — sorted by date, then creation order
    const groupEntries=useMemo(()=>[...entries]
      .filter(e=>e.group===group)
      .sort((a,b)=>{
        // Sort by date first
        const dateCmp=a.date.localeCompare(b.date);
        if(dateCmp!==0)return dateCmp;
        // Same date — use creation timestamp from id
        const getTs=(e)=>{
          const parts=e.id&&e.id.split('_');
          return parts&&parts[1]?parseInt(parts[1]):0;
        };
        return getTs(a)-getTs(b);
      })
    ,[entries,group]);

    // Opening balance = sum of all accounts in this group
    const groupAccounts=useMemo(()=>accounts.filter(a=>a.type===group),[accounts,group]);
    const openingBal=useMemo(()=>groupAccounts.reduce((s,a)=>s+(parseFloat(a.openingBalance)||0),0),[groupAccounts]);

    const rows=useMemo(()=>{
      let bal=openingBal;
      return groupEntries.map(e=>{
        const typ=CAT_TYPE[e.category]?.type||e.type||'income';
        const isInc=typ==='income';
        bal=isInc?bal+(parseFloat(e.amount)||0):bal-(parseFloat(e.amount)||0);
        return{...e,isInc,runBal:bal};
      });
    },[groupEntries,openingBal]);

    const totInc=rows.filter(r=>r.isInc).reduce((s,r)=>s+(r.amount||0),0);
    const totExp=rows.filter(r=>!r.isInc).reduce((s,r)=>s+(r.amount||0),0);
    const closingBal=rows.length>0?rows[rows.length-1].runBal:openingBal;

    const updateBlank=(bid,field,val)=>setBlankRows(prev=>{
      const bidGroup=bid.startsWith('personal')?'personal':'business';
      const updated=prev.map(r=>{
        if(r._bid!==bid)return r;
        if(field==='category'){const info=CAT_TYPE[val]||{};return{...r,category:val,type:info.type||r.type||'expense',group:bidGroup};}
        return{...r,[field]:val};
      });
      // Auto-add 5 more rows when fewer than 3 empty rows remain
      const emptyCount=updated.filter(r=>!r.accountId&&!r.category&&!r.amount).length;
      if(emptyCount<3){
        const ts=Date.now();
        return[...updated,...Array.from({length:5},(_,i)=>({_bid:`${bidGroup}_b${ts}_${i}`,date:today(),accountId:'',category:'',note:'',amount:'',type:'income',group:bidGroup}))];
      }
      return updated;
    });

    const saveBlankRow=(bid,overrideAmount,overrideType)=>{
      // Extract group from bid prefix (e.g. 'business_b0' → 'business')
      const bidGroup=bid.startsWith('personal')?'personal':'business';
      setBlankRows(prev=>{
        const r=prev.find(x=>x._bid===bid);
        const amt=parseFloat(overrideAmount||r?.amount||0);
        if(!r||amt<=0)return prev;
        const typ=overrideType||r.type||'expense';
        const info=CAT_TYPE[r.category]||{};
        // Always use bidGroup — never let CAT_TYPE override the journal group
        const entryGroup=bidGroup;
        const grpCount=entries.filter(en=>{const inf=CAT_TYPE[en.category]||{};return(inf.group||en.group)===entryGroup;}).length;
        const e={...r,id:'e_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),
          amount:amt,type:info.type||typ,group:entryGroup,
          sortOrder:grpCount*10+10};
        delete e._bid;
        setTimeout(()=>setEntries(p=>[...p,e]),0);
        setTimeout(()=>showBadge(),50);
        const reset=prev.map(x=>x._bid===bid
          ?{_bid:bid,date:today(),accountId:'',category:'',note:'',amount:'',type:'income',group:bidGroup}
          :x);
        // Auto-add rows if running low after save
        const emptyAfter=reset.filter(r=>!r.accountId&&!r.category&&!r.amount).length;
        if(emptyAfter<5){
          const ts=Date.now();
          return[...reset,...Array.from({length:10},(_,i)=>({_bid:`${bidGroup}_b${ts}_${i}`,date:today(),accountId:'',category:'',note:'',amount:'',type:'income',group:bidGroup}))];
        }
        return reset;
      });
    };

    const updateEntry=(id,field,val)=>setEntries(prev=>prev.map(e=>{
      if(e.id!==id)return e;
      if(field==='category'){const info=CAT_TYPE[val]||{};return{...e,category:val,type:info.type||e.type,group:info.group||e.group};}
      if(field==='amount')return{...e,amount:parseFloat(val)||0};
      if(field==='type')return{...e,type:val};
      return{...e,[field]:val};
    }));

    const cellBase={padding:0,borderRight:`1px solid ${borderClr}`,borderBottom:`1px solid ${borderClr}`,background:'#fff',minHeight:36,position:'relative'};
    const cellFocus={position:'absolute',inset:0,zIndex:10,background:'#fffde7',border:'2px solid #fbc02d',padding:'5px 7px',fontSize:11,color:'#1a1a1a',outline:'none',fontFamily:'inherit',boxSizing:'border-box'};
    const INP={width:'100%',padding:'5px 6px',border:`1px solid ${borderClr}`,borderRadius:3,background:'#f9fffe',color:'#1a1a1a',fontSize:11,outline:'none',fontFamily:'inherit'};

    const TextCell=({rowId,field,value,placeholder,style={}})=>{
      const isActive=activeCell?.rowId===rowId&&activeCell?.col===field;
      return(
        <div style={{...cellBase,...style}} onClick={()=>{if(!isActive){setActiveCell({rowId,col:field});setEditingVal(value||'');}}}>
          {isActive
            ?<input autoFocus value={editingVal} onChange={e=>setEditingVal(e.target.value)}
                onBlur={()=>{rowId.startsWith(group+'_b')?updateBlank(rowId,field,editingVal):updateEntry(rowId,field,editingVal);setActiveCell(null);}}
                onKeyDown={e=>{if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();rowId.startsWith(group+'_b')?updateBlank(rowId,field,editingVal):updateEntry(rowId,field,editingVal);setActiveCell(null);}if(e.key==='Escape')setActiveCell(null);}}
                style={cellFocus}/>
            :<div style={{padding:'6px 8px',fontSize:11,color:value?'#1a1a1a':'#bbb',fontStyle:value?'normal':'italic',display:'flex',alignItems:'center',minHeight:36}}>{value||placeholder}</div>}
        </div>
      );
    };

    const SelectCell=({rowId,field,value,options,placeholder,style={}})=>{
      const isActive=activeCell?.rowId===rowId&&activeCell?.col===field;
      const[search,setSearch]=React.useState('');

      // Extract flat list of options from optgroup JSX for filtering
      const flatOpts=React.useMemo(()=>{
        const list=[];
        const extract=(node)=>{
          if(!node)return;
          if(Array.isArray(node)){node.forEach(extract);return;}
          if(node.type==='option')list.push({label:node.props.children,value:node.props.value});
          if(node.props&&node.props.children)extract(node.props.children);
        };
        extract(options);
        return list;
      },[options]);

      const filtered=search
        ?flatOpts.filter(o=>o.label.toLowerCase().includes(search.toLowerCase()))
        :flatOpts;

      const handleSelect=(val)=>{
        if(rowId.startsWith(group+'_b'))updateBlank(rowId,field,val);
        else updateEntry(rowId,field,val);
        setSearch('');
        setTimeout(()=>setActiveCell(null),0);
      };

      return(
        <div style={{...cellBase,...style,position:'relative'}}
          onClick={()=>{if(!isActive){setActiveCell({rowId,col:field});setSearch('');}}}>
          {isActive?(
            <div style={{position:'fixed',zIndex:9999,background:'#fff',border:'2px solid #fbc02d',borderRadius:6,boxShadow:'0 8px 32px rgba(0,0,0,.25)',minWidth:200,width:220}}
              ref={el=>{
                if(el){
                  const parent=el.parentElement?.getBoundingClientRect();
                  if(parent){
                    el.style.top=(parent.bottom+2)+'px';
                    el.style.left=parent.left+'px';
                    // Flip up if too close to bottom
                    if(parent.bottom+200>window.innerHeight){
                      el.style.top=(parent.top-el.offsetHeight-2)+'px';
                    }
                  }
                }
              }}>
              <input autoFocus value={search}
                onChange={e=>setSearch(e.target.value)}
                onKeyDown={e=>{
                  if(e.key==='Escape'){setSearch('');setActiveCell(null);}
                  if(e.key==='Enter'&&filtered.length>0){handleSelect(filtered[0].value);}
                  if(e.key==='Tab'){e.preventDefault();if(filtered.length>0)handleSelect(filtered[0].value);}
                }}
                placeholder={`Search ${placeholder}...`}
                style={{width:'100%',padding:'7px 10px',border:'none',borderBottom:'1px solid #e0e0e0',outline:'none',fontSize:12,boxSizing:'border-box',fontFamily:'inherit',borderRadius:'4px 4px 0 0'}}/>
              <div style={{maxHeight:180,overflowY:'auto'}}>
                {filtered.length===0
                  ?<div style={{padding:'10px',fontSize:11,color:'#aaa',fontStyle:'italic',textAlign:'center'}}>No matches</div>
                  :filtered.map(o=>(
                    <div key={o.value} onClick={()=>handleSelect(o.value)}
                      style={{padding:'7px 10px',fontSize:11,cursor:'pointer',color:'#1a1a1a',borderBottom:'1px solid #f5f5f5'}}
                      onMouseEnter={ev=>ev.currentTarget.style.background='#f0f9ff'}
                      onMouseLeave={ev=>ev.currentTarget.style.background='#fff'}>
                      {o.label}
                    </div>
                  ))
                }
              </div>
            </div>
          ):null}
          <div style={{padding:'6px 8px',fontSize:11,color:value?'#1a1a1a':'#bbb',fontStyle:value?'normal':'italic',display:'flex',alignItems:'center',minHeight:36,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            {value||placeholder}
          </div>
        </div>
      );
    };

    const AmountCell=({rowId,field,value,color,placeholder,style={}})=>{
      const isActive=activeCell?.rowId===rowId&&activeCell?.col===field;
      const display=value>0?'₱'+Number(value).toLocaleString('en-PH',{minimumFractionDigits:2}):'';
      return(
        <div style={{...cellBase,...style}} onClick={()=>{if(!isActive){setActiveCell({rowId,col:field});setEditingVal(value>0?String(value):'');}}}>
          {isActive
            ?<input autoFocus type="number" min="0" step="0.01" value={editingVal} onChange={e=>setEditingVal(e.target.value)}
                onBlur={()=>{
                  if(rowId.startsWith(group+'_b')){
                    updateBlank(rowId,'amount',editingVal);
                    const r=blankRows.find(x=>x._bid===rowId);
                    if(r&&r.accountId&&r.category&&parseFloat(editingVal)>0)setTimeout(()=>saveBlankRow(rowId),100);
                  } else updateEntry(rowId,'amount',editingVal);
                  setActiveCell(null);
                }}
                onKeyDown={ev=>{if(ev.key==='Enter'||ev.key==='Tab'){ev.preventDefault();
                  if(rowId.startsWith(group+'_b')){
                    updateBlank(rowId,'amount',editingVal);
                    const r=blankRows.find(x=>x._bid===rowId);
                    if(r&&r.accountId&&r.category&&parseFloat(editingVal)>0){
                      setTimeout(()=>saveBlankRow(rowId),80);
                    }
                  } else updateEntry(rowId,'amount',editingVal);
                  setActiveCell(null);
                }if(ev.key==='Escape')setActiveCell(null);}}
                style={{...cellFocus,textAlign:'right',color,fontWeight:700}}/>
            :<div style={{padding:'6px 8px',fontSize:11,display:'flex',alignItems:'center',justifyContent:'flex-end',minHeight:36,fontWeight:display?700:400,color:display?color:'#ddd'}}>{display||placeholder}</div>}
        </div>
      );
    };

    // Inline income/expense cells for blank rows
    const AmountCellIncome=({rowId,value,color})=>{
      const isActive=activeCell?.rowId===rowId&&activeCell?.col==='inc_amount';
      const display=value>0?'₱'+Number(value).toLocaleString('en-PH',{minimumFractionDigits:2}):'';
      return(
        <div style={{...cellBase,background:'transparent',border:'none'}}
          onClick={()=>{if(!isActive){setActiveCell({rowId,col:'inc_amount'});setEditingVal(value>0?String(value):'');}}}>
          {isActive
            ?<input autoFocus type="number" min="0" step="0.01" value={editingVal}
                onChange={e=>setEditingVal(e.target.value)}
                onBlur={()=>{
                  if(parseFloat(editingVal)>0){
                    updateBlank(rowId,'amount',editingVal);
                    updateBlank(rowId,'type','income');
                    setTimeout(()=>saveBlankRow(rowId,editingVal,'income'),50);
                  }
                  setActiveCell(null);
                }}
                onKeyDown={e=>{if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();
                  if(parseFloat(editingVal)>0){
                    updateBlank(rowId,'amount',editingVal);
                    updateBlank(rowId,'type','income');
                    setTimeout(()=>saveBlankRow(rowId,editingVal,'income'),50);
                  }
                  setActiveCell(null);}if(e.key==='Escape')setActiveCell(null);}}
                style={{...cellFocus,textAlign:'right',color,fontWeight:700}}/>
            :<div style={{padding:'6px 8px',fontSize:11,display:'flex',alignItems:'center',justifyContent:'flex-end',minHeight:36,fontWeight:display?700:400,color:display?color:'#bbb',cursor:'text'}}>{display||'0.00'}</div>}
        </div>
      );
    };

    const AmountCellExpense=({rowId,value,color})=>{
      const isActive=activeCell?.rowId===rowId&&activeCell?.col==='exp_amount';
      const display=value>0?'₱'+Number(value).toLocaleString('en-PH',{minimumFractionDigits:2}):'';
      return(
        <div style={{...cellBase,background:'transparent',border:'none'}}
          onClick={()=>{if(!isActive){setActiveCell({rowId,col:'exp_amount'});setEditingVal(value>0?String(value):'');}}}>
          {isActive
            ?<input autoFocus type="number" min="0" step="0.01" value={editingVal}
                onChange={e=>setEditingVal(e.target.value)}
                onBlur={()=>{
                  if(parseFloat(editingVal)>0){
                    updateBlank(rowId,'amount',editingVal);
                    updateBlank(rowId,'type','expense');
                    setTimeout(()=>saveBlankRow(rowId,editingVal,'expense'),50);
                  }
                  setActiveCell(null);
                }}
                onKeyDown={e=>{if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();
                  if(parseFloat(editingVal)>0){
                    updateBlank(rowId,'amount',editingVal);
                    updateBlank(rowId,'type','expense');
                    setTimeout(()=>saveBlankRow(rowId,editingVal,'expense'),50);
                  }
                  setActiveCell(null);}if(e.key==='Escape')setActiveCell(null);}}
                style={{...cellFocus,textAlign:'right',color,fontWeight:700}}/>
            :<div style={{padding:'6px 8px',fontSize:11,display:'flex',alignItems:'center',justifyContent:'flex-end',minHeight:36,fontWeight:display?700:400,color:display?color:'#bbb',cursor:'text'}}>{display||'0.00'}</div>}
        </div>
      );
    };

    const accOpts=<>
      {groupAccounts.map(a=><option key={a.id} value={a.id}>{a.icon} {a.name}</option>)}
    </>;
    const catOpts=<>
      <optgroup label="Income">{getCats(group,'income').map(c=><option key={c} value={c}>{c}</option>)}</optgroup>
      <optgroup label="Expense">{getCats(group,'expense').map(c=><option key={c} value={c}>{c}</option>)}</optgroup>
    </>;

    return(
      <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column',fontFamily:'Arial,sans-serif'}}>
        {/* Panel header */}
        <div style={{background:accentColor,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',borderRadius:'8px 8px 0 0'}}>
          <div>
            <div style={{fontSize:14,fontWeight:900,color:'#fff',letterSpacing:.5}}>{isBiz?'💼 Business':'👤 Personal'}</div>
            <div style={{fontSize:10,color:'rgba(255,255,255,.7)',marginTop:1}}>{groupAccounts.length} accounts</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:11,color:'rgba(255,255,255,.7)'}}>Balance</div>
            <div style={{fontSize:18,fontWeight:900,color:'#fff'}}>{peso(closingBal)}</div>
          </div>
        </div>

        {/* Account balances mini + Add Line button */}
        <div style={{display:'flex',gap:0,background:accentLight,borderBottom:`1px solid ${borderClr}`,overflowX:'auto',alignItems:'stretch'}}>
          {groupAccounts.map(a=>(
            <div key={a.id} style={{padding:'5px 12px',borderRight:`1px solid ${borderClr}`,flexShrink:0}}>
              <div style={{fontSize:9,color:accentDark,fontWeight:700}}>{a.icon} {a.name}</div>
              <div style={{fontSize:13,fontWeight:900,color:accBal[a.id]>=0?accentDark:'#c62828'}}>{peso(accBal[a.id]||0)}</div>
            </div>
          ))}
          <div style={{marginLeft:'auto',display:'flex',alignItems:'center',padding:'4px 10px',flexShrink:0}}>
            <button onClick={()=>{const ts=Date.now();setBlankRows(prev=>[...prev,...Array.from({length:10},(_,i)=>({_bid:`${group}_b${ts}_${i}`,date:today(),accountId:'',category:'',note:'',amount:'',type:'income',group}))]);}}
              style={{padding:'5px 14px',background:accentColor,border:'none',borderRadius:6,color:'#fff',fontWeight:800,cursor:'pointer',fontSize:11,whiteSpace:'nowrap'}}>
              ＋ Add Line
            </button>
          </div>
        </div>



        {/* Journal table */}
        <div style={{flex:1,overflowY:'auto',overflowX:'auto',border:`1px solid ${borderClr}`,borderTop:'none',borderRadius:'0 0 8px 8px',minHeight:0,background:'#fff',position:'relative'}}>
          {/* Header */}
          <div style={{display:'grid',gridTemplateColumns:COL,minWidth:700,background:accentColor,position:'sticky',top:0,zIndex:5}}>
            {['Date','Account','Category','Description','Income','Expense','Balance',''].map((h,i)=>(
              <div key={i} style={{padding:'9px 8px',fontSize:9,fontWeight:800,color:'#fff',textTransform:'uppercase',letterSpacing:.4,borderRight:'1px solid rgba(255,255,255,.2)',textAlign:i>=4&&i<=6?'right':'left',whiteSpace:'nowrap'}}>{h}</div>
            ))}
          </div>

          {/* Opening row */}
          <div style={{display:'grid',gridTemplateColumns:COL,minWidth:700,background:accentLight,borderBottom:`1px solid ${borderClr}`}}>
            <div style={{padding:'6px 8px',borderRight:`1px solid ${borderClr}`}}/>
            <div style={{padding:'6px 8px',borderRight:`1px solid ${borderClr}`}}/>
            <div style={{padding:'6px 8px',fontSize:10,fontWeight:700,color:accentDark,borderRight:`1px solid ${borderClr}`}}>Opening Balance</div>
            <div style={{padding:'6px 8px',borderRight:`1px solid ${borderClr}`}}/>
            <div style={{padding:'6px 8px',borderRight:`1px solid ${borderClr}`}}/>
            <div style={{padding:'6px 8px',borderRight:`1px solid ${borderClr}`}}/>
            <div style={{padding:'6px 8px',textAlign:'right',fontWeight:900,fontSize:12,color:accentDark,borderRight:`1px solid ${borderClr}`}}>₱{Number(openingBal).toLocaleString('en-PH',{minimumFractionDigits:2})}</div>
            <div style={{padding:'6px 4px'}}/>
          </div>

          {/* Data rows */}
          {rows.map((e,i)=>{
            const acc=accounts.find(a=>a.id===e.accountId);
            const rowBg=i%2===0?'#fff':'#fafffe';
            return(
              <div key={e.id}
                style={{display:'grid',gridTemplateColumns:COL,minWidth:700,background:rowBg,transition:'background .1s'}}
                onMouseEnter={ev=>ev.currentTarget.style.background=accentLight}
                onMouseLeave={ev=>ev.currentTarget.style.background=rowBg}>

                <TextCell rowId={e.id} field="date" value={e.date} placeholder="Date" style={{background:'inherit',fontSize:10,borderLeft:`3px solid ${e.isInc?accentColor:'#ef5350'}`}}/>
                <SelectCell rowId={e.id} field="accountId" value={accounts.find(a=>a.id===e.accountId)?.name||''} placeholder="Account…" options={accOpts} style={{background:'inherit'}}/>
                <SelectCell rowId={e.id} field="category" value={e.category} placeholder="Category…" options={catOpts} style={{background:'inherit'}}/>
                <TextCell rowId={e.id} field="note" value={e.note||''} placeholder="Description…" style={{background:'inherit',fontSize:10,color:'#888'}}/>
                {/* Income cell */}
                <div style={{...cellBase,background:'inherit',cursor:'text'}}
                  onClick={()=>{setActiveCell({rowId:e.id,col:'inc_data'});setEditingVal(e.isInc?String(e.amount):'');}}>
                  {activeCell?.rowId===e.id&&activeCell?.col==='inc_data'
                    ?<input autoFocus type="number" min="0" step="0.01" value={editingVal}
                        onChange={ev=>setEditingVal(ev.target.value)}
                        onBlur={()=>{if(parseFloat(editingVal)>0){updateEntry(e.id,'amount',editingVal);updateEntry(e.id,'type','income');}setActiveCell(null);}}
                        onKeyDown={ev=>{if(ev.key==='Enter'||ev.key==='Tab'){ev.preventDefault();if(parseFloat(editingVal)>0){updateEntry(e.id,'amount',editingVal);updateEntry(e.id,'type','income');}setActiveCell(null);}if(ev.key==='Escape')setActiveCell(null);}}
                        style={{...cellFocus,textAlign:'right',color:accentColor,fontWeight:700}}/>
                    :<div style={{padding:'6px 8px',fontSize:11,display:'flex',alignItems:'center',justifyContent:'flex-end',minHeight:36,fontWeight:e.isInc&&e.amount>0?700:400,color:e.isInc&&e.amount>0?accentColor:'#ddd'}}>
                      {e.isInc&&e.amount>0?'₱'+Number(e.amount).toLocaleString('en-PH',{minimumFractionDigits:2}):'—'}
                    </div>}
                </div>
                {/* Expense cell */}
                <div style={{...cellBase,background:'inherit',cursor:'text'}}
                  onClick={()=>{setActiveCell({rowId:e.id,col:'exp_data'});setEditingVal(!e.isInc?String(e.amount):'');}}>
                  {activeCell?.rowId===e.id&&activeCell?.col==='exp_data'
                    ?<input autoFocus type="number" min="0" step="0.01" value={editingVal}
                        onChange={ev=>setEditingVal(ev.target.value)}
                        onBlur={()=>{if(parseFloat(editingVal)>0){updateEntry(e.id,'amount',editingVal);updateEntry(e.id,'type','expense');}setActiveCell(null);}}
                        onKeyDown={ev=>{if(ev.key==='Enter'||ev.key==='Tab'){ev.preventDefault();if(parseFloat(editingVal)>0){updateEntry(e.id,'amount',editingVal);updateEntry(e.id,'type','expense');}setActiveCell(null);}if(ev.key==='Escape')setActiveCell(null);}}
                        style={{...cellFocus,textAlign:'right',color:'#e53935',fontWeight:700}}/>
                    :<div style={{padding:'6px 8px',fontSize:11,display:'flex',alignItems:'center',justifyContent:'flex-end',minHeight:36,fontWeight:!e.isInc&&e.amount>0?700:400,color:!e.isInc&&e.amount>0?'#e53935':'#ddd'}}>
                      {!e.isInc&&e.amount>0?'₱'+Number(e.amount).toLocaleString('en-PH',{minimumFractionDigits:2}):'—'}
                    </div>}
                </div>
                {/* Balance */}
                <div style={{...cellBase,background:'inherit',display:'flex',alignItems:'center',justifyContent:'flex-end',padding:'6px 8px',fontWeight:900,fontSize:11,color:e.runBal>=0?'#1a1a1a':'#c62828'}}>
                  ₱{Number(Math.abs(e.runBal)).toLocaleString('en-PH',{minimumFractionDigits:2})}
                </div>
                {/* Delete button */}
                <div style={{...cellBase,background:'inherit',borderRight:'none',display:'flex',alignItems:'center',justifyContent:'center',padding:'3px 4px'}}>
                  <button onClick={()=>{if(window.confirm('Delete this entry?'))deleteEntry(e.id);}}
                    title="Delete row"
                    style={{width:24,height:24,background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.3)',borderRadius:4,color:'#ef4444',cursor:'pointer',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>×</button>
                </div>
              </div>
            );
          })}



          {/* Blank entry rows */}
          {blankRows.map((r,i)=>{
            const info=CAT_TYPE[r.category]||{};
            const isInc=info.type==='income';
            const isExp=info.type==='expense';
            const hasCat=!!r.category;
            const rowBg=(rows.length+i)%2===0?'#fff':'#fafffe';
            return(
              <div key={r._bid} style={{display:'grid',gridTemplateColumns:COL,minWidth:700,background:rowBg}}>

                <TextCell rowId={r._bid} field="date" value={r.date} placeholder="Date" style={{background:'inherit',fontSize:10,borderLeft:'3px solid #e0e0e0'}}/>
                <SelectCell rowId={r._bid} field="accountId" value={r.accountId?accounts.find(a=>a.id===r.accountId)?.name||r.accountId:''} placeholder="Account…" options={accOpts} style={{background:'inherit'}}/>
                <SelectCell rowId={r._bid} field="category" value={r.category} placeholder="Category…" options={catOpts} style={{background:'inherit'}}/>
                <TextCell rowId={r._bid} field="note" value={r.note||''} placeholder="Description…" style={{background:'inherit',fontSize:10,color:'#888'}}/>
                {/* Income column — always editable, disabled if category is expense */}
                <div style={{...cellBase,background:isExp?'rgba(0,0,0,.02)':'inherit'}}>
                  {isExp
                    ?<div style={{padding:'6px 10px',color:'#ccc',fontSize:11,display:'flex',alignItems:'center',justifyContent:'flex-end',minHeight:36}}>—</div>
                    :<AmountCellIncome rowId={r._bid} value={isInc?parseFloat(r.amount)||0:0} color={accentColor}/>
                  }
                </div>
                {/* Expense column — always editable, disabled if category is income */}
                <div style={{...cellBase,background:isInc?'rgba(0,0,0,.02)':'inherit'}}>
                  {isInc
                    ?<div style={{padding:'6px 10px',color:'#ccc',fontSize:11,display:'flex',alignItems:'center',justifyContent:'flex-end',minHeight:36}}>—</div>
                    :<AmountCellExpense rowId={r._bid} value={isExp?parseFloat(r.amount)||0:0} color="#e53935"/>
                  }
                </div>
                <div style={{...cellBase,background:'inherit',display:'flex',alignItems:'center',justifyContent:'flex-end',padding:'6px 8px',fontSize:10,color:'#ccc',fontStyle:'italic',borderRight:`1px solid ${borderClr}`}}>auto</div>

              </div>
            );
          })}
        </div>
      </div>
    );
  };

  // ── SPLIT JOURNAL VIEW ─────────────────────────────────────────────────────
  const SplitJournalView=()=>{
    const TABS=[
      {key:'business',label:'💼 Business',color:'#4caf50'},
      {key:'personal',label:'👤 Personal',color:'#9c27b0'},
    ];
    const active=TABS.find(t=>t.key===activeTab);
    return(
      <div style={{height:'calc(100vh - 105px)',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* Tab switcher */}
        <div style={{display:'flex',alignItems:'stretch',background:'#0a0820',borderBottom:`2px solid ${active.color}`,flexShrink:0}}>
          {TABS.map(tab=>{
            const isActive=activeTab===tab.key;
            return(
              <button key={tab.key} onClick={()=>setActiveTab(tab.key)}
                style={{padding:'10px 32px',border:'none',cursor:'pointer',fontWeight:800,fontSize:13,fontFamily:'inherit',
                  background:isActive?tab.color+'22':'transparent',
                  color:isActive?tab.color:'#475569',
                  borderTop:isActive?`3px solid ${tab.color}`:'3px solid transparent',
                  transition:'all .15s',letterSpacing:.3,display:'flex',alignItems:'center',gap:8}}>
                {tab.label}
                {isActive&&<span style={{fontSize:9,background:tab.color+'33',color:tab.color,padding:'2px 6px',borderRadius:4,fontWeight:700}}>ACTIVE</span>}
              </button>
            );
          })}

  // ── LEDGER VIEW ────────────────────────────────────────────────────────────
