                <div style={{display:'flex',justifyContent:'space-between',borderTop:'1px solid rgba(245,158,11,.3)',paddingTop:6,marginTop:4}}>
                  <span style={{color:'#f59e0b',fontWeight:700}}>Recipient receives:</span>
                  <span style={{fontWeight:900,color:'#22c55e',fontSize:13}}>{peso((parseFloat(transferForm.amount)||0)-(parseFloat(transferForm.fee)||0))}</span>
                </div>
              </div>
            )}

            <div style={{marginBottom:16}}>
              <div className="form-label">Note (optional)</div>
              <input className="form-input" placeholder="e.g. Deposit to Eastwest, GCash cashout…"
                value={transferForm.note} onChange={e=>setTransferForm(f=>({...f,note:e.target.value}))}/>
            </div>

            <div style={{marginBottom:8}}>
              <div className="form-label">Date</div>
              <input type="date" className="form-input" value={transferForm.date} onChange={e=>setTransferForm(f=>({...f,date:e.target.value}))} style={{colorScheme:'dark'}}/>
            </div>

            <button onClick={()=>{
              const amt=parseFloat(transferForm.amount)||0;
              const fee=parseFloat(transferForm.fee)||0;
              if(!transferForm.fromId||!transferForm.toId){alert('Select both accounts.');return;}
              if(transferForm.fromId===transferForm.toId){alert('From and To cannot be the same account.');return;}
              if(amt<=0){alert('Enter a valid amount.');return;}
              const fromAcc=accounts.find(a=>a.id===transferForm.fromId);
              const toAcc=accounts.find(a=>a.id===transferForm.toId);
              const ts=Date.now();
              const note=transferForm.note||`Transfer to ${toAcc?.name}`;
              const noteFrom=transferForm.note||`Transfer from ${fromAcc?.name}`;
              // Debit from source
              const eOut={id:'tr_out_'+ts,date:transferForm.date,accountId:transferForm.fromId,category:'Transfer Out',type:'expense',group:fromAcc?.type||'business',amount:amt,note};
              // Credit to destination (minus fee)
              const eIn={id:'tr_in_'+ts,date:transferForm.date,accountId:transferForm.toId,category:'Transfer In',type:'income',group:toAcc?.type||'business',amount:amt-fee,note:noteFrom};
              // Fee as separate expense on source
              const entries_to_add=[eOut,eIn];
              if(fee>0){
                entries_to_add.push({id:'tr_fee_'+ts,date:transferForm.date,accountId:transferForm.fromId,category:'Bank Charges',type:'expense',group:fromAcc?.type||'business',amount:fee,note:`Transfer fee${note?' ('+note+')':''}`});
              }
              setEntries(p=>[...p,...entries_to_add]);
              setShowTransfer(false);
              setTransferForm({date:today(),fromId:'',toId:'',amount:'',fee:'',note:''});
              showBadge();
            }} style={{width:'100%',padding:'12px 0',background:'linear-gradient(135deg,#b45309,#f59e0b)',border:'none',borderRadius:8,color:'#fff',fontWeight:900,cursor:'pointer',fontSize:14}}>
              ⇄ Confirm Transfer
            </button>
          </div>
        </div>
      )}

      {/* Account Modal */}
      {showAccModal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowAccModal(false)}>
          <div className="modal-box">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div style={{fontWeight:800,fontSize:15,color:'#f1f5f9'}}>🏦 {editAcc?'Edit Account':'New Account'}</div>
              <button onClick={()=>setShowAccModal(false)} style={{background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--muted)',borderRadius:6,padding:'4px 10px',cursor:'pointer',fontSize:14}}>✕</button>
            </div>
            {[['Account Name','name','text','e.g. BDO Business Account'],['Icon','icon','text','💼 💰 🏦 📱 💵'],['Opening Balance','openingBalance','number','0.00']].map(([l,k,t,ph])=>(
              <div key={k} style={{marginBottom:12}}>
                <div className="form-label">{l}</div>
                <input type={t} className="form-input" placeholder={ph} value={accForm[k]||''} onChange={e=>setAccForm(f=>({...f,[k]:e.target.value}))}/>
              </div>
            ))}
            <div style={{marginBottom:12}}>
              <div className="form-label">Type</div>
              <select className="form-input" value={accForm.type} onChange={e=>setAccForm(f=>({...f,type:e.target.value}))}>
                <option value="business">💼 Business</option>
                <option value="personal">👤 Personal</option>
              </select>
            </div>
            <div style={{marginBottom:12}}>
              <div className="form-label">Opening Balance Date</div>
              <input type="date" className="form-input" value={accForm.openingDate||today()} onChange={e=>setAccForm(f=>({...f,openingDate:e.target.value}))} style={{colorScheme:'dark'}}/>
            </div>
            <div style={{marginBottom:16}}>
              <div className="form-label">Color</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {['#00c4d4','#22c55e','#3b82f6','#a855f7','#f59e0b','#ef4444','#ec4899','#8b5cf6'].map(c=>(
                  <div key={c} onClick={()=>setAccForm(f=>({...f,color:c}))} style={{width:28,height:28,borderRadius:'50%',background:c,cursor:'pointer',border:accForm.color===c?'3px solid #fff':'2px solid transparent'}}/>
                ))}
              </div>
            </div>
            <button onClick={saveAcc} style={{width:'100%',padding:'11px 0',background:'linear-gradient(135deg,#1a1560,var(--cyan))',border:'none',borderRadius:8,color:'#fff',fontWeight:800,cursor:'pointer',fontSize:13}}>
              💾 {editAcc?'Update Account':'Add Account'}
            </button>
          </div>
        </div>
      )}

      {/* Settings */}
      {showSettings&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowSettings(false)}>
          <div className="modal-box">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div style={{fontWeight:800,fontSize:15,color:'#f1f5f9'}}>⚙️ Settings</div>
              <button onClick={()=>setShowSettings(false)} style={{background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--muted)',borderRadius:6,padding:'4px 10px',cursor:'pointer',fontSize:14}}>✕</button>
            </div>
            <div style={{marginBottom:14}}>
              <div className="form-label">Company Name</div>
              <input className="form-input" value={company.name||''} onChange={e=>setCompany(c=>({...c,name:e.target.value}))} style={{marginBottom:8}}/>
              <div className="form-label">Tagline</div>
              <input className="form-input" value={company.tagline||''} onChange={e=>setCompany(c=>({...c,tagline:e.target.value}))}/>
            </div>
            <div style={{borderTop:'1px solid var(--border)',paddingTop:14,marginBottom:14}}>
              <div style={{fontWeight:700,fontSize:12,color:'var(--cyan)',marginBottom:10}}>🏷️ Custom Categories</div>
              <div style={{display:'flex',gap:6,marginBottom:8}}>
                <select value={settingsCatKey} onChange={e=>setSettingsCatKey(e.target.value)} style={{flex:1,padding:'6px 8px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:5,color:'var(--text)',fontSize:11,outline:'none',cursor:'pointer'}}>
                  <option value="bizInc">💼 Business Income</option>
                  <option value="bizExp">💼 Business Expense</option>
                  <option value="perInc">👤 Personal Income</option>
                  <option value="perExp">👤 Personal Expense</option>
                </select>
                <input value={settingsCatText} onChange={e=>setSettingsCatText(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter'&&settingsCatText.trim()){addCustomCat(settingsCatKey,settingsCatText.trim());setSettingsCatText('');}}}
                  placeholder="New category name…" style={{flex:2,padding:'6px 8px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:5,color:'var(--text)',fontSize:11,outline:'none'}}/>
                <button onClick={()=>{if(settingsCatText.trim()){addCustomCat(settingsCatKey,settingsCatText.trim());setSettingsCatText('');}}} style={{padding:'6px 12px',background:'var(--cyan)',border:'none',borderRadius:5,color:'#fff',fontWeight:700,cursor:'pointer',fontSize:11}}>Add</button>
              </div>
              {Object.entries({bizInc:'💼 Biz Income',bizExp:'💼 Biz Expense',perInc:'👤 Per Income',perExp:'👤 Per Expense'}).map(([key,label])=>(
                (customCats[key]||[]).map(c=>(
                  <div key={key+c} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 8px',background:'var(--surface2)',borderRadius:5,marginBottom:3}}>
                    <span style={{fontSize:11,color:'#f1f5f9'}}>{c} <span style={{fontSize:9,color:'var(--muted)',marginLeft:4}}>{label}</span></span>
                    <button onClick={()=>removeCustomCat(key,c)} style={{background:'transparent',border:'none',color:'#ef4444',cursor:'pointer',fontSize:11}}>✕</button>
                  </div>
                ))
              ))}
            </div>
            <div style={{borderTop:'1px solid var(--border)',paddingTop:14,marginBottom:14}}>
              <div style={{fontWeight:700,fontSize:12,color:'var(--cyan)',marginBottom:8}}>🔒 Passcode</div>
              <div style={{fontSize:11,color:'var(--muted)',marginBottom:10}}>
                {localStorage.getItem(PASSCODE_KEY)?'Passcode is set. Change or remove it below.':'No passcode set.'}
              </div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>{setShowSettings(false);localStorage.removeItem(PASSCODE_KEY);setLocked(true);}}
                  style={{flex:1,padding:'8px 0',background:'rgba(0,196,212,.1)',border:'1px solid var(--cyan)',borderRadius:7,color:'var(--cyan)',fontWeight:700,cursor:'pointer',fontSize:12}}>
                  🔑 {localStorage.getItem(PASSCODE_KEY)?'Change Passcode':'Set Passcode'}
                </button>
                {localStorage.getItem(PASSCODE_KEY)&&(
                  <button onClick={()=>{if(window.confirm('Remove passcode? The app will no longer ask for a PIN.')){localStorage.removeItem(PASSCODE_KEY);showBadge();}}}
                    style={{flex:1,padding:'8px 0',background:'rgba(239,68,68,.08)',border:'1px solid #ef4444',borderRadius:7,color:'#ef4444',fontWeight:700,cursor:'pointer',fontSize:12}}>
                    🗑 Remove Passcode
                  </button>
                )}
              </div>
            </div>
            <div style={{borderTop:'1px solid var(--border)',paddingTop:14,marginBottom:14}}>
              <div style={{fontWeight:700,fontSize:12,color:'var(--cyan)',marginBottom:6}}>☁️ Google Drive Sync</div>
              <div style={{fontSize:11,color:'var(--muted)',marginBottom:10,lineHeight:1.6}}>
                {getClientId()?'Google OAuth Client ID is configured. Click Connect to sign in and sync your data.':'No Client ID set. You need a Google OAuth Client ID to enable Drive sync.'}
                {lastSync&&<div style={{color:'#22c55e',marginTop:4}}>Last synced: {lastSync}</div>}
              </div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                <button onClick={()=>{setShowSettings(false);setShowDriveSetup(true);}}
                  style={{flex:1,padding:'8px 0',background:'rgba(66,133,244,.12)',border:'1px solid #4285f4',borderRadius:7,color:'#4285f4',fontWeight:700,cursor:'pointer',fontSize:12,minWidth:120}}>
                  ⚙️ {getClientId()?'Change Client ID':'Setup Client ID'}
                </button>
                {getClientId()&&(
                  <button onClick={()=>{setShowSettings(false);driveSignIn();}}
                    style={{flex:1,padding:'8px 0',background:GDrive.getToken()?'rgba(34,197,94,.1)':'rgba(66,133,244,.12)',border:`1px solid ${GDrive.getToken()?'#22c55e':'#4285f4'}`,borderRadius:7,color:GDrive.getToken()?'#22c55e':'#4285f4',fontWeight:700,cursor:'pointer',fontSize:12,minWidth:120}}>
                    {GDrive.getToken()?'☁️ Sync Now':'🔗 Connect Drive'}
                  </button>
                )}
                {GDrive.getToken()&&(
                  <button onClick={()=>{GDrive.clearToken();setDriveStatus('idle');setDriveMsg('');}}
                    style={{padding:'8px 12px',background:'rgba(239,68,68,.08)',border:'1px solid #ef4444',borderRadius:7,color:'#ef4444',fontWeight:700,cursor:'pointer',fontSize:12}}>
                    Sign Out
                  </button>
                )}
              </div>
              <div style={{marginTop:8,padding:'8px 10px',background:'rgba(245,158,11,.06)',border:'1px solid rgba(245,158,11,.2)',borderRadius:6,fontSize:10,color:'#f59e0b',lineHeight:1.6}}>
                ⚠️ Drive sync requires a <b>Google Cloud OAuth 2.0 Client ID</b>. Go to console.cloud.google.com → APIs & Services → Credentials → Create OAuth Client ID (Web App). Add this file's URL to Authorized Origins.
              </div>
            </div>
            <div style={{borderTop:'1px solid var(--border)',paddingTop:14,marginBottom:14}}>
              <div style={{fontWeight:700,fontSize:12,color:'var(--cyan)',marginBottom:8}}>💾 Backup & Restore</div>
              <button onClick={()=>{
                const d={version:1,exported:new Date().toISOString(),entries,accounts,customCats,company};
                const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
                const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='breeks_finance_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(url);
              }} style={{width:'100%',padding:'9px 0',background:'linear-gradient(135deg,#1a1560,#2d2080)',border:'none',borderRadius:7,color:'#fff',fontWeight:700,cursor:'pointer',fontSize:12,marginBottom:8}}>⬇️ Export Backup (JSON)</button>
              <input type="file" accept=".json" id="fin-restore" style={{display:'none'}} onChange={e=>{
                if(!e.target.files[0])return;
                const r=new FileReader();
                r.onload=ev=>{
                  try{
                    const d=JSON.parse(ev.target.result);
                    if(!d.version||!d.entries){alert('Invalid backup file.');return;}
                    if(!window.confirm('Restore backup? This will replace all current data.'))return;
                    if(d.entries)setEntries(d.entries);
                    if(d.accounts)setAccounts(d.accounts);
                    if(d.customCats)setCustomCats(d.customCats);
                    if(d.company)setCompany(d.company);
                    setShowSettings(false);showBadge();
                  }catch(err){alert('Failed to parse backup: '+err.message);}
                };
                r.readAsText(e.target.files[0]);e.target.value='';
              }}/>
              <button onClick={()=>document.getElementById('fin-restore').click()} style={{width:'100%',padding:'9px 0',background:'rgba(245,158,11,.1)',border:'1.5px solid #f59e0b',borderRadius:7,color:'#f59e0b',fontWeight:700,cursor:'pointer',fontSize:12,marginBottom:8}}>⬆️ Import / Restore</button>
            </div>
            <div style={{borderTop:'1px solid var(--border)',paddingTop:12}}>
              <button onClick={()=>{if(window.confirm('Clear ALL data? This cannot be undone.')){setEntries([]);setAccounts(DEFAULT_ACCOUNTS);showBadge();setShowSettings(false);}}} style={{width:'100%',padding:'8px 0',background:'rgba(239,68,68,.08)',border:'1px solid #ef4444',borderRadius:7,color:'#ef4444',fontWeight:700,cursor:'pointer',fontSize:12}}>🗑 Clear All Data</button>
            </div>
          </div>
        </div>
      )}
      {/* Google Drive Setup Modal */}
      {showDriveSetup&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowDriveSetup(false)}>
          <div className="modal-box" style={{maxWidth:460}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div style={{fontWeight:800,fontSize:15,color:'#f1f5f9'}}>☁️ Google Drive Setup</div>
              <button onClick={()=>setShowDriveSetup(false)} style={{background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--muted)',borderRadius:6,padding:'4px 10px',cursor:'pointer',fontSize:14}}>✕</button>
            </div>
            <div style={{background:'rgba(66,133,244,.08)',border:'1px solid rgba(66,133,244,.2)',borderRadius:8,padding:'12px 14px',marginBottom:14,fontSize:11,color:'#93c5fd',lineHeight:1.8}}>
              <b style={{color:'#60a5fa',fontSize:12}}>How to get your Client ID:</b><br/>
              1. Go to <b>console.cloud.google.com</b><br/>
              2. Create a project → APIs & Services → Library<br/>
              3. Enable <b>Google Drive API</b><br/>
              4. Credentials → Create <b>OAuth 2.0 Client ID</b><br/>
              5. Application type: <b>Web Application</b><br/>
              6. Authorized JavaScript Origins → add your file URL<br/>
              7. Copy the Client ID and paste below
            </div>
            <div style={{marginBottom:12}}>
              <div className="form-label">Google OAuth 2.0 Client ID</div>
              <input className="form-input" placeholder="xxxxxxxx.apps.googleusercontent.com"
                value={clientIdInput} onChange={e=>setClientIdInput(e.target.value)}
                style={{fontFamily:'monospace',fontSize:11}}/>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>{
                if(!clientIdInput.trim()){alert('Paste your Client ID first.');return;}
                localStorage.setItem('fin2_client_id',clientIdInput.trim());
                setShowDriveSetup(false);
                setTimeout(()=>driveSignIn(),300);
              }} style={{flex:2,padding:'10px 0',background:'linear-gradient(135deg,#1a56db,#3b82f6)',border:'none',borderRadius:7,color:'#fff',fontWeight:800,cursor:'pointer',fontSize:13}}>
                🔗 Save & Connect to Drive
              </button>
              <button onClick={()=>{
                if(window.confirm('Remove Drive setup?')){
                  localStorage.removeItem('fin2_client_id');
                  setClientIdInput('');GDrive.clearToken();
                  setDriveStatus('idle');setDriveMsg('');
                  setShowDriveSetup(false);
                }
              }} style={{flex:1,padding:'10px 0',background:'rgba(239,68,68,.08)',border:'1px solid #ef4444',borderRadius:7,color:'#ef4444',fontWeight:700,cursor:'pointer',fontSize:12}}>
                Remove
              </button>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
(function(){
  // Load React, ReactDOM, then Babel, then compile JSX
  function loadScript(src, cb){
    var s=document.createElement('script');s.src=src;s.onload=cb;document.head.appendChild(s);
  }
  loadScript('https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js',function(){
    loadScript('https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js',function(){
      loadScript('https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js',function(){
        var s=document.getElementById('jsx-source');
        if(!s)return;
        try{
          var compiled=Babel.transform(s.textContent,{presets:['react'],plugins:['proposal-optional-chaining','proposal-nullish-coalescing-operator'],compact:false,sourceType:'script'}).code;
          var x=document.createElement('script');x.textContent=compiled;document.head.appendChild(x);
        }catch(e){console.error('Babel error:',e);document.getElementById('root').innerHTML='<div style="color:red;padding:20px">Error: '+e.message+'</div>';}
      });
    });
  });
})();
</script>
</body>
</html>
