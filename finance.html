  // ── BUDGETS VIEW ──────────────────────────────────────────────────────────
  const BudgetsView=()=>{
    const[mainTab,setMainTab]=useState('budgets'); // 'budgets' | 'plans'
    const[budgetTab,setBudgetTab]=useState('business');
    const[showAddBudget,setShowAddBudget]=useState(false);
    const[editBudget,setEditBudget]=useState(null);
    const[bForm,setBForm]=useState({category:'',type:'expense',group:'business',limit:'',period:'monthly',startDate:new Date().toISOString().slice(0,7)});

    // ── Purchase Plans state ──
    const[plans,setPlans]=useLS('fin2_plans',[]);
    const[showPlanForm,setShowPlanForm]=useState(false);
    const[editPlan,setEditPlan]=useState(null);
    const emptyPlan=()=>({name:'',supplier:'',orderDate:'',deliveryDate:'',notes:'',status:'Draft',group:'business',items:[{id:'i_'+Date.now(),description:'',qty:1,unit:'pcs',unitPrice:''}]});
    const[planForm,setPlanForm]=useState(emptyPlan());

    const addPlanItem=()=>setPlanForm(f=>({...f,items:[...f.items,{id:'i_'+Date.now(),description:'',qty:1,unit:'pcs',unitPrice:''}]}));
    const removePlanItem=(id)=>setPlanForm(f=>({...f,items:f.items.filter(x=>x.id!==id)}));
    const updatePlanItem=(id,field,val)=>setPlanForm(f=>({...f,items:f.items.map(x=>x.id===id?{...x,[field]:val}:x)}));

    const planTotal=(plan)=>(plan.items||[]).reduce((s,x)=>s+(parseFloat(x.qty)||0)*(parseFloat(x.unitPrice)||0),0);

    const savePlan=()=>{
      if(!planForm.name.trim()){alert('Enter a plan name.');return;}
      if(!planForm.items.some(x=>x.description.trim()&&parseFloat(x.unitPrice)>0)){alert('Add at least one item with description and price.');return;}
      const p={...planForm,id:editPlan?editPlan.id:'pl_'+Date.now()+'_'+Math.random().toString(36).slice(2,5)};
      if(editPlan)setPlans(prev=>prev.map(x=>x.id===p.id?p:x));
      else setPlans(prev=>[p,...prev]);
      setShowPlanForm(false);setEditPlan(null);setPlanForm(emptyPlan());showBadge();
    };

    const deletePlan=(id)=>{if(window.confirm('Delete this purchase plan?'))setPlans(prev=>prev.filter(x=>x.id!==id));};

    const STATUS_COLORS={Draft:'#64748b',Approved:'#3b82f6',Ordered:'#f59e0b',Received:'#22c55e',Cancelled:'#ef4444'};

    // Period date range
    const getPeriodRange=(b)=>{
      if(b.period==='monthly'){
        const[y,m]=b.startDate.split('-');
        const from=`${y}-${m}-01`;
        const to=new Date(y,parseInt(m),0).toISOString().slice(0,10);
        return{from,to};
      }
      return{from:b.startDate,to:b.endDate||today()};
    };

    // Actual spent for a budget
    const getActual=(b)=>{
      const{from,to}=getPeriodRange(b);
      return entries.filter(e=>{
        const info=CAT_TYPE[e.category]||{};
        const grp=e.group||info.group||'business';
        const typ=info.type||e.type||'income';
        return e.category===b.category&&grp===b.group&&typ===b.type&&e.date>=from&&e.date<=to;
      }).reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
    };

    const saveBudget=()=>{
      if(!bForm.category){alert('Select a category.');return;}
      if(!bForm.limit||parseFloat(bForm.limit)<=0){alert('Enter a valid limit.');return;}
      const b={...bForm,id:editBudget?editBudget.id:'b_'+Date.now(),limit:parseFloat(bForm.limit)};
      if(editBudget)setBudgets(p=>p.map(x=>x.id===b.id?b:x));
      else setBudgets(p=>[...p,b]);
      setShowAddBudget(false);setEditBudget(null);
      setBForm({category:'',type:'expense',group:budgetTab,limit:'',period:'monthly',startDate:new Date().toISOString().slice(0,7)});
      showBadge();
    };

    const deleteBudget=(id)=>{if(window.confirm('Delete this budget?'))setBudgets(p=>p.filter(b=>b.id!==id));};

    const grpBudgets=budgets.filter(b=>b.group===budgetTab);
    const expBudgets=grpBudgets.filter(b=>b.type==='expense');
    const incBudgets=grpBudgets.filter(b=>b.type==='income');

    // Summary totals
    const totalBudgeted=expBudgets.reduce((s,b)=>s+b.limit,0);
    const totalSpent=expBudgets.reduce((s,b)=>s+getActual(b),0);
    const overCount=expBudgets.filter(b=>getActual(b)>b.limit).length;

    const BudgetCard=({b})=>{
      const actual=getActual(b);
      const pct=b.limit>0?Math.min((actual/b.limit)*100,100):0;
      const over=actual>b.limit;
      const warn=pct>=80&&!over;
      const color=over?'#ef4444':warn?'#f59e0b':'#22c55e';
      const barColor=over?'linear-gradient(90deg,#ef4444,#dc2626)':warn?'linear-gradient(90deg,#f59e0b,#d97706)':'linear-gradient(90deg,#22c55e,#16a34a)';
      const isInc=b.type==='income';
      const{from,to}=getPeriodRange(b);
      return(
        <div style={{background:'var(--surface)',border:`1px solid ${over?'#ef444440':warn?'#f59e0b40':'var(--border)'}`,borderRadius:10,padding:'14px 16px',borderLeft:`4px solid ${color}`}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
            <div>
              <div style={{fontSize:13,fontWeight:800,color:'#f1f5f9'}}>{b.category}</div>
              <div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>
                {b.period==='monthly'?`${new Date(from).toLocaleDateString('en-PH',{month:'long',year:'numeric'})}`:
                `${new Date(from).toLocaleDateString('en-PH',{month:'short',day:'2-digit'})} – ${new Date(to).toLocaleDateString('en-PH',{month:'short',day:'2-digit'})}`}
                {' · '}<span style={{color:isInc?'#22c55e':'#94a3b8'}}>{isInc?'Income target':'Expense limit'}</span>
              </div>
            </div>
            <div style={{display:'flex',gap:6,alignItems:'center'}}>
              {over&&<span style={{fontSize:10,fontWeight:700,color:'#ef4444',background:'rgba(239,68,68,.12)',padding:'2px 8px',borderRadius:6}}>🔴 Over budget</span>}
              {warn&&<span style={{fontSize:10,fontWeight:700,color:'#f59e0b',background:'rgba(245,158,11,.12)',padding:'2px 8px',borderRadius:6}}>⚠️ Near limit</span>}
              <button onClick={()=>{setEditBudget(b);setBForm({...b,limit:String(b.limit)});setShowAddBudget(true);}}
                style={{padding:'3px 8px',background:'rgba(168,85,247,.1)',border:'1px solid #a855f7',color:'#c084fc',borderRadius:5,cursor:'pointer',fontSize:10,fontWeight:700}}>✏️</button>
              <button onClick={()=>deleteBudget(b.id)}
                style={{padding:'3px 8px',background:'rgba(239,68,68,.08)',border:'1px solid #ef4444',color:'#ef4444',borderRadius:5,cursor:'pointer',fontSize:10,fontWeight:700}}>🗑</button>
            </div>
          </div>
          {/* Progress bar */}
          <div style={{marginBottom:8}}>
            <div style={{height:10,background:'var(--surface2)',borderRadius:5,overflow:'hidden',marginBottom:4}}>
              <div style={{width:`${pct}%`,height:'100%',background:barColor,borderRadius:5,transition:'width .4s'}}/>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11}}>
              <span style={{color:color,fontWeight:700}}>{peso(actual)} used</span>
              <span style={{color:'var(--muted)'}}>{peso(b.limit)} {isInc?'target':'limit'}</span>
            </div>
          </div>
          {/* Remaining / over */}
          <div style={{display:'flex',justifyContent:'space-between',padding:'6px 10px',background:over?'rgba(239,68,68,.08)':warn?'rgba(245,158,11,.06)':'rgba(34,197,94,.06)',borderRadius:7}}>
            <span style={{fontSize:11,color:'var(--muted)'}}>{over?'Over by:':isInc?'Still needed:':'Remaining:'}</span>
            <span style={{fontSize:13,fontWeight:900,color}}>{peso(Math.abs(b.limit-actual))}</span>
          </div>
          {/* Percentage */}
          <div style={{marginTop:6,textAlign:'right',fontSize:10,color:'var(--muted)'}}>{pct.toFixed(0)}% {isInc?'of target reached':'of budget used'}</div>
        </div>
      );
    };

    return(
      <div style={{padding:16,maxWidth:1100,margin:'0 auto'}}>

        {/* Main tab: Budgets vs Purchase Plans */}
        <div style={{display:'flex',gap:0,marginBottom:20,borderBottom:'2px solid var(--border)'}}>
          {[['budgets','💰 Budgets'],['plans','📦 Purchase Plans']].map(([t,l])=>(
            <button key={t} onClick={()=>setMainTab(t)}
              style={{padding:'10px 24px',border:'none',cursor:'pointer',fontWeight:800,fontSize:13,fontFamily:'inherit',
                background:'transparent',color:mainTab===t?'var(--cyan)':'#475569',
                borderBottom:mainTab===t?'2px solid var(--cyan)':'2px solid transparent',
                marginBottom:-2,transition:'all .15s'}}>
              {l}

          ))}

        {/* ── PURCHASE PLANS TAB ── */}
        {mainTab==='plans'&&(

            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>

                <div style={{fontSize:18,fontWeight:900,color:'#f1f5f9'}}>📦 Purchase Plans</div>

              </div>
              <button onClick={()=>{setEditPlan(null);setPlanForm(emptyPlan());setShowPlanForm(true);}}
                style={{padding:'9px 20px',background:'linear-gradient(135deg,#1a1560,#0e7490)',border:'none',borderRadius:8,color:'#fff',fontWeight:800,cursor:'pointer',fontSize:13}}>

            {/* Summary */}
            {plans.length>0&&(()=>{
              const active=plans.filter(p=>p.status!=='Cancelled');
              const tot=active.reduce((s,p)=>s+planTotal(p),0);
              const byStatus={'Draft':0,'Approved':0,'Ordered':0,'Received':0};
              active.forEach(p=>{if(byStatus[p.status]!==undefined)byStatus[p.status]++;});
              return(

  // ── LIABILITIES VIEW ──────────────────────────────────────────────────────
  const LiabilitiesView=()=>{
    const[showForm,setShowForm]=useState(false);
    const[editLia,setEditLia]=useState(null);
    const[showPayModal,setShowPayModal]=useState(null); // liability id
    const[payAmt,setPayAmt]=useState('');
    const[payNote,setPayNote]=useState('');
    const[payAcc,setPayAcc]=useState('');
    const[payDate,setPayDate]=useState(today());
    const[filterType,setFilterType]=useState('all');
    const[filterStatus,setFilterStatus]=useState('all');

    const emptyForm={
      name:'',type:'Supplier Payable',customType:'',
      group:'business',totalAmount:'',paidAmount:'0',
      interestRate:'',monthlyPayment:'',
      dueDate:'',startDate:today(),notes:'',status:'Active',
      creditor:'',referenceNo:'',
    };
    const[form,setForm]=useState(emptyForm);

    const LIABILITY_TYPES=[
      'Supplier Payable','Bank Loan','Credit Card','Personal Debt',
      'Government Loan','Mortgage','Car Loan','Equipment Loan',
      'Cash Advance','Security Deposit','Other',
    ];

    const saveLia=()=>{
      if(!form.name.trim()){alert('Enter a name/description.');return;}
      if(!form.totalAmount||parseFloat(form.totalAmount)<=0){alert('Enter the total amount.');return;}
      const l={...form,
        id:editLia?editLia.id:'l_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
        totalAmount:parseFloat(form.totalAmount)||0,
        paidAmount:parseFloat(form.paidAmount)||0,
        monthlyPayment:parseFloat(form.monthlyPayment)||0,
        interestRate:parseFloat(form.interestRate)||0,
        payments:editLia?.payments||[],
      };
      if(editLia)setLiabilities(p=>p.map(x=>x.id===l.id?l:x));
      else setLiabilities(p=>[l,...p]);
      setShowForm(false);setEditLia(null);setForm(emptyForm);showBadge();
    };

    const deleteLia=(id)=>{
      if(window.confirm('Delete this liability? All payment records will also be removed.'))
        setLiabilities(p=>p.filter(x=>x.id!==id));
    };

    const recordPayment=()=>{
      const amt=parseFloat(payAmt)||0;
      if(amt<=0){alert('Enter a valid amount.');return;}
      if(!payAcc){alert('Select account to pay from.');return;}
      const l=liabilities.find(x=>x.id===showPayModal);
      if(!l)return;
      const newPaid=l.paidAmount+amt;
      const newStatus=newPaid>=l.totalAmount-0.01?'Paid':l.status;
      // Update liability
      const payment={id:'lp_'+Date.now(),date:payDate,amount:amt,accountId:payAcc,note:payNote};
      setLiabilities(p=>p.map(x=>x.id===l.id?{...x,paidAmount:newPaid,status:newStatus,payments:[...(x.payments||[]),payment]}:x));
      // Record journal entry
      const acc=accounts.find(a=>a.id===payAcc);
      const grp=acc?.type||l.group||'business';
      const catMap={'Bank Loan':'Loan Payment','Car Loan':'Loan Payment','Government Loan':'Loan Payment','Equipment Loan':'Loan Payment','Mortgage':'Loan Payment','Credit Card':'Bank Charges'};
      const cat=catMap[l.type]||'Loan Payment';
      setEntries(prev=>[...prev,{
        id:'le_'+Date.now(),date:payDate,accountId:payAcc,
        category:cat,type:'expense',group:grp,
        amount:amt,note:payNote||(l.name+' payment'),
      }]);
      setShowPayModal(null);setPayAmt('');setPayNote('');setPayAcc('');setPayDate(today());
      showBadge();
    };

    const filtered=liabilities.filter(l=>{
      if(filterType!=='all'&&(l.type!==filterType)&&!(filterType==='Other'&&!LIABILITY_TYPES.includes(l.type)))return false;
      if(filterStatus!=='all'&&l.status!==filterStatus)return false;
      return true;
    });

    const totalOwed=filtered.reduce((s,l)=>s+(l.totalAmount-l.paidAmount),0);
    const totalPaid=filtered.reduce((s,l)=>s+l.paidAmount,0);
    const overdueCount=filtered.filter(l=>l.dueDate&&l.dueDate<today()&&l.status==='Active').length;
    const activeCount=filtered.filter(l=>l.status==='Active').length;

    const statusColor={Active:'#f59e0b',Paid:'#22c55e',Overdue:'#ef4444',Paused:'#64748b'};
    const typeIcon={'Supplier Payable':'📦','Bank Loan':'🏦','Credit Card':'💳','Personal Debt':'🤝','Government Loan':'🏛️','Mortgage':'🏠','Car Loan':'🚗','Equipment Loan':'⚙️','Cash Advance':'💵','Security Deposit':'🔑','Other':'📋'};

    return(
      <div style={{padding:16,maxWidth:1100,margin:'0 auto'}}>

        {/* Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>
          <div>
            <div style={{fontSize:20,fontWeight:900,color:'#f1f5f9'}}>📋 Liabilities Tracker</div>
            <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>Track everything you owe — suppliers, loans, credit cards, and more</div>
          </div>
          <button onClick={()=>{setEditLia(null);setForm(emptyForm);setShowForm(true);}}
            style={{padding:'9px 20px',background:'linear-gradient(135deg,#1a1560,#7c3aed)',border:'none',borderRadius:8,color:'#fff',fontWeight:800,cursor:'pointer',fontSize:13}}>
            ＋ Add Liability
          </button>
        </div>

        {/* Summary cards */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:10,marginBottom:16}}>
          {[
            {l:'Total Owed',v:peso(totalOwed),c:'#ef4444',ic:'💸',bg:'rgba(239,68,68,.08)'},
            {l:'Total Paid',v:peso(totalPaid),c:'#22c55e',ic:'✅',bg:'rgba(34,197,94,.08)'},
            {l:'Active',v:activeCount+' items',c:'#f59e0b',ic:'📋',bg:'rgba(245,158,11,.08)'},
            {l:'Overdue',v:overdueCount+' items',c:overdueCount>0?'#ef4444':'#22c55e',ic:overdueCount>0?'🔴':'✅',bg:overdueCount>0?'rgba(239,68,68,.08)':'rgba(34,197,94,.08)'},
          ].map(x=>(
            <div key={x.l} style={{background:x.bg,border:`1px solid ${x.c}30`,borderRadius:10,padding:'12px 14px'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                <span style={{fontSize:9,fontWeight:700,color:x.c,textTransform:'uppercase',letterSpacing:.7}}>{x.l}</span>
                <span style={{fontSize:16}}>{x.ic}</span>
              </div>
              <div style={{fontSize:17,fontWeight:900,color:'#f1f5f9'}}>{x.v}</div>
            </div>
          ))}
        </div>

        {/* Filters */}
        <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
          <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}
            style={{padding:'6px 10px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:11,outline:'none',cursor:'pointer'}}>
            <option value="all">All Statuses</option>
            {['Active','Paid','Overdue','Paused'].map(s=><option key={s}>{s}</option>)}
          </select>
          <select value={filterType} onChange={e=>setFilterType(e.target.value)}
            style={{padding:'6px 10px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:11,outline:'none',cursor:'pointer'}}>
            <option value="all">All Types</option>
            {LIABILITY_TYPES.map(t=><option key={t}>{t}</option>)}
          </select>
        </div>

        {/* Liability cards */}
        {filtered.length===0?(
          <div style={{padding:'40px 20px',textAlign:'center',background:'var(--surface)',borderRadius:12,border:'1px dashed var(--border)',color:'var(--muted)'}}>
            <div style={{fontSize:32,marginBottom:8}}>📋</div>
            <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>No liabilities recorded</div>
            <div style={{fontSize:11}}>Click ＋ Add Liability to track what you owe</div>
          </div>
        ):(
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:12}}>
            {filtered.map(l=>{
              const balance=l.totalAmount-l.paidAmount;
              const pct=l.totalAmount>0?Math.min((l.paidAmount/l.totalAmount)*100,100):0;
              const isOverdue=l.dueDate&&l.dueDate<today()&&l.status==='Active';
              const sc=statusColor[isOverdue?'Overdue':l.status]||'#64748b';
              const icon=typeIcon[l.type]||'📋';
              return(
                <div key={l.id} style={{background:'var(--surface)',border:`1px solid ${isOverdue?'#ef444460':sc+'30'}`,borderRadius:12,overflow:'hidden',borderTop:`3px solid ${isOverdue?'#ef4444':sc}`}}>
                  {/* Card header */}
                  <div style={{padding:'12px 14px',borderBottom:'1px solid var(--border)'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                      <div style={{display:'flex',gap:8,alignItems:'center',flex:1,minWidth:0}}>
                        <span style={{fontSize:20,flexShrink:0}}>{icon}</span>
                        <div style={{minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:800,color:'#f1f5f9',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.name}</div>
                          <div style={{fontSize:10,color:'var(--muted)',marginTop:1}}>{l.type}{l.creditor?' · '+l.creditor:''}</div>
                        </div>
                      </div>
                      <div style={{display:'flex',gap:5,flexShrink:0,marginLeft:8}}>
                        <span style={{padding:'2px 8px',borderRadius:5,fontSize:9,fontWeight:700,background:sc+'20',color:sc}}>
                          {isOverdue?'Overdue':l.status}
                        </span>
                        <span style={{padding:'2px 6px',borderRadius:5,fontSize:9,fontWeight:700,background:'rgba(255,255,255,.05)',color:'var(--muted)'}}>
                          {l.group==='business'?'💼':'👤'}
                        </span>
                      </div>
                    </div>
                    {/* Amounts */}
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
                      <div>
                        <div style={{fontSize:10,color:'var(--muted)',marginBottom:2}}>Balance Remaining</div>
                        <div style={{fontSize:22,fontWeight:900,color:balance>0?'#ef4444':'#22c55e'}}>{peso(balance)}</div>
                      </div>
                      <div style={{textAlign:'right'}}>
                        <div style={{fontSize:10,color:'var(--muted)',marginBottom:2}}>Total</div>
                        <div style={{fontSize:13,fontWeight:700,color:'var(--muted)'}}>{peso(l.totalAmount)}</div>
                      </div>
                    </div>
                  </div>

                  {/* Progress bar */}
                  <div style={{padding:'10px 14px',borderBottom:'1px solid var(--border)'}}>
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--muted)',marginBottom:4}}>
                      <span>Paid: {peso(l.paidAmount)}</span>
                      <span>{pct.toFixed(0)}% paid</span>
                    </div>
                    <div style={{height:8,background:'var(--surface2)',borderRadius:4,overflow:'hidden'}}>
                      <div style={{width:`${pct}%`,height:'100%',background:'linear-gradient(90deg,#22c55e,#16a34a)',borderRadius:4,transition:'width .4s'}}/>
                    </div>
                  </div>

                  {/* Details */}
                  <div style={{padding:'8px 14px',borderBottom:'1px solid var(--border)',display:'flex',gap:16,flexWrap:'wrap'}}>
                    {l.dueDate&&<div>
                      <div style={{fontSize:9,color:'var(--muted)',marginBottom:1}}>DUE DATE</div>
                      <div style={{fontSize:11,fontWeight:700,color:isOverdue?'#ef4444':'#f1f5f9'}}>{new Date(l.dueDate).toLocaleDateString('en-PH',{month:'short',day:'2-digit',year:'numeric'})}{isOverdue?' ⚠️':''}</div>
                    </div>}
                    {l.monthlyPayment>0&&<div>
                      <div style={{fontSize:9,color:'var(--muted)',marginBottom:1}}>MONTHLY</div>
                      <div style={{fontSize:11,fontWeight:700,color:'#f1f5f9'}}>{peso(l.monthlyPayment)}</div>
                    </div>}
                    {l.interestRate>0&&<div>
                      <div style={{fontSize:9,color:'var(--muted)',marginBottom:1}}>INTEREST</div>
                      <div style={{fontSize:11,fontWeight:700,color:'#f59e0b'}}>{l.interestRate}% p.a.</div>
                    </div>}
                    {l.referenceNo&&<div>
                      <div style={{fontSize:9,color:'var(--muted)',marginBottom:1}}>REF #</div>
                      <div style={{fontSize:11,fontWeight:600,color:'#f1f5f9'}}>{l.referenceNo}</div>
                    </div>}
                  </div>

                  {/* Payment history mini */}
                  {(l.payments||[]).length>0&&(
                    <div style={{padding:'6px 14px',borderBottom:'1px solid var(--border)',maxHeight:80,overflowY:'auto'}}>
                      {(l.payments||[]).slice(-3).reverse().map((p,i)=>(
                        <div key={p.id||i} style={{display:'flex',justifyContent:'space-between',fontSize:10,padding:'2px 0',color:'var(--muted)'}}>
                          <span>{new Date(p.date).toLocaleDateString('en-PH',{month:'short',day:'2-digit'})} {p.note&&'· '+p.note}</span>
                          <span style={{color:'#22c55e',fontWeight:700}}>-{peso(p.amount)}</span>
                        </div>
                      ))}
                    </div>
                  )}

                  {/* Notes */}
                  {l.notes&&<div style={{padding:'6px 14px',fontSize:10,color:'var(--muted)',fontStyle:'italic',borderBottom:'1px solid var(--border)'}}>{l.notes}</div>}

                  {/* Actions */}
                  <div style={{padding:'8px 10px',display:'flex',gap:6}}>
                    {balance>0.01&&l.status!=='Paid'&&(
                      <button onClick={()=>{setShowPayModal(l.id);setPayAmt(l.monthlyPayment>0?String(l.monthlyPayment):'');setPayDate(today());setPayNote('');setPayAcc('');}}
                        style={{flex:2,padding:'7px 0',background:'linear-gradient(135deg,#15803d,#22c55e)',border:'none',borderRadius:6,color:'#fff',fontWeight:800,cursor:'pointer',fontSize:12}}>
                        💳 Record Payment
                      </button>
                    )}
                    <button onClick={()=>{setEditLia(l);setForm({...l,totalAmount:String(l.totalAmount),paidAmount:String(l.paidAmount),monthlyPayment:String(l.monthlyPayment||''),interestRate:String(l.interestRate||'')});setShowForm(true);}}
                      style={{flex:1,padding:'7px 0',background:'rgba(168,85,247,.1)',border:'1px solid #a855f7',color:'#c084fc',borderRadius:6,cursor:'pointer',fontSize:12,fontWeight:700}}>
                      ✏️ Edit
                    </button>
                    <button onClick={()=>deleteLia(l.id)}
                      style={{flex:1,padding:'7px 0',background:'rgba(239,68,68,.08)',border:'1px solid #ef4444',color:'#ef4444',borderRadius:6,cursor:'pointer',fontSize:12,fontWeight:700}}>
                      🗑
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Add/Edit Liability Modal */}
        {showForm&&(
          <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&(setShowForm(false),setEditLia(null))}>
            <div className="modal-box" style={{maxWidth:500}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                <div style={{fontWeight:800,fontSize:15,color:'#f1f5f9'}}>{editLia?'✏️ Edit Liability':'＋ Add Liability'}</div>
                <button onClick={()=>{setShowForm(false);setEditLia(null);}} style={{background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--muted)',borderRadius:6,padding:'4px 10px',cursor:'pointer',fontSize:14}}>✕</button>
              </div>

              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
                <div style={{gridColumn:'1/-1'}}>
                  <div className="form-label">Description / Name *</div>
                  <input className="form-input" placeholder="e.g. ADLUX Invoice #123, BDO Business Loan…" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
                </div>
                <div>
                  <div className="form-label">Type *</div>
                  <select className="form-input" value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>
                    {LIABILITY_TYPES.map(t=><option key={t}>{t}</option>)}
                  </select>
                </div>
                <div>
                  <div className="form-label">Group</div>
                  <select className="form-input" value={form.group} onChange={e=>setForm(f=>({...f,group:e.target.value}))}>
                    <option value="business">💼 Business</option>
                    <option value="personal">👤 Personal</option>
                  </select>
                </div>
                <div>
                  <div className="form-label">Creditor / Bank / Supplier</div>
                  <input className="form-input" placeholder="e.g. ADLUX, BDO, Juan dela Cruz" value={form.creditor||''} onChange={e=>setForm(f=>({...f,creditor:e.target.value}))}/>
                </div>
                <div>
                  <div className="form-label">Reference / Invoice No.</div>
                  <input className="form-input" placeholder="e.g. INV-2024-001" value={form.referenceNo||''} onChange={e=>setForm(f=>({...f,referenceNo:e.target.value}))}/>
                </div>
                <div>
                  <div className="form-label">Total Amount (₱) *</div>
                  <input type="number" min="0" step="0.01" className="form-input" placeholder="0.00" value={form.totalAmount} onChange={e=>setForm(f=>({...f,totalAmount:e.target.value}))} style={{fontSize:16,fontWeight:700,color:'#ef4444'}}/>
                </div>
                <div>
                  <div className="form-label">Already Paid (₱)</div>
                  <input type="number" min="0" step="0.01" className="form-input" placeholder="0.00" value={form.paidAmount} onChange={e=>setForm(f=>({...f,paidAmount:e.target.value}))} style={{color:'#22c55e'}}/>
                </div>
                <div>
                  <div className="form-label">Monthly Payment (₱)</div>
                  <input type="number" min="0" step="0.01" className="form-input" placeholder="0.00 (optional)" value={form.monthlyPayment||''} onChange={e=>setForm(f=>({...f,monthlyPayment:e.target.value}))}/>
                </div>
                <div>
                  <div className="form-label">Interest Rate (% p.a.)</div>
                  <input type="number" min="0" step="0.01" className="form-input" placeholder="0.00 (optional)" value={form.interestRate||''} onChange={e=>setForm(f=>({...f,interestRate:e.target.value}))}/>
                </div>
                <div>
                  <div className="form-label">Start Date</div>
                  <input type="date" className="form-input" value={form.startDate||today()} onChange={e=>setForm(f=>({...f,startDate:e.target.value}))} style={{colorScheme:'dark'}}/>
                </div>
                <div>
                  <div className="form-label">Due Date</div>
                  <input type="date" className="form-input" value={form.dueDate||''} onChange={e=>setForm(f=>({...f,dueDate:e.target.value}))} style={{colorScheme:'dark'}}/>
                </div>
                <div>
                  <div className="form-label">Status</div>
                  <select className="form-input" value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>
                    {['Active','Paid','Paused'].map(s=><option key={s}>{s}</option>)}
                  </select>
                </div>
                <div style={{gridColumn:'1/-1'}}>
                  <div className="form-label">Notes</div>
                  <textarea className="form-input" rows={2} placeholder="Terms, conditions, special notes…" value={form.notes||''} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} style={{resize:'vertical'}}/>
                </div>
              </div>

              {/* Balance preview */}
              {parseFloat(form.totalAmount)>0&&(
                <div style={{background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',borderRadius:8,padding:'10px 14px',marginBottom:14,display:'flex',justifyContent:'space-between',fontSize:12}}>
                  <span style={{color:'var(--muted)'}}>Balance remaining:</span>
                  <span style={{fontWeight:900,color:'#ef4444',fontSize:14}}>{peso((parseFloat(form.totalAmount)||0)-(parseFloat(form.paidAmount)||0))}</span>
                </div>
              )}

              <button onClick={saveLia} style={{width:'100%',padding:'12px 0',background:'linear-gradient(135deg,#1a1560,#7c3aed)',border:'none',borderRadius:8,color:'#fff',fontWeight:900,cursor:'pointer',fontSize:14}}>
                💾 {editLia?'Update':'Save'} Liability
              </button>
            </div>
          </div>
        )}

        {/* Record Payment Modal */}
        {showPayModal&&(()=>{
          const l=liabilities.find(x=>x.id===showPayModal);
          if(!l)return null;
          const balance=l.totalAmount-l.paidAmount;
          return(
            <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowPayModal(null)}>
              <div className="modal-box" style={{maxWidth:400}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                  <div style={{fontWeight:800,fontSize:15,color:'#f1f5f9'}}>💳 Record Payment</div>
                  <button onClick={()=>setShowPayModal(null)} style={{background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--muted)',borderRadius:6,padding:'4px 10px',cursor:'pointer',fontSize:14}}>✕</button>
                </div>
                <div style={{background:'var(--bg)',borderRadius:8,padding:'10px 14px',marginBottom:14}}>
                  <div style={{fontWeight:700,color:'#f1f5f9',marginBottom:4}}>{l.name}</div>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:12}}>
                    <span style={{color:'var(--muted)'}}>Balance remaining:</span>
                    <span style={{fontWeight:900,color:'#ef4444'}}>{peso(balance)}</span>
                  </div>
                  {l.monthlyPayment>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginTop:2}}>
                    <span style={{color:'var(--muted)'}}>Monthly payment:</span>
                    <span style={{fontWeight:700,color:'#f59e0b'}}>{peso(l.monthlyPayment)}</span>
                  </div>}
                </div>
                <div style={{marginBottom:10}}>
                  <div className="form-label">Amount (₱)</div>
                  <input type="number" min="0" step="0.01" className="form-input" placeholder="0.00" value={payAmt} onChange={e=>setPayAmt(e.target.value)} style={{fontSize:18,fontWeight:700,color:'#22c55e'}}/>
                  <div style={{display:'flex',gap:6,marginTop:6}}>
                    {l.monthlyPayment>0&&<button onClick={()=>setPayAmt(String(l.monthlyPayment))} style={{padding:'3px 10px',background:'rgba(245,158,11,.1)',border:'1px solid #f59e0b',borderRadius:4,color:'#f59e0b',fontSize:10,fontWeight:700,cursor:'pointer'}}>Monthly: {peso(l.monthlyPayment)}</button>}
                    <button onClick={()=>setPayAmt(String(balance.toFixed(2)))} style={{padding:'3px 10px',background:'rgba(34,197,94,.1)',border:'1px solid #22c55e',borderRadius:4,color:'#22c55e',fontSize:10,fontWeight:700,cursor:'pointer'}}>Full balance: {peso(balance)}</button>
                  </div>
                </div>
                <div style={{marginBottom:10}}>
                  <div className="form-label">Pay From Account</div>
                  <select className="form-input" value={payAcc} onChange={e=>setPayAcc(e.target.value)}>
                    <option value="">— Select account —</option>
                    <optgroup label="💼 Business">{accounts.filter(a=>a.type==='business').map(a=><option key={a.id} value={a.id}>{a.icon} {a.name} — {peso(accBal[a.id]||0)}</option>)}</optgroup>
                    <optgroup label="👤 Personal">{accounts.filter(a=>a.type==='personal').map(a=><option key={a.id} value={a.id}>{a.icon} {a.name} — {peso(accBal[a.id]||0)}</option>)}</optgroup>
                  </select>
                </div>
                <div style={{display:'flex',gap:10,marginBottom:14}}>
                  <div style={{flex:1}}>
                    <div className="form-label">Date</div>
                    <input type="date" className="form-input" value={payDate} onChange={e=>setPayDate(e.target.value)} style={{colorScheme:'dark'}}/>
                  </div>
                  <div style={{flex:1}}>
                    <div className="form-label">Note (optional)</div>
                    <input className="form-input" placeholder="e.g. April payment" value={payNote} onChange={e=>setPayNote(e.target.value)}/>
                  </div>
                </div>
                <button onClick={recordPayment} style={{width:'100%',padding:'12px 0',background:'linear-gradient(135deg,#15803d,#22c55e)',border:'none',borderRadius:8,color:'#fff',fontWeight:900,cursor:'pointer',fontSize:14}}>
                  ✅ Confirm Payment
                </button>
              </div>
            </div>
          );
        })()}
      </div>
    );
  };

  // ── ACCOUNTS VIEW ──────────────────────────────────────────────────────────
  const AccountsView=()=>(
    <div style={{padding:16,maxWidth:800,margin:'0 auto'}}>

      {/* Setup reminder if any account has ₱0 opening balance */}
      {accounts.some(a=>!a.openingBalance||a.openingBalance===0)&&(
        <div style={{background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.4)',borderRadius:10,padding:'12px 16px',marginBottom:14,display:'flex',gap:12,alignItems:'flex-start'}}>
          <span style={{fontSize:20,flexShrink:0}}>💡</span>
          <div>
            <div style={{fontWeight:800,color:'#f59e0b',marginBottom:3,fontSize:13}}>Set your opening balances first!</div>
            <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.6}}>
              Click <b style={{color:'#f1f5f9'}}>✏️ Edit</b> on each account below and enter the <b style={{color:'#f1f5f9'}}>actual amount you currently have</b> in that account. This is the starting point — all your income and expense entries will adjust from there automatically.
            </div>
          </div>
        </div>
      )}

      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
        <button onClick={()=>{setAccForm({name:'',type:'business',icon:'💰',color:'#00c4d4',openingBalance:'',openingDate:today()});setShowAccModal(true);}} style={{padding:'8px 16px',background:'var(--cyan)',border:'none',borderRadius:8,color:'#fff',fontWeight:700,cursor:'pointer',fontSize:12}}>+ New Account</button>
      </div>
      {['business','personal'].map(grp=>(
        <div key={grp} style={{marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:800,color:grp==='business'?'var(--cyan)':'#a855f7',textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>{grp==='business'?'💼 Business Accounts':'👤 Personal Accounts'}</div>
          {accounts.filter(a=>a.type===grp).map(a=>{
            const b=accBal[a.id]||0;
            const ae=entries.filter(e=>e.accountId===a.id);
            const inc=ae.filter(e=>(CAT_TYPE[e.category]?.type||e.type)==='income').reduce((s,e)=>s+(e.amount||0),0);
            const exp=ae.filter(e=>(CAT_TYPE[e.category]?.type||e.type)==='expense').reduce((s,e)=>s+(e.amount||0),0);
            const needsSetup=!a.openingBalance||a.openingBalance===0;
            return(
              <div key={a.id} className="card" style={{marginBottom:8,borderLeft:`4px solid ${b<0?'#ef4444':a.color}`,background:b<0?'rgba(239,68,68,.04)':'var(--surface)'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <div style={{width:38,height:38,borderRadius:10,background:a.color+'20',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>{a.icon}</div>
                    <div>
                      <div style={{fontSize:14,fontWeight:800,color:'#f1f5f9'}}>{a.name}</div>
                      <div style={{fontSize:10,color:'var(--muted)'}}>Opening: <span style={{color:needsSetup?'#f59e0b':'var(--muted)',fontWeight:needsSetup?700:400}}>{peso(a.openingBalance||0)}{needsSetup?' ⚠️ not set':''}</span> · {ae.length} entries</div>
                    </div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:20,fontWeight:900,color:b>=0?'#22c55e':'#ef4444'}}>{peso(b)}</div>
                    <div style={{display:'flex',gap:8,fontSize:10,marginTop:2,justifyContent:'flex-end'}}>
                      <span style={{color:'#22c55e'}}>+{peso(inc)}</span>
                      <span style={{color:'#ef4444'}}>-{peso(exp)}</span>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:6,marginLeft:4}}>
                    <button onClick={()=>openEditAcc(a)} style={{padding:'7px 14px',background:needsSetup?'#f59e0b':'rgba(168,85,247,.1)',border:`1px solid ${needsSetup?'#f59e0b':'#a855f7'}`,color:needsSetup?'#fff':'#c084fc',borderRadius:6,cursor:'pointer',fontSize:11,fontWeight:700}}>
                      {needsSetup?'⚠️ Set Balance':'✏️ Edit'}
                    </button>
                    <button onClick={()=>deleteAcc(a)} style={{padding:'7px 12px',background:'rgba(239,68,68,.08)',border:'1px solid #ef4444',color:'#ef4444',borderRadius:6,cursor:'pointer',fontSize:11,fontWeight:700}} title="Delete account">
                      🗑 Delete
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
          {accounts.filter(a=>a.type===grp).length===0&&<div style={{color:'var(--muted)',fontSize:12,padding:'10px 0'}}>No {grp} accounts. Add one above.</div>}
        </div>
      ))}
    </div>
  );

  // ── ADD ENTRY MODAL ─────────────────────────────────────────────────────────
  const formInfo=CAT_TYPE[form.category]||{};
  const formGroup=formInfo.group||form.group||'business';
  const formType=formInfo.type||form.type||'income';
  const availCats=[
    ...getCats('business','income').map(c=>({c,label:'💼 Business Income',g:'business',t:'income'})),
    ...getCats('business','expense').map(c=>({c,label:'💼 Business Expense',g:'business',t:'expense'})),
    ...getCats('personal','income').map(c=>({c,label:'👤 Personal Income',g:'personal',t:'income'})),
    ...getCats('personal','expense').map(c=>({c,label:'👤 Personal Expense',g:'personal',t:'expense'})),
  ];
  const groupAccounts=accounts.filter(a=>a.type===formGroup);

  // ── MAIN RENDER ─────────────────────────────────────────────────────────────
  if(locked) return <LockScreen onUnlock={()=>setLocked(false)}/>;

  // ── PROJECTS VIEW ────────────────────────────────────────────────────────
  const ProjectsView=()=>{
    const[filter,setFilter]=React.useState('All');
    // Use App-level state to prevent form reset on re-render
    const form=projForm;
    const setForm=setProjForm;
    const showForm=showProjForm;
    const setShowForm=setShowProjForm;
    const editProj=editProjId;

    const openNew=()=>{setProjForm({name:'',client:'',type:'Signage',status:'Active',salePrice:0,date:today(),notes:'',items:[]});setEditProjId(null);setShowProjForm(true);};
    const openEdit=(p)=>{setProjForm({...p,items:p.items.map(i=>({...i}))});setEditProjId(p.id);setShowProjForm(true);};
    const saveProject=()=>{
      if(!projForm.name)return;
      if(editProjId)setProjects(prev=>prev.map(p=>p.id===editProjId?{...projForm}:p));
      else setProjects(prev=>[...prev,{...projForm,id:'proj_'+Date.now()}]);
      setShowProjForm(false);showBadge();
    };
    const deleteProject=(id)=>{if(window.confirm('Delete this project?'))setProjects(prev=>prev.filter(p=>p.id!==id));};

    const addItem=()=>setProjForm(f=>({...f,items:[...f.items,newProjItem()]}));
    const updateItem=(idx,field,val)=>setProjForm(f=>({...f,items:f.items.map((it,i)=>i===idx?{...it,[field]:field==='qty'||field==='unitCost'?parseFloat(val)||0:val}:it)}));
    const removeItem=(idx)=>setProjForm(f=>({...f,items:f.items.filter((_,i)=>i!==idx)}));

    const totalCost=(p)=>p.items.reduce((s,it)=>s+(parseFloat(it.qty)||0)*(parseFloat(it.unitCost)||0),0);
    const margin=(p)=>{const sale=parseFloat(p.salePrice)||0;const cost=totalCost(p);return sale>0?((sale-cost)/sale*100):0;};
    const profit=(p)=>(parseFloat(p.salePrice)||0)-totalCost(p);

    const TYPES=['Signage','Tarpaulin','Sticker','LED Box','Acrylic','T-shirt','Streamer','Other'];
    const STATUSES=['Active','Completed','Cancelled'];
    const ITEM_CATS=['Material','Labor','Freight','Other'];

    const filtered=filter==='All'?projects:projects.filter(p=>p.status===filter);

    const statusColor=(s)=>s==='Completed'?'#22c55e':s==='Cancelled'?'#ef4444':'#f59e0b';

    return(
      <div style={{padding:16,height:'calc(100vh - 105px)',overflowY:'auto',boxSizing:'border-box'}}>
        {/* Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div>
            <div style={{fontSize:18,fontWeight:900,color:'#f1f5f9'}}>📐 Project Costing</div>
            <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>Track materials, labor and margin per project</div>
          </div>
          <button onClick={openNew}
            style={{padding:'8px 18px',background:'var(--cyan)',border:'none',borderRadius:8,color:'#fff',fontWeight:800,cursor:'pointer',fontSize:13}}>
            ＋ New Project
          </button>
        </div>

        {/* Filter tabs */}
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          {['All','Active','Completed','Cancelled'].map(s=>(
            <button key={s} onClick={()=>setFilter(s)}
              style={{padding:'5px 14px',border:`1px solid ${filter===s?'var(--cyan)':'var(--border)'}`,borderRadius:20,
                background:filter===s?'rgba(0,196,212,.12)':'transparent',
                color:filter===s?'var(--cyan)':'var(--muted)',fontWeight:filter===s?700:500,
                cursor:'pointer',fontSize:11,fontFamily:'inherit'}}>
              {s}
            </button>
          ))}
        </div>

        {/* Summary cards */}
        {projects.length>0&&(
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:16}}>
            {[
              ['Total Projects',projects.length,'#64748b','📐'],
              ['Active',projects.filter(p=>p.status==='Active').length,'#f59e0b','⚡'],
              ['Completed',projects.filter(p=>p.status==='Completed').length,'#22c55e','✅'],
              ['Total Revenue',peso(projects.filter(p=>p.status==='Completed').reduce((s,p)=>s+(parseFloat(p.salePrice)||0),0)),'#00c4d4','💰'],
            ].map(([l,v,color,ic])=>(
              <div key={l} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'12px 14px'}}>
                <div style={{fontSize:18,marginBottom:4}}>{ic}</div>
                <div style={{fontSize:11,color:'var(--muted)',marginBottom:2}}>{l}</div>
                <div style={{fontSize:17,fontWeight:900,color}}>{v}</div>
              </div>
            ))}
          </div>
        )}

        {/* Projects list */}
        {filtered.length===0?(
          <div style={{textAlign:'center',padding:'60px 20px',color:'var(--muted)'}}>
            <div style={{fontSize:40,marginBottom:12}}>📐</div>
            <div style={{fontSize:15,fontWeight:700,marginBottom:6}}>No projects yet</div>
            <div style={{fontSize:12}}>Click ＋ New Project to start tracking your first job</div>
          </div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {filtered.map(p=>{
              const cost=totalCost(p);
              const sale=parseFloat(p.salePrice)||0;
              const prof=profit(p);
              const mgn=margin(p);
              const isProfit=prof>=0;
              return(
                <div key={p.id} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,overflow:'hidden'}}>
                  {/* Project header */}
                  <div style={{padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'flex-start',borderBottom:'1px solid var(--border)'}}>
                    <div style={{flex:1}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                        <span style={{fontSize:14,fontWeight:900,color:'#f1f5f9'}}>{p.name}</span>
                        <span style={{fontSize:9,padding:'2px 8px',borderRadius:10,background:`${statusColor(p.status)}22`,color:statusColor(p.status),fontWeight:700}}>{p.status}</span>
                        <span style={{fontSize:9,padding:'2px 8px',borderRadius:10,background:'rgba(100,116,139,.15)',color:'#94a3b8',fontWeight:600}}>{p.type}</span>
                      </div>
                      {p.client&&<div style={{fontSize:11,color:'var(--muted)'}}>👤 {p.client}</div>}
                      {p.notes&&<div style={{fontSize:10,color:'#475569',marginTop:3,fontStyle:'italic'}}>{p.notes}</div>}
                    </div>
                    <div style={{display:'flex',gap:6,marginLeft:12}}>
                      <button onClick={()=>openEdit(p)} style={{padding:'5px 12px',background:'rgba(0,196,212,.1)',border:'1px solid var(--cyan)',borderRadius:6,color:'var(--cyan)',cursor:'pointer',fontSize:11,fontWeight:700,fontFamily:'inherit'}}>✏️ Edit</button>
                      <button onClick={()=>deleteProject(p.id)} style={{padding:'5px 10px',background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.3)',borderRadius:6,color:'#ef4444',cursor:'pointer',fontSize:11,fontFamily:'inherit'}}>🗑</button>
                    </div>
                  </div>
                  {/* Financial summary */}
                  <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:0,borderBottom:'1px solid var(--border)'}}>
                    {[
                      ['Sale Price',peso(sale),'#f1f5f9'],
                      ['Total Cost',peso(cost),'#ef4444'],
                      ['Profit / Loss',peso(prof),isProfit?'#22c55e':'#ef4444'],
                      ['Margin',mgn.toFixed(1)+'%',isProfit?'#22c55e':'#ef4444'],
                    ].map(([l,v,color],i)=>(
                      <div key={l} style={{padding:'10px 14px',borderRight:i<3?'1px solid var(--border)':'none'}}>
                        <div style={{fontSize:9,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5,marginBottom:3}}>{l}</div>
                        <div style={{fontSize:15,fontWeight:900,color}}>{v}</div>
                      </div>
                    ))}
                  </div>
                  {/* Items breakdown */}
                  {p.items.length>0&&(
                    <div style={{padding:'10px 16px'}}>
                      <div style={{fontSize:10,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5,marginBottom:8}}>Cost Breakdown</div>
                      <div style={{display:'flex',flexDirection:'column',gap:4}}>
                        {p.items.map((it,i)=>(
                          <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 60px 80px 60px 90px',gap:8,alignItems:'center',fontSize:11}}>
                            <span style={{color:'#cbd5e1'}}>{it.desc||'—'}</span>
                            <span style={{color:'var(--muted)',textAlign:'center'}}>{it.qty} {it.unit}</span>
                            <span style={{color:'var(--muted)',textAlign:'right'}}>{peso(it.unitCost)} ea</span>
                            <span style={{fontSize:9,padding:'1px 6px',borderRadius:4,background:'rgba(100,116,139,.15)',color:'#94a3b8',textAlign:'center'}}>{it.category}</span>
                            <span style={{color:'#f1f5f9',fontWeight:700,textAlign:'right'}}>{peso((it.qty||0)*(it.unitCost||0))}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* Modal */}
        {showForm&&(
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}
            onClick={e=>e.stopPropagation()}>
            <div style={{background:'var(--surface)',borderRadius:14,padding:24,width:'100%',maxWidth:620,maxHeight:'90vh',overflowY:'auto',border:'1px solid var(--border)'}}
              onClick={e=>e.stopPropagation()}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
                <div style={{fontWeight:900,fontSize:16,color:'#f1f5f9'}}>📐 {editProj?'Edit':'New'} Project</div>
                <button onClick={()=>setShowForm(false)} style={{background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--muted)',borderRadius:6,padding:'4px 10px',cursor:'pointer',fontSize:14}}>✕</button>
              </div>

              {/* Basic info */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
                <div>
                  <div style={{fontSize:11,color:'var(--muted)',marginBottom:4}}>Project Name *</div>
                  <input defaultValue={form.name} onBlur={e=>setForm(f=>({...f,name:e.target.value}))}
                    onKeyDown={e=>{if(e.key==='Tab')setForm(f=>({...f,name:e.target.value}));}}
                    placeholder="e.g. SM Signage - May 2026"
                    style={{width:'100%',padding:'8px 10px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,color:'#f1f5f9',fontSize:12,outline:'none',boxSizing:'border-box',fontFamily:'inherit'}}/>
                </div>
                <div>
                  <div style={{fontSize:11,color:'var(--muted)',marginBottom:4}}>Client</div>
                  <input defaultValue={form.client} onBlur={e=>setForm(f=>({...f,client:e.target.value}))}
                    onKeyDown={e=>{if(e.key==='Tab')setForm(f=>({...f,client:e.target.value}));}}
                    placeholder="Client name"
                    style={{width:'100%',padding:'8px 10px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,color:'#f1f5f9',fontSize:12,outline:'none',boxSizing:'border-box',fontFamily:'inherit'}}/>
                </div>
                <div>
                  <div style={{fontSize:11,color:'var(--muted)',marginBottom:4}}>Project Type</div>
                  <select value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}
                    style={{width:'100%',padding:'8px 10px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,color:'#f1f5f9',fontSize:12,outline:'none',boxSizing:'border-box',fontFamily:'inherit',cursor:'pointer'}}>
                    {TYPES.map(t=><option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                <div>
                  <div style={{fontSize:11,color:'var(--muted)',marginBottom:4}}>Status</div>
                  <select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}
                    style={{width:'100%',padding:'8px 10px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,color:'#f1f5f9',fontSize:12,outline:'none',boxSizing:'border-box',fontFamily:'inherit',cursor:'pointer'}}>
                    {STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
                <div>
                  <div style={{fontSize:11,color:'var(--muted)',marginBottom:4}}>Date</div>
                  <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}
                    style={{width:'100%',padding:'8px 10px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,color:'#f1f5f9',fontSize:12,outline:'none',boxSizing:'border-box',fontFamily:'inherit'}}/>
                </div>
                <div>
                  <div style={{fontSize:11,color:'var(--muted)',marginBottom:4}}>Sale Price (₱)</div>
                  <input type="number" value={form.salePrice||''} onChange={e=>setForm(f=>({...f,salePrice:parseFloat(e.target.value)||0}))}
                    placeholder="0.00"
                    style={{width:'100%',padding:'8px 10px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,color:'#f1f5f9',fontSize:12,outline:'none',boxSizing:'border-box',fontFamily:'inherit'}}/>
                </div>
              </div>

              <div style={{marginBottom:16}}>
                <div style={{fontSize:11,color:'var(--muted)',marginBottom:4}}>Notes</div>
                <input defaultValue={form.notes} onBlur={e=>setForm(f=>({...f,notes:e.target.value}))}
                  placeholder="Additional notes..."
                  style={{width:'100%',padding:'8px 10px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,color:'#f1f5f9',fontSize:12,outline:'none',boxSizing:'border-box',fontFamily:'inherit'}}/>
              </div>

              {/* Cost items */}
              <div style={{marginBottom:16}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                  <div style={{fontSize:12,fontWeight:800,color:'#f1f5f9'}}>Cost Items</div>
                  <button onClick={addItem}
                    style={{padding:'4px 12px',background:'rgba(0,196,212,.12)',border:'1px solid var(--cyan)',borderRadius:6,color:'var(--cyan)',cursor:'pointer',fontSize:11,fontWeight:700,fontFamily:'inherit'}}>
                    ＋ Add Item
                  </button>
                </div>

                {/* Items header */}
                {form.items.length>0&&(
                  <div style={{display:'grid',gridTemplateColumns:'1fr 60px 60px 90px 80px 80px 24px',gap:6,marginBottom:6,padding:'0 4px'}}>
                    {['Description','Qty','Unit','Unit Cost','Category','Total',''].map(h=>(
                      <div key={h} style={{fontSize:9,fontWeight:700,color:'var(--muted)',textTransform:'uppercase'}}>{h}</div>
                    ))}
                  </div>
                )}

                {form.items.map((it,idx)=>(
                  <div key={it.id} style={{display:'grid',gridTemplateColumns:'1fr 60px 60px 90px 80px 80px 24px',gap:6,marginBottom:6,alignItems:'center'}}>
                    <input defaultValue={it.desc}
                      onBlur={e=>updateItem(idx,'desc',e.target.value)}
                      onKeyDown={e=>{if(e.key==='Tab'||e.key==='Enter')updateItem(idx,'desc',e.target.value);}}
                      placeholder="e.g. Tarpaulin 4x8"
                      style={{padding:'6px 8px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:5,color:'#f1f5f9',fontSize:11,outline:'none',fontFamily:'inherit',width:'100%',boxSizing:'border-box'}}/>
                    <input type="number" defaultValue={it.qty||''}
                      onBlur={e=>updateItem(idx,'qty',e.target.value)}
                      onKeyDown={e=>{if(e.key==='Tab'||e.key==='Enter')updateItem(idx,'qty',e.target.value);}}
                      placeholder="1"
                      style={{padding:'6px 8px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:5,color:'#f1f5f9',fontSize:11,outline:'none',fontFamily:'inherit',width:'100%',boxSizing:'border-box'}}/>
                    <select value={it.unit} onChange={e=>updateItem(idx,'unit',e.target.value)}
                      style={{padding:'6px 4px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:5,color:'#f1f5f9',fontSize:11,outline:'none',fontFamily:'inherit',cursor:'pointer',width:'100%'}}>
                      {['pcs','sqm','sqft','meters','rolls','hrs','days','set','lot'].map(u=><option key={u} value={u}>{u}</option>)}
                    </select>
                    <input type="number" defaultValue={it.unitCost||''}
                      onBlur={e=>updateItem(idx,'unitCost',e.target.value)}
                      onKeyDown={e=>{if(e.key==='Tab'||e.key==='Enter')updateItem(idx,'unitCost',e.target.value);}}
                      placeholder="0.00"
                      style={{padding:'6px 8px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:5,color:'#f1f5f9',fontSize:11,outline:'none',fontFamily:'inherit',width:'100%',boxSizing:'border-box'}}/>
                    <select value={it.category} onChange={e=>updateItem(idx,'category',e.target.value)}
                      style={{padding:'6px 4px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:5,color:'#f1f5f9',fontSize:11,outline:'none',fontFamily:'inherit',cursor:'pointer',width:'100%'}}>
                      {ITEM_CATS.map(cat=><option key={cat} value={cat}>{cat}</option>)}
                    </select>
                    <div style={{padding:'6px 4px',fontSize:11,fontWeight:700,color:'#00c4d4',textAlign:'right'}}>
                      {peso((it.qty||0)*(it.unitCost||0))}
                    </div>
                    <button onClick={()=>removeItem(idx)}
                      style={{width:24,height:24,background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.3)',borderRadius:4,color:'#ef4444',cursor:'pointer',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'inherit'}}>×</button>
                  </div>
                ))}

                {form.items.length===0&&(
                  <div style={{textAlign:'center',padding:'20px',color:'var(--muted)',fontSize:12,border:'1px dashed var(--border)',borderRadius:8}}>
                    Click ＋ Add Item to add materials, labor and other costs
                  </div>
                )}
              </div>

              {/* Cost summary */}
              {form.items.length>0&&(
                <div style={{background:'var(--surface2)',borderRadius:8,padding:'12px 14px',marginBottom:16,display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
                  <div>
                    <div style={{fontSize:10,color:'var(--muted)',marginBottom:2}}>Total Cost</div>
                    <div style={{fontSize:16,fontWeight:900,color:'#ef4444'}}>{peso(form.items.reduce((s,it)=>s+(it.qty||0)*(it.unitCost||0),0))}</div>
                  </div>
                  <div>
                    <div style={{fontSize:10,color:'var(--muted)',marginBottom:2}}>Profit / Loss</div>
                    <div style={{fontSize:16,fontWeight:900,color:(form.salePrice||0)-form.items.reduce((s,it)=>s+(it.qty||0)*(it.unitCost||0),0)>=0?'#22c55e':'#ef4444'}}>
                      {peso((form.salePrice||0)-form.items.reduce((s,it)=>s+(it.qty||0)*(it.unitCost||0),0))}
                    </div>
                  </div>
                  <div>
                    <div style={{fontSize:10,color:'var(--muted)',marginBottom:2}}>Margin</div>
                    <div style={{fontSize:16,fontWeight:900,color:'#00c4d4'}}>
                      {form.salePrice>0?(((form.salePrice-form.items.reduce((s,it)=>s+(it.qty||0)*(it.unitCost||0),0))/form.salePrice)*100).toFixed(1)+'%':'—'}
                    </div>
                  </div>
                </div>
              )}

              <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
                <button onClick={()=>setShowForm(false)}
                  style={{padding:'8px 18px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,color:'var(--muted)',cursor:'pointer',fontSize:12,fontFamily:'inherit'}}>
                  Cancel
                </button>
                <button onClick={saveProject}
                  style={{padding:'8px 20px',background:'var(--cyan)',border:'none',borderRadius:8,color:'#fff',fontWeight:800,cursor:'pointer',fontSize:13,fontFamily:'inherit'}}>
                  💾 Save Project
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  };

  return(
    <div style={{minHeight:'100vh',background:'var(--bg)'}}>
      {badge&&<div className="save-badge">✅ Saved</div>}

      {/* Header */}
      <div style={{background:'linear-gradient(135deg,#1a1560,#2d1b69)',borderBottom:'2px solid var(--border)'}}>
        {/* Top row: logo + action buttons */}
        <div style={{padding:'8px 16px',display:'flex',alignItems:'center',gap:8,borderBottom:'1px solid rgba(255,255,255,.06)',flexWrap:'wrap'}}>
          <div style={{fontWeight:900,fontSize:15,color:'#fff',letterSpacing:1,flexShrink:0}}>💰 BREEKS</div>

          {/* Drive sync status pill */}
          <div onClick={GDrive.getToken()?driveSave:driveSignIn}
            style={{display:'flex',alignItems:'center',gap:5,padding:'3px 10px',borderRadius:20,cursor:'pointer',flexShrink:0,
              background:driveStatus==='synced'?'rgba(34,197,94,.12)':driveStatus==='error'?'rgba(239,68,68,.12)':driveStatus==='syncing'||driveStatus==='connecting'?'rgba(245,158,11,.12)':'rgba(255,255,255,.06)',
              border:`1px solid ${driveStatus==='synced'?'rgba(34,197,94,.3)':driveStatus==='error'?'rgba(239,68,68,.3)':driveStatus==='syncing'||driveStatus==='connecting'?'rgba(245,158,11,.3)':'rgba(255,255,255,.1)'}`}}>
            <span style={{fontSize:11}}>{driveStatus==='synced'?'☁️':driveStatus==='syncing'||driveStatus==='connecting'?'🔄':driveStatus==='error'?'⚠️':'☁️'}</span>
            <span style={{fontSize:10,fontWeight:700,color:driveStatus==='synced'?'#22c55e':driveStatus==='error'?'#ef4444':driveStatus==='syncing'||driveStatus==='connecting'?'#f59e0b':'#475569'}}>
              {driveStatus==='idle'?'Connect Drive':driveStatus==='connecting'?'Connecting…':driveStatus==='syncing'?'Syncing…':driveStatus==='synced'?'Drive Synced':driveMsg||'Drive Error'}
            </span>
          </div>

          {lastSync&&driveStatus==='synced'&&<span style={{fontSize:9,color:'#334155',flexShrink:0}}>Last: {lastSync}</span>}
          <div style={{flex:1}}/>

          {/* Auto-lock indicator */}
          <span style={{fontSize:9,color:'#334155',flexShrink:0}}>🔒 Auto-lock: {AUTO_LOCK_MINUTES}min</span>

          <button onClick={()=>{setTransferForm({date:today(),fromId:'',toId:'',amount:'',fee:'',note:''});setShowTransfer(true);}} style={{padding:'5px 12px',background:'rgba(245,158,11,.15)',border:'1px solid #f59e0b',borderRadius:7,color:'#f59e0b',fontWeight:800,cursor:'pointer',fontSize:12,whiteSpace:'nowrap'}}>⇄ Transfer</button>
          <button onClick={()=>{setForm(emptyForm());setEditEntry(null);setShowAdd(true);}} style={{padding:'5px 12px',background:'var(--cyan)',border:'none',borderRadius:7,color:'#fff',fontWeight:800,cursor:'pointer',fontSize:12,whiteSpace:'nowrap'}}>＋ Add</button>
          <button onClick={driveSave} style={{padding:'5px 10px',background:'rgba(34,197,94,.15)',border:'1px solid #22c55e',borderRadius:7,color:'#22c55e',fontWeight:700,cursor:'pointer',fontSize:12}} title="Save to Drive">💾</button>
          <button onClick={()=>setLocked(true)} style={{padding:'5px 10px',background:'rgba(255,255,255,.06)',border:'1px solid var(--border)',borderRadius:7,color:'#475569',cursor:'pointer',fontSize:13}} title="Lock now">🔒</button>
          <button onClick={()=>setShowSettings(true)} style={{padding:'5px 10px',background:'rgba(255,255,255,.08)',border:'1px solid var(--border)',borderRadius:7,color:'var(--muted)',cursor:'pointer',fontSize:13}}>⚙️</button>
        </div>
        {/* Bottom row: nav tabs — all 8 visible */}
        <nav style={{display:'flex',gap:0,overflowX:'auto',scrollbarWidth:'none',padding:'0 8px'}}>
          {[
            ['dashboard','📊','Dashboard'],
            ['split','⚡','Journals'],
            ['journal','📔','Full Journal'],
            ['reports','📈','Reports'],
            ['ledger','📒','Ledger'],
            ['budgets','🎯','Budgets'],
            ['liabilities','📋','Liabilities'],
            ['projects','📐','Projects'],
            ['accounts','🏦','Accounts'],
          ].map(([v,ic,label])=>(
            <button key={v} onClick={()=>setView(v)}
              style={{padding:'7px 12px',border:'none',borderBottom:view===v?'2px solid var(--cyan)':'2px solid transparent',
                background:'transparent',color:view===v?'var(--cyan)':'#64748b',
                fontWeight:view===v?800:600,fontSize:11,cursor:'pointer',
                whiteSpace:'nowrap',fontFamily:'inherit',transition:'all .15s',
                display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
              <span style={{fontSize:14}}>{ic}</span>
              <span>{label}</span>
            </button>
          ))}
        </nav>
      </div>

      {/* Views */}
      {view==='dashboard'&&<DashboardView/>}
      {view==='split'&&<SplitJournalView/>}
      {view==='journal'&&<JournalView/>}
      {view==='reports'&&<ReportsView/>}
      {view==='ledger'&&<LedgerView/>}
      {view==='budgets'&&<BudgetsView/>}
      {view==='liabilities'&&<LiabilitiesView/>}
      {view==='projects'&&<ProjectsView/>}
      {view==='accounts'&&<AccountsView/>}

      {/* Add/Edit Entry Modal */}
      {showAdd&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&(setShowAdd(false),setEditEntry(null),setForm(emptyForm()))}>
          <div className="modal-box">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div style={{fontWeight:800,fontSize:15,color:'#f1f5f9'}}>📔 {editEntry?'Edit Entry':'New Journal Entry'}</div>
              <button onClick={()=>{setShowAdd(false);setEditEntry(null);setForm(emptyForm());setNewCatShow(false);}} style={{background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--muted)',borderRadius:6,padding:'4px 10px',cursor:'pointer',fontSize:14}}>✕</button>
            </div>

            {/* Category - the most important field */}
            <div style={{marginBottom:14}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                <div className="form-label">Category</div>
                <button onClick={()=>setNewCatShow(p=>!p)} style={{fontSize:9,color:'var(--cyan)',background:'transparent',border:'1px dashed var(--cyan)',borderRadius:4,padding:'1px 7px',cursor:'pointer',fontWeight:700}}>＋ Custom</button>
              </div>
              {newCatShow&&(
                <div style={{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap'}}>
                  <select value={newCatKey} onChange={e=>setNewCatKey(e.target.value)} style={{padding:'5px 7px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:5,color:'var(--text)',fontSize:10,outline:'none',cursor:'pointer'}}>
                    <option value="bizInc">💼 Biz Income</option>
                    <option value="bizExp">💼 Biz Expense</option>
                    <option value="perInc">👤 Per Income</option>
                    <option value="perExp">👤 Per Expense</option>
                  </select>
                  <input autoFocus value={newCatText} onChange={e=>setNewCatText(e.target.value)}
                    onKeyDown={e=>{if(e.key==='Enter'&&newCatText.trim()){addCustomCat(newCatKey,newCatText.trim());setForm(f=>({...f,category:newCatText.trim()}));onCatChange(newCatText.trim());setNewCatText('');setNewCatShow(false);}if(e.key==='Escape')setNewCatShow(false);}}
                    placeholder="Category name…" style={{flex:1,padding:'5px 8px',background:'var(--surface2)',border:'1px solid var(--cyan)',borderRadius:5,color:'var(--text)',fontSize:11,outline:'none'}}/>
                  <button onClick={()=>{if(newCatText.trim()){addCustomCat(newCatKey,newCatText.trim());onCatChange(newCatText.trim());setNewCatText('');setNewCatShow(false);}}} style={{padding:'5px 10px',background:'var(--cyan)',border:'none',borderRadius:5,color:'#fff',fontWeight:700,cursor:'pointer',fontSize:11}}>Add</button>
                </div>
              )}
              <select className="form-input" value={form.category} onChange={e=>onCatChange(e.target.value)}>
                <option value="">— Select category —</option>
                <optgroup label="💼 Business Income">{getCats('business','income').map(c=><option key={c} value={c}>{c}</option>)}</optgroup>
                <optgroup label="💼 Business Expense">{getCats('business','expense').map(c=><option key={c} value={c}>{c}</option>)}</optgroup>
                <optgroup label="👤 Personal Income">{getCats('personal','income').map(c=><option key={c} value={c}>{c}</option>)}</optgroup>
                <optgroup label="👤 Personal Expense">{getCats('personal','expense').map(c=><option key={c} value={c}>{c}</option>)}</optgroup>
              </select>
              {form.category&&(
                <div style={{marginTop:5,display:'flex',gap:6}}>
                  <span style={{padding:'2px 8px',borderRadius:6,fontSize:10,fontWeight:700,background:formType==='income'?'rgba(34,197,94,.15)':'rgba(239,68,68,.15)',color:formType==='income'?'#22c55e':'#ef4444'}}>{formType==='income'?'⬆️ Income':'⬇️ Expense'}</span>
                  <span style={{padding:'2px 8px',borderRadius:6,fontSize:10,fontWeight:700,background:formGroup==='business'?'rgba(0,196,212,.12)':'rgba(168,85,247,.12)',color:formGroup==='business'?'var(--cyan)':'#a855f7'}}>{formGroup==='business'?'💼 Business':'👤 Personal'}</span>
                </div>
              )}
            </div>

            {/* Amount */}
            <div style={{marginBottom:12}}>
              <div className="form-label">Amount (₱)</div>
              <input type="number" min="0" step="0.01" className="form-input" placeholder="0.00" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} style={{fontSize:22,fontWeight:900,color:formType==='income'?'#22c55e':'#ef4444'}}/>
            </div>

            {/* Account */}
            <div style={{marginBottom:12}}>
              <div className="form-label">Account</div>
              <select className="form-input" value={form.accountId} onChange={e=>setForm(f=>({...f,accountId:e.target.value}))}>
                <option value="">— Select account —</option>
                <optgroup label="💼 Business">{accounts.filter(a=>a.type==='business').map(a=><option key={a.id} value={a.id}>{a.icon} {a.name}</option>)}</optgroup>
                <optgroup label="👤 Personal">{accounts.filter(a=>a.type==='personal').map(a=><option key={a.id} value={a.id}>{a.icon} {a.name}</option>)}</optgroup>
              </select>
            </div>

            {/* Date + Note */}
            <div style={{display:'flex',gap:10,marginBottom:12}}>
              <div style={{flex:1}}>
                <div className="form-label">Date</div>
                <input type="date" className="form-input" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={{colorScheme:'dark'}}/>
              </div>
            </div>
            <div style={{marginBottom:16}}>
              <div className="form-label">Note (optional)</div>
              <input className="form-input" placeholder="Description, reference, remarks…" value={form.note||''} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/>
            </div>

            <button onClick={saveEntry} style={{width:'100%',padding:'12px 0',background:`linear-gradient(135deg,${formType==='income'?'#15803d,#22c55e':'#991b1b,#ef4444'})`,border:'none',borderRadius:8,color:'#fff',fontWeight:900,cursor:'pointer',fontSize:14}}>
              {formType==='income'?'⬆️':'⬇️'} {editEntry?'Update':'Record'} {formType==='income'?'Income':'Expense'}
            </button>
          </div>
        </div>
      )}

      {/* Transfer Modal */}
      {showTransfer&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowTransfer(false)}>
          <div className="modal-box" style={{maxWidth:420}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <div style={{fontWeight:800,fontSize:16,color:'#f1f5f9'}}>⇄ Transfer Between Accounts</div>
              <button onClick={()=>setShowTransfer(false)} style={{background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--muted)',borderRadius:6,padding:'4px 10px',cursor:'pointer',fontSize:14}}>✕</button>
            </div>

            {/* Account balance preview */}
            <div style={{display:'flex',gap:8,marginBottom:16}}>
              {[transferForm.fromId,transferForm.toId].map((id,i)=>{
                const acc=accounts.find(a=>a.id===id);
                const bal=id?accBal[id]||0:null;
                return(
                  <div key={i} style={{flex:1,padding:'10px 12px',background:i===0?'rgba(239,68,68,.08)':'rgba(34,197,94,.08)',border:`1px solid ${i===0?'#ef4444':'#22c55e'}30`,borderRadius:8,textAlign:'center',minHeight:60,display:'flex',flexDirection:'column',justifyContent:'center'}}>
                    {acc?(
                      <>
                        <div style={{fontSize:11,color:'var(--muted)',marginBottom:3}}>{acc.icon} {acc.name}</div>
                        <div style={{fontSize:16,fontWeight:900,color:bal>=0?'#22c55e':'#ef4444'}}>{peso(bal)}</div>
                        <div style={{fontSize:9,color:'var(--muted)',marginTop:2}}>current balance</div>
                      </>
                    ):(
                      <div style={{fontSize:11,color:'var(--muted)',fontStyle:'italic'}}>{i===0?'From account':'To account'}</div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Arrow */}
            <div style={{textAlign:'center',fontSize:20,marginBottom:4,color:'#f59e0b'}}>↓</div>

            <div style={{marginBottom:12}}>
              <div className="form-label">From Account</div>
              <select className="form-input" value={transferForm.fromId} onChange={e=>setTransferForm(f=>({...f,fromId:e.target.value}))}>
                <option value="">— Select source account —</option>
                <optgroup label="💼 Business">{accounts.filter(a=>a.type==='business').map(a=><option key={a.id} value={a.id}>{a.icon} {a.name} — {peso(accBal[a.id]||0)}</option>)}</optgroup>
                <optgroup label="👤 Personal">{accounts.filter(a=>a.type==='personal').map(a=><option key={a.id} value={a.id}>{a.icon} {a.name} — {peso(accBal[a.id]||0)}</option>)}</optgroup>
              </select>
            </div>

            <div style={{marginBottom:12}}>
              <div className="form-label">To Account</div>
              <select className="form-input" value={transferForm.toId} onChange={e=>setTransferForm(f=>({...f,toId:e.target.value}))}>
                <option value="">— Select destination account —</option>
                <optgroup label="💼 Business">{accounts.filter(a=>a.type==='business'&&a.id!==transferForm.fromId).map(a=><option key={a.id} value={a.id}>{a.icon} {a.name} — {peso(accBal[a.id]||0)}</option>)}</optgroup>
                <optgroup label="👤 Personal">{accounts.filter(a=>a.type==='personal'&&a.id!==transferForm.fromId).map(a=><option key={a.id} value={a.id}>{a.icon} {a.name} — {peso(accBal[a.id]||0)}</option>)}</optgroup>
              </select>
            </div>

            <div style={{display:'flex',gap:10,marginBottom:12}}>
              <div style={{flex:2}}>
                <div className="form-label">Amount to Transfer (₱)</div>
                <input type="number" min="0" step="0.01" className="form-input" placeholder="0.00"
                  value={transferForm.amount} onChange={e=>setTransferForm(f=>({...f,amount:e.target.value}))}
                  style={{fontSize:18,fontWeight:900,color:'#f59e0b'}}/>
              </div>
              <div style={{flex:1}}>
                <div className="form-label">Fee / Charge (₱)</div>
                <input type="number" min="0" step="0.01" className="form-input" placeholder="0.00"
                  value={transferForm.fee} onChange={e=>setTransferForm(f=>({...f,fee:e.target.value}))}
                  style={{color:'#ef4444'}}/>
              </div>
            </div>

            {/* Fee preview */}
            {(parseFloat(transferForm.amount)||0)>0&&(
              <div style={{background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.3)',borderRadius:8,padding:'10px 14px',marginBottom:12,fontSize:11}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{color:'var(--muted)'}}>Transfer amount:</span>
                  <span style={{fontWeight:700,color:'#f1f5f9'}}>{peso(parseFloat(transferForm.amount)||0)}</span>
                </div>
                {(parseFloat(transferForm.fee)||0)>0&&(
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                    <span style={{color:'var(--muted)'}}>Bank / service fee:</span>
                    <span style={{fontWeight:700,color:'#ef4444'}}>-{peso(parseFloat(transferForm.fee)||0)}</span>
                  </div>
                )}
