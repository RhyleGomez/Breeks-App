              <div style={{width:210,flexShrink:0,fontSize:11}}>
                <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #dde3ef",color:"#555"}}><span>Subtotal</span><span style={{fontWeight:600,color:"#111"}}>{peso(subtotal)}</span></div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #dde3ef",color:"#555"}}>
                  <span style={{display:"flex",alignItems:"center",gap:4}}>VAT
                    <span onClick={()=>setVatOverride(vatOverride===null?12:null)} style={{fontSize:9,color:vatOverride!==null?"#b45309":"#888",cursor:"pointer",border:`1px solid ${vatOverride!==null?"#b45309":"#ccc"}`,borderRadius:3,padding:"0 4px"}}>{vatOverride!==null?"custom %":"+ add VAT"}</span>
                    {vatOverride!==null&&<input type="number" min="0" max="100" step="0.01" value={vatOverride} onChange={e=>setVatOverride(Math.max(0,parseFloat(e.target.value)||0))} style={{width:40,textAlign:"center",background:"#fff",border:"1px solid #f59e0b",borderRadius:3,color:"#b45309",fontSize:10,padding:"1px 3px"}}/>}
                  </span>
                  <span style={{fontWeight:600,color:vatOverride!==null?"#111":"#bbb"}}>{vatOverride!==null?peso(vatTotal):"—"}</span>
                </div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #dde3ef",color:"#c00"}}>
                  <span style={{display:"flex",alignItems:"center",gap:4}}>Discount <input type="number" min="0" max="100" step="0.01" value={discount} onChange={e=>setDiscount(Math.min(100,Math.max(0,parseFloat(e.target.value)||0)))} style={{width:36,textAlign:"center",background:"#fff",border:"1px solid #fca5a5",borderRadius:3,color:"#c00",fontSize:10,padding:"1px 3px"}}/>%</span>
                  <span style={{fontWeight:600}}>-{peso(globalDisc)}</span>
                </div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #dde3ef",color:ewtPct>0?"#c00":"#555"}}>
                  <span style={{display:"flex",alignItems:"center",gap:4}}>EWT <input type="number" min="0" max="100" step="0.01" value={ewtPct} onChange={e=>setEwtPct(Math.min(100,Math.max(0,parseFloat(e.target.value)||0)))} style={{width:36,textAlign:"center",background:"#fff",border:"1px solid #fca5a5",borderRadius:3,color:"#c00",fontSize:10,padding:"1px 3px"}}/>%</span>
                  <span style={{fontWeight:600}}>{ewtPct>0?"-"+peso(ewtAmt):"—"}</span>
                </div>
                {/* Other Charges */}
                {otherCharges.map((oc,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 0",borderBottom:"1px dashed #e0e7ef"}}>
                    <input type="text" value={oc.label} onChange={e=>setOtherCharges(p=>p.map((x,j)=>j===i?{...x,label:e.target.value}:x))} placeholder="Charge label…" style={{flex:1,padding:"2px 4px",border:"1px solid #c0cfe8",borderRadius:3,fontSize:10,color:"#333",outline:"none",fontFamily:"inherit"}}/>
                    <input type="number" min="0" step="0.01" value={oc.amount} onChange={e=>setOtherCharges(p=>p.map((x,j)=>j===i?{...x,amount:e.target.value}:x))} placeholder="0.00" style={{width:60,textAlign:"right",padding:"2px 4px",border:"1px solid #c0cfe8",borderRadius:3,fontSize:10,color:"#2d2080",fontWeight:600,outline:"none",fontFamily:"inherit"}}/>
                    <button onClick={()=>setOtherCharges(p=>p.filter((_,j)=>j!==i))} style={{width:16,height:16,background:"#fee2e2",border:"1px solid #fca5a5",color:"#ef4444",borderRadius:2,cursor:"pointer",fontSize:9,lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button>
                  </div>
                ))}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"3px 0",borderBottom:"1px solid #dde3ef"}}>
                  <button onClick={()=>setOtherCharges(p=>[...p,{label:"",amount:""}])} style={{fontSize:9,color:"#2d2080",background:"transparent",border:"1px dashed #2d2080",borderRadius:3,padding:"1px 6px",cursor:"pointer",fontWeight:700}}>+ Other Charge</button>
                  {otherTotal>0&&<span style={{fontSize:10,fontWeight:600,color:"#2d2080"}}>{peso(otherTotal)}</span>}
                </div>
                <div style={{display:"flex",justifyContent:"space-between",padding:"8px",background:"linear-gradient(135deg,#2d2080,#3a2db5)",borderRadius:5,marginTop:6,color:"#fff",fontWeight:900,fontSize:13}}><span>TOTAL DUE</span><span>{peso(total)}</span></div>
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <button onClick={()=>{if(cart.length===0||window.confirm("Start a new invoice?")){setCart([]);setDiscount(0);setSelClient(null);setVatOverride(null);setEwtPct(0);setNotes("");setOtherCharges([]);}}} style={{flex:1,padding:"8px 0",background:"#dcfce7",border:"1.5px solid #22c55e",borderRadius:7,color:"#15803d",fontWeight:700,cursor:"pointer",fontSize:12}}>✚ New Invoice</button>
              <button onClick={clearCart} style={{flex:1,padding:"8px 0",background:"#f1f5f9",border:"1.5px solid #cbd5e1",borderRadius:7,color:"#64748b",fontWeight:700,cursor:"pointer",fontSize:12}}>🗑 Clear</button>
              <button onClick={handlePrint} disabled={cart.length===0||!selClient} style={{flex:2,padding:"8px 0",background:(cart.length===0||!selClient)?"#e2e8f0":"#2d2080",border:"none",borderRadius:7,color:(cart.length===0||!selClient)?"#94a3b8":"#fff",fontWeight:800,cursor:(cart.length===0||!selClient)?"not-allowed":"pointer",fontSize:13}}>💾 Save Invoice</button>
            </div>
          </div>
        </div>
      </div>

      {/* Company Settings Modal */}
      {showCompany&&coForm&&(
        <Modal title="⚙️ Company Settings" onClose={()=>setShowCompany(false)}>
          {/* Logo Upload */}
<div style={{marginBottom:12}}>
  <div className="form-label">Company Logo</div>
  <input 
    type="file" 
    accept="image/*" 
    onChange={(e)=>{
      const file = e.target.files[0];
      if(file){
        const reader = new FileReader();
        reader.onload = (r)=>setCoForm({...coForm, logo: r.target.result});
        reader.readAsDataURL(file);
      }
    }} 
    className="form-input"
  />
  {coForm.logo && (
    <img src={coForm.logo} alt="Logo Preview" style={{width:80,height:80,marginTop:8,objectFit:"contain"}}/>
  )}
</div>
          {[["Company Name","name"],["Tagline / Description","tagline"],["Address","address"],["Phone","phone"],["Email","email"],["Bank / Payment Details","bank"]].map(([lbl,key])=>(
            <div key={key} style={{marginBottom:12}}><div className="form-label">{lbl}</div><input className="form-input" type="text" value={coForm[key]||""} onChange={e=>setCoForm(f=>({...f,[key]:e.target.value}))}/></div>
          ))}
          <div style={{display:"flex",gap:10,marginTop:4,marginBottom:20}}>
            <button onClick={()=>{setCompany({...coForm});setShowCompany(false);showBadge();}} style={{flex:1,padding:"10px 0",background:"#3b82f6",border:"none",borderRadius:8,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:14}}>💾 Save</button>
            <button onClick={()=>setShowCompany(false)} style={{flex:1,padding:"10px 0",background:"#334155",border:"none",borderRadius:8,color:"#94a3b8",fontWeight:700,cursor:"pointer",fontSize:14}}>Cancel</button>
          </div>

          {/* ── Data Backup & Restore ── */}
          <div style={{borderTop:"1px solid var(--brand-border)",paddingTop:16}}>
            <div style={{fontWeight:800,fontSize:13,color:"var(--brand-cyan)",marginBottom:4}}>💾 Data Backup & Restore</div>
            <div style={{fontSize:11,color:"var(--brand-muted)",marginBottom:12,lineHeight:1.5}}>
              Export all your invoices, clients, products and payments to a JSON file. Use this to back up your data or transfer it to another device. To restore, import a previously exported file.
            </div>
            <div style={{display:"flex",gap:8,marginBottom:10}}>
              <button onClick={()=>{
                const data = {
                  version:2,
                  exported: new Date().toISOString(),
                  products, clients, history, salesItems, payments,
                  invCounter, company,
                  quoteHistory, quoteCounter:qCounter,
                  drHistory, drCounter,
                };
                const json = JSON.stringify(data, null, 2);
                const blob = new Blob([json], {type:"application/json"});
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "breeks_pos_backup_" + new Date().toISOString().slice(0,10) + ".json";
                a.click();
                URL.revokeObjectURL(url);
              }} style={{flex:1,padding:"9px 0",background:"linear-gradient(135deg,#2d2080,#3a2db5)",border:"none",borderRadius:7,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13}}>
                ⬇️ Export Backup (JSON)
              </button>
            </div>
            <div style={{position:"relative"}}>
              <input type="file" accept=".json" id="restore-input" style={{display:"none"}}
                onChange={(e)=>{
                  const file = e.target.files[0];
                  if(!file) return;
                  const reader = new FileReader();
                  reader.onload = (ev) => {
                    try {
                      const d = JSON.parse(ev.target.result);
                      if(!d.version || !d.history) { alert("Invalid backup file. Please use a file exported from this app."); return; }
                      if(!window.confirm(`Restore backup from ${d.exported ? new Date(d.exported).toLocaleDateString("en-PH") : "unknown date"}?\n\nThis will REPLACE all current data including ${d.history?.length||0} invoices, ${d.clients?.length||0} clients, and ${d.products?.length||0} products.\n\nMake sure to export a backup first if needed.`)) return;
                      if(d.products)    setProducts(d.products);
                      if(d.clients)     setClients(d.clients);
                      if(d.history)     setHistory(d.history);
                      if(d.salesItems)  setSalesItems(d.salesItems);
                      if(d.payments)    setPayments(d.payments);
                      if(d.invCounter)  setInvCounter(d.invCounter);
                      if(d.company)     setCompany(d.company);
                      if(d.quoteHistory) setQuoteHistory(d.quoteHistory);
                      if(d.drHistory)   setDrHistory(d.drHistory);
                      showBadge();
                      setShowCompany(false);
                      alert("✅ Data restored successfully! " + (d.history?.length||0) + " invoices loaded.");
                    } catch(err) { alert("Failed to parse backup file: " + err.message); }
                  };
                  reader.readAsText(file);
                  e.target.value = "";
                }}
              />
              <button onClick={()=>document.getElementById("restore-input").click()} style={{width:"100%",padding:"9px 0",background:"#f59e0b20",border:"1.5px solid #f59e0b",borderRadius:7,color:"#f59e0b",fontWeight:700,cursor:"pointer",fontSize:13}}>
                ⬆️ Import / Restore from Backup
              </button>
            </div>
            <div style={{marginTop:8,fontSize:10,color:"#64748b",textAlign:"center"}}>
              Backup includes: invoices · clients · products · payments · quotes · delivery receipts
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
// ── PERF FIX 1: Deferred Babel compilation with loading screen ──
(function() {
  var msgs = ["Starting up…", "Loading scripts…", "Initialising app…", "Almost ready…"];
  var mi = 0;
  var msgEl = document.getElementById("loading-msg");
  var msgTimer = setInterval(function() {
    mi++; if(mi < msgs.length && msgEl) msgEl.textContent = msgs[mi];
  }, 600);

  function hideSplash() {
    clearInterval(msgTimer);
    var el = document.getElementById("app-loading");
    if(el){ el.classList.add("fade-out"); setTimeout(function(){ el.style.display="none"; }, 450); }
  }

  // Load Babel async (non-blocking)
  var babelScript = document.createElement("script");
  babelScript.src = "https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js";
  babelScript.onload = function() {
    // Compile the JSX source
    var src = document.getElementById("jsx-source");
    if(src) {
      try {
        var compiled = Babel.transform(src.textContent, {
          presets: ["react"],
          plugins: []
        }).code;
        var execScript = document.createElement("script");
        execScript.textContent = compiled;
        document.head.appendChild(execScript);
      } catch(e) {
        console.error("Babel compile error:", e);
      }
    }
    hideSplash();
  };
  babelScript.onerror = function() {
    // Fallback: change type to text/babel and use inline babel if available
    console.warn("Babel CDN failed, trying fallback");
    hideSplash();
  };
  document.head.appendChild(babelScript);
})();
</script>
</body>
</html>
