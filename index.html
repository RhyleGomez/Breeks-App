                            <button onClick={()=>{const paidAmt2=payments.filter(p=>p.invoiceNo===inv.invoiceNo).reduce((s,p)=>s+(p.amount||0),0);const bal2=(inv.total||0)-paidAmt2;setPmForm({amount:bal2>0?bal2.toFixed(2):"",method:"Cash",ref:"",date:new Date().toISOString().slice(0,10)});setShowPayModal(inv.invoiceNo);}} style={{fontSize:10,padding:"3px 7px",background:"#22c55e20",border:"1px solid #22c55e",color:"#4ade80",borderRadius:5,cursor:"pointer",fontWeight:600}}>💳</button>
                            <button onClick={()=>{setCurrentInv(inv);setView("receipt");}} style={{fontSize:10,padding:"3px 7px",background:"#3b82f620",border:"1px solid #3b82f6",color:"#60a5fa",borderRadius:5,cursor:"pointer",fontWeight:600}}>👁</button>
                          </div>
                        </div>
                      );
                    })}
                    {/* Total row */}
                    {runningBal.length>0&&(()=>{
                      const rows = runningBal.filter(({inv})=>soaMonth==="All"||new Date(inv.date).toLocaleDateString("en-PH",{month:"short",year:"numeric"})===soaMonth);
                      const tot  = rows.reduce((s,{inv})=>s+(inv.total||0),0);
                      const totP = rows.reduce((s,{pAmt})=>s+pAmt,0);
                      const totB = tot-totP;
                      return (
                        <div style={{display:"grid",gridTemplateColumns:"120px 1fr 100px 100px 100px 80px 90px",padding:"10px 12px",borderTop:"2px solid var(--brand-border)",background:"rgba(0,196,212,0.08)",gap:4}}>
                          <div style={{fontWeight:800,fontSize:11,color:"var(--brand-cyan)",gridColumn:"1/3",textTransform:"uppercase",letterSpacing:0.5}}>Total</div>
                          <div style={{textAlign:"right",fontWeight:900,color:"#fff"}}>{peso(tot)}</div>
                          <div style={{textAlign:"right",fontWeight:900,color:"#22c55e"}}>{peso(totP)}</div>
                          <div style={{textAlign:"right",fontWeight:900,color:totB>0?"#f59e0b":"#22c55e"}}>{peso(totB)}</div>
                          <div/><div/>
                        </div>
                      );
                    })()}
                  </div>

                  {/* Payment history for this client */}
                  {c.cPays.length>0&&(
                    <div style={{marginTop:16,background:"var(--brand-surface)",borderRadius:12,border:"1px solid var(--brand-border)",overflow:"hidden"}}>
                      <div style={{padding:"10px 14px",borderBottom:"1px solid var(--brand-border)",fontWeight:700,fontSize:12,color:"#22c55e"}}>💳 Payment History</div>
                      {c.cPays.map((p,i)=>(
                        <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 14px",borderTop:i===0?"none":"1px solid var(--brand-border)",background:i%2===0?"transparent":"rgba(255,255,255,0.02)"}}>
                          <div>
                            <div style={{fontSize:11,fontWeight:700,color:"#94a3b8"}}>{p.invoiceNo} · {fmtDate(p.date)}</div>
                            <div style={{fontSize:10,color:"#64748b"}}>{p.method||"Cash"}{p.ref?" · Ref: "+p.ref:""}</div>
                          </div>
                          <div style={{fontSize:13,fontWeight:900,color:"#22c55e"}}>{peso(p.amount)}</div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })()}
          </div>
        </div>
        {/* Payment modal also accessible from Ledger */}
        {showPayModal&&(()=>{
          const inv = history.find(x=>x.invoiceNo===showPayModal);
          if(!inv) return null;
          const paid = payments.filter(p=>p.invoiceNo===inv.invoiceNo).reduce((s,p)=>s+(p.amount||0),0);
          const bal  = (inv.total||0) - paid;
          return (
            <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowPayModal(null)}>
              <div className="modal-box" style={{maxWidth:400}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                  <div style={{fontWeight:800,fontSize:15,color:"#f1f5f9"}}>💳 Record Payment</div>
                  <button onClick={()=>setShowPayModal(null)} style={{background:"#334155",border:"none",color:"#94a3b8",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:16}}>✕</button>
                </div>
                <div style={{background:"var(--brand-bg)",borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:12}}>
                  <div style={{color:"var(--brand-muted)",fontWeight:600}}>{inv.invoiceNo} · {inv.client?.name}</div>
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
                    <span style={{color:"#94a3b8"}}>Invoice Total:</span><span style={{fontWeight:700,color:"#fff"}}>{peso(inv.total)}</span>
                  </div>
                  {paid>0&&<div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
                    <span style={{color:"#94a3b8"}}>Already Paid:</span><span style={{fontWeight:700,color:"#22c55e"}}>{peso(paid)}</span>
                  </div>}
                  <div style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid var(--brand-border)",marginTop:6,paddingTop:6}}>
                    <span style={{color:"#94a3b8"}}>Balance:</span><span style={{fontWeight:900,color:bal>0?"#f59e0b":"#22c55e",fontSize:14}}>{peso(bal)}</span>
                  </div>
                </div>
                <div style={{marginBottom:10}}>
                  <div className="form-label">Amount (₱)</div>
                  <input className="form-input" type="number" min="0" step="0.01" value={pmForm.amount} onChange={e=>setPmForm(p=>({...p,amount:e.target.value}))} placeholder="0.00"/>
                </div>
                <div style={{display:"flex",gap:10,marginBottom:10}}>
                  <div style={{flex:1}}>
                    <div className="form-label">Method</div>
                    <select className="form-input" value={pmForm.method} onChange={e=>setPmForm(p=>({...p,method:e.target.value}))}>
                      {["Cash","Bank Transfer","GCash","Maya","Cheque","Other"].map(m=><option key={m}>{m}</option>)}
                    </select>
                  </div>
                  <div style={{flex:1}}>
                    <div className="form-label">Date</div>
                    <input className="form-input" type="date" value={pmForm.date} onChange={e=>setPmForm(p=>({...p,date:e.target.value}))} style={{colorScheme:"dark"}}/>
                  </div>
                </div>
                <div style={{marginBottom:14}}>
                  <div className="form-label">Reference No. (optional)</div>
                  <input className="form-input" type="text" value={pmForm.ref} onChange={e=>setPmForm(p=>({...p,ref:e.target.value}))} placeholder="Transaction / cheque no."/>
                </div>
                <button onClick={()=>{
                  const amt = parseFloat(pmForm.amount);
                  if(!amt||amt<=0){alert("Enter a valid amount.");return;}
                  const payRec = {id:"pay_"+Date.now()+"_"+Math.random().toString(36).slice(2,7),invoiceNo:inv.invoiceNo,amount:amt,method:pmForm.method,ref:pmForm.ref,date:pmForm.date?new Date(pmForm.date).toISOString():new Date().toISOString()};
                  setPayments(prev=>[...prev,payRec]);
                  const newPaid = paid + amt;
                  if(newPaid>=(inv.total||0)-0.01 && inv.status==="Unpaid") {
                    setHistory(h=>h.map(x=>x.invoiceNo===inv.invoiceNo?{...x,status:"Paid"}:x));
                  }
                  showBadge();
                  setShowPayModal(null);
                }} style={{width:"100%",padding:"11px 0",background:"linear-gradient(135deg,#22c55e,#16a34a)",border:"none",borderRadius:8,color:"#fff",fontWeight:800,cursor:"pointer",fontSize:14}}>
                  ✅ Record Payment
                </button>
              </div>
            </div>
          );
        })()}
      </div>
    );
  }

  // ── QUOTATION HISTORY ─────────────────────────────────────────────────────
  if(view==="quote_history") {
    const qhFiltered = quoteHistory.filter(q=>
      !qHistSearch ||
      (q.quoteNo||"").toLowerCase().includes(qHistSearch.toLowerCase()) ||
      (q.client?.name||"").toLowerCase().includes(qHistSearch.toLowerCase())
    );
    const statusColors = {
      Active:    {bg:"#0ea5e920",color:"#38bdf8"},
      Converted: {bg:"#22c55e20",color:"#22c55e"},
      Void:      {bg:"#ef444420",color:"#ef4444"},
    };
    return (
      <div style={{minHeight:"100vh",background:"var(--brand-bg)"}}>
        {badge&&<div className="save-badge">✅ Saved</div>}
        {syncStatus&&<div className={`sync-indicator sync-${syncStatus}`}>{syncStatus==='saving'?'☁️ Saving...':syncStatus==='saved'?'✅ Saved to Drive':'❌ Sync Error'}</div>}
        {/* Header */}
        <div style={{background:"linear-gradient(135deg,#1a1560,#2d2080)",padding:"12px 20px",display:"flex",alignItems:"center",gap:12,borderBottom:"2px solid #f59e0b",flexWrap:"wrap"}}>
          <button onClick={()=>setView("quotation")} className="nav-btn" style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",color:"#fff",borderRadius:7,padding:"7px 14px",fontWeight:700,fontSize:13}}>← Quotation</button>
          <div style={{fontWeight:800,fontSize:16,color:"#fcd34d"}}>📝 Quotation History</div>
          <div style={{marginLeft:"auto",fontSize:12,color:"#64748b"}}>{quoteHistory.length} saved</div>
          {quoteHistory.length>0&&<button onClick={()=>{if(window.confirm("Clear all quotation history?"))setQuoteHistory([]);}} style={{background:"#ef444420",border:"1px solid #ef4444",color:"#ef4444",borderRadius:7,padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>🗑 Clear All</button>}
        </div>
        {/* Search */}
        <div style={{padding:"12px 16px",background:"#0f172a",borderBottom:"1px solid #1e293b",maxWidth:900,margin:"0 auto",paddingTop:16}}>
          <input value={qHistSearch} onChange={e=>setQHistSearch(e.target.value)} placeholder="🔍  Search by quote no. or client name..." style={{width:"100%",padding:"10px 14px",background:"var(--brand-surface)",border:"1px solid var(--brand-border)",borderRadius:8,color:"#f1f5f9",fontSize:13,outline:"none",caretColor:"var(--brand-cyan)"}}/>
        </div>
        {/* List */}
        <div style={{padding:16,maxWidth:900,margin:"0 auto"}}>
          {qhFiltered.length===0
            ? <div style={{textAlign:"center",padding:60,color:"#475569"}}><div style={{fontSize:40,marginBottom:10}}>📭</div><div>{quoteHistory.length===0?"No quotations saved yet.":"No results found."}</div></div>
            : qhFiltered.map((q,i)=>{
              const sc = statusColors[q.status]||{bg:"#64748b20",color:"#64748b"};
              const isExpired = q.status==="Active" && new Date(q.validUntil)<new Date();
              return (
                <div key={i} style={{background:"var(--brand-surface)",border:"1px solid var(--brand-border)",borderRadius:12,padding:"14px 18px",marginBottom:10,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                  <div style={{flex:1,minWidth:200}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap"}}>
                      <span style={{fontWeight:800,color:"#fcd34d",fontSize:14}}>{q.quoteNo}</span>
                      <span style={{background:sc.bg,color:sc.color,fontSize:10,padding:"2px 8px",borderRadius:10,fontWeight:700}}>{q.status}</span>
                      {isExpired&&<span style={{background:"#ef444420",color:"#ef4444",fontSize:10,padding:"2px 8px",borderRadius:10,fontWeight:700}}>Expired</span>}
                      {q.convertedTo&&<span style={{fontSize:10,color:"#22c55e",fontWeight:600}}>→ {q.convertedTo}</span>}
                    </div>
                    <div style={{fontSize:12,color:"#f1f5f9",fontWeight:600}}>{q.client?.name}</div>
                    <div style={{fontSize:11,color:"#64748b"}}>{fmtDate(q.date)} · Valid until {fmtDate(q.validUntil)} · {(q.cart||[]).length} item{(q.cart||[]).length!==1?"s":""}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:17,fontWeight:900,color:"#fcd34d"}}>{peso(q.total)}</div>
                  </div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    <button onClick={()=>{setCurrentQuote(q);setViewQuote(true);setView("quotation");}} style={{background:"#f59e0b20",border:"1px solid #f59e0b",color:"#fcd34d",borderRadius:7,padding:"7px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>👁 View</button>
                    <button onClick={()=>{
                      if(!window.confirm("Re-open this quotation for editing? It will be loaded into the quote builder.")) return;
                      setQCart([...(q.cart||[])]);
                      setQSelClient(q.client||null);
                      setQDiscount(q.discount||0);
                      setQVatOverride(q.vatOverride??null);
                      setQEwtPct(q.ewtPct||0);
                      setQNotes(q.notes||"");
                      setQSignatories(q.signatories||{preparedBy:'',checkedBy:'',receivedBy:''});
                      setView("quotation");
                    }} style={{background:"#a855f720",border:"1px solid #a855f7",color:"#c084fc",borderRadius:7,padding:"7px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>✏️ Re-use</button>
                    {q.status!=="Converted"&&<button onClick={()=>{if(window.confirm("Mark quote "+q.quoteNo+" as Void?"))setQuoteHistory(qs=>qs.map((x,j)=>j===i?{...x,status:"Void"}:x));}} style={{background:"#f59e0b20",border:"1px solid #f59e0b",color:"#f59e0b",borderRadius:7,padding:"7px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>⚠ Void</button>}
                    <button onClick={()=>{if(window.confirm("Delete quote "+q.quoteNo+"?"))setQuoteHistory(qs=>qs.filter((_,j)=>j!==i));}} style={{background:"#ef444420",border:"1px solid #ef4444",color:"#ef4444",borderRadius:7,padding:"7px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>🗑</button>
                  </div>
                </div>
              );
            })
          }
        </div>
      </div>
    );
  }


  // ── DELIVERY RECEIPT VIEW ──────────────────────────────────────────────────
  if(view==="delivery_receipt" && !viewDr) {
    const drCategories = ["All", ...Array.from(new Set(products.map(p=>p.category))).sort()];
    const drFiltered = products.filter(p=>
      (drActiveCat==="All"||p.category===drActiveCat)&&
      (p.name.toLowerCase().includes(drSearch.toLowerCase())||p.sku.toLowerCase().includes(drSearch.toLowerCase()))
    );
    const addToDrCart = p => {
      setDrCart(prev=>{
        const ex=prev.find(i=>i.sku===p.sku);
        if(ex) return prev.map(i=>i.lineId===ex.lineId?{...i,qty:i.qty+1}:i);
        return [...prev,{...p,lineId:genLineId(),qty:1,customName:""}];
      });
      setDrFlash(p.sku); setTimeout(()=>setDrFlash(null),350);
    };
    const handleSaveDr = () => {
      if(!drSelClient){alert("Please select a client first.");return;}
      if(drCart.length===0){alert("Please add at least one item.");return;}
      const no="DR-"+String(drCounter).padStart(4,"0");
      setDrCounter(c=>c+1);
      const dr={drNo:no,date:new Date().toISOString(),invoiceNo:drInvoiceNo,client:drSelClient,deliveredBy:drDeliveredBy,receivedBy:drReceivedBy,deliveryAddress:drAddress||drSelClient?.address||"",items:[...drCart],notes:drNotes,status:"Delivered",companySnap:{...company}};
      setCurrentDr(dr); setDrHistory(h=>[dr,...h]); setViewDr(true);
    };
    return (
      <div style={{minHeight:"100vh",background:"var(--brand-bg)",display:"flex",flexDirection:"column"}}>
        {badge&&<div className="save-badge">✅ Saved</div>}
        <div style={{background:"linear-gradient(135deg,#14532d,#166534)",padding:"10px 16px",display:"flex",alignItems:"center",gap:10,borderBottom:"2px solid #22c55e",flexShrink:0,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:18,fontWeight:900,color:"#86efac",letterSpacing:1}}>📦 DELIVERY RECEIPT</span>
          </div>
          <div style={{marginLeft:"auto",display:"flex",gap:8,flexWrap:"wrap"}}>
            {[["🧾 POS","pos"],["📝 Quotation","quotation"],["📋 DR History","dr_history"],["📋 Invoice History","history"]].map(([lbl,v])=>(
              <button key={v} onClick={()=>setView(v)} className="nav-btn" style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.15)",color:"#fff",borderRadius:7,padding:"6px 12px",fontWeight:600,fontSize:11}}>{lbl}</button>
            ))}
          </div>
        </div>
        <div style={{flex:1,display:"flex",overflow:"hidden",minHeight:0}}>
          <div style={{flex:"0 0 25%",width:"25%",display:"flex",flexDirection:"column",borderRight:"2px solid var(--brand-border)",background:"var(--brand-surface)",overflowY:"hidden"}}>
            <div style={{padding:"10px 10px 6px",flexShrink:0}}>
              <input value={drSearch} onChange={e=>setDrSearch(e.target.value)} placeholder="🔍 Search product..." style={{width:"100%",padding:"7px 10px",background:"var(--brand-bg)",border:"1px solid var(--brand-border)",borderRadius:7,color:"var(--brand-text)",fontSize:12,outline:"none"}}/>
            </div>
            <div style={{padding:"0 10px 8px",display:"flex",gap:4,flexWrap:"wrap",flexShrink:0}}>
              {drCategories.map(cat=>(
                <button key={cat} onClick={()=>setDrActiveCat(cat)} className="cat-btn" style={{padding:"3px 9px",borderRadius:20,fontSize:10,fontWeight:700,background:drActiveCat===cat?"#22c55e":"rgba(255,255,255,0.07)",color:drActiveCat===cat?"#fff":"var(--brand-muted)"}}>{cat}</button>

            <div style={{flex:1,overflowY:"auto",padding:"0 8px 8px"}}>

                  <div key={p.sku} className="prod-btn" onClick={()=>addToDrCart(p)} style={{background:drFlash===p.sku?"#22c55e20":inCart?"rgba(34,197,94,0.08)":"var(--brand-surface2)",border:`1.5px solid ${inCart?"#22c55e":"var(--brand-border)"}`,borderRadius:10,padding:"9px 10px",marginBottom:6,cursor:"pointer",position:"relative"}}>
                    {inCart&&<div style={{position:"absolute",top:4,right:4,background:"#22c55e",color:"#fff",borderRadius:9,fontSize:9,fontWeight:800,padding:"1px 5px"}}>×{inCart.qty}</div>}

                    <div style={{fontSize:11,fontWeight:700,color:"var(--brand-text)",lineHeight:1.3,marginBottom:3}}>{p.name}</div>

                  </div>
                );
