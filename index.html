<style>
  :root {
    --brand-purple: #2d2080;
    --brand-purple-dark: #1a1560;
    --brand-purple-mid: #3a2db5;
    --brand-cyan: #00c4d4;
    --brand-cyan-dark: #009aaa;
    --brand-bg: #0e0c2e;
    --brand-surface: #181548;
    --brand-surface2: #201d60;
    --brand-border: #2a277a;
    --brand-text: #e8e8ff;
    --brand-muted: #8b89c0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Roboto', 'Segoe UI', system-ui, sans-serif; background: var(--brand-bg); color: var(--brand-text); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--brand-surface); }
  ::-webkit-scrollbar-thumb { background: var(--brand-purple-mid); border-radius: 3px; }
  .prod-btn { transition: all 0.15s; cursor: pointer; }
  .prod-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,184,212,0.25) !important; }
  .prod-btn.flash { transform: scale(0.96); }
  .cat-btn { transition: all 0.15s; cursor: pointer; border: none; font-family: inherit; }
  .cat-btn:hover { opacity: 0.85; }
  .rm-btn { transition: all 0.15s; }
  .rm-btn:hover { background: #ef4444 !important; color: #fff !important; }
  .nav-btn { transition: all 0.15s; cursor: pointer; border: none; font-family: inherit; }
  .nav-btn:hover { background: var(--brand-purple-mid) !important; }
  input, textarea { font-family: inherit; }
  button { font-family: inherit; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; }
  .modal-box { background:var(--brand-surface); border-radius:14px; padding:24px; width:100%; max-width:480px; border:1px solid var(--brand-border); max-height:90vh; overflow-y:auto; }
  .form-input { width:100%; padding:9px 12px; background:var(--brand-bg); border:1px solid var(--brand-border); border-radius:7px; color:var(--brand-text); font-size:13px; outline:none; margin-top:4px; }
  .form-input:focus { border-color:var(--brand-cyan); }
  .form-label { font-size:11px; color:var(--brand-muted); font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
  .print-only { display: none; }
  .save-badge { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--brand-cyan); color:#fff; padding:9px 22px; border-radius:20px; font-size:13px; font-weight:700; z-index:999; pointer-events:none; box-shadow:0 4px 16px rgba(0,184,212,0.5); }
  .sync-indicator { position:fixed; top:12px; right:16px; font-size:11px; font-weight:700; padding:4px 12px; border-radius:12px; z-index:999; pointer-events:none; }
  .sync-saving { background:#f59e0b; color:#fff; }
  .sync-saved { background:#22c55e; color:#fff; }
  .sync-error { background:#ef4444; color:#fff; }
  @media print {
    .no-print { display: none !important; }
    .print-only { display: inline !important; }
    body { background: #fff; color: #111; }
    #receipt-area { display: block !important; }
    #pos-area { display: none !important; }
  }
  /* ── Inline product picker ── */
  /* ── Product autocomplete ── */
  .pac-wrap{position:relative;width:100%;}
  .pac-input{width:100%;padding:4px 6px;border:1.5px solid transparent;border-radius:4px;font-size:11px;font-weight:600;font-family:inherit;outline:none;background:transparent;cursor:text;box-sizing:border-box;}
  .pac-input:focus{border-color:#2d2080;background:#fff;color:#111;}
  .pac-input::placeholder{color:#94a3b8;font-weight:400;}
  .pac-input.inv{color:#111;}
  .pac-input.qot{color:#e2e8ff;background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.15);}
  .pac-input.qot:focus{color:#111;background:#fff;border-color:#2d2080;}
  .pac-input.dr{color:var(--brand-text);}
  .pac-input.dr:focus{color:#111;background:#fff;border-color:#2d2080;}
  .pac-drop{position:absolute;top:calc(100% + 2px);left:0;min-width:300px;max-width:440px;background:#fff;border:2px solid #2d2080;border-radius:10px;box-shadow:0 10px 36px rgba(0,0,0,0.22);z-index:9999;overflow:hidden;}
  .pac-list{max-height:230px;overflow-y:auto;}
  .pac-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;cursor:pointer;border-bottom:1px solid #f1f5f9;gap:10px;}
  .pac-item:hover,.pac-item.active{background:#eef2ff;}
  .pac-item:last-child{border-bottom:none;}
  .pac-iname{font-size:12px;font-weight:700;color:#2d2080;line-height:1.3;}
  .pac-imeta{font-size:10px;color:#94a3b8;margin-top:1px;}
  .pac-iprice{font-size:12px;font-weight:900;color:#2d2080;white-space:nowrap;}
  .pac-empty{padding:14px;text-align:center;color:#94a3b8;font-size:11px;}
  /* ── Fast loading screen ── */
  #app-loading {
    position: fixed; inset: 0; background: var(--brand-bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9999; transition: opacity 0.4s ease;
  }
  #app-loading.fade-out { opacity: 0; pointer-events: none; }
  .loading-logo {
    font-family: 'Roboto', sans-serif; font-weight: 900; font-size: 28px;
    color: #fff; letter-spacing: 4px; margin-bottom: 8px;
  }
  .loading-sub {
    font-size: 10px; color: var(--brand-cyan); letter-spacing: 3px;
    text-transform: uppercase; font-weight: 700; margin-bottom: 32px;
  }
  .loading-bar-wrap {
    width: 220px; height: 3px; background: var(--brand-surface2);
    border-radius: 2px; overflow: hidden;
  }
  .loading-bar {
    height: 100%; width: 0%; background: linear-gradient(90deg, var(--brand-cyan), #7c3aed);
    border-radius: 2px; animation: loadprogress 2.5s ease-in-out forwards;
  }
  @keyframes loadprogress {
    0%   { width: 0%; }
    40%  { width: 60%; }
    70%  { width: 80%; }
    90%  { width: 92%; }
    100% { width: 100%; }
  }
  .loading-msg {
    margin-top: 14px; font-size: 11px; color: var(--brand-muted); letter-spacing: 0.5px;
  }
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;appearance:textfield;}
select option{background:#1e293b;color:#f1f5f9;}

          : paidAmt > 0 ? `<tr style="background:#f0fdf4"><td colspan="6" style="padding:4px 10px 8px;font-size:11px;font-weight:600;color:#166534">✅ Paid · Running Balance</td><td style="padding:4px 10px 8px;text-align:right;font-size:11px;font-weight:900;color:#166534">${fmt(runBal)}</td></tr>` : "";

            <thead><tr style="background:#eeedf8">
              <th style="padding:6px 10px;text-align:left;font-size:10px;font-weight:800;color:#2d2080;text-transform:uppercase;width:38%">Description</th>

              <th style="padding:6px 10px;text-align:center;font-size:10px;font-weight:800;color:#2d2080;text-transform:uppercase;width:8%">Disc%</th>

              ${(inv.vatTotal||0)>0?`<tr style="background:#f8faff"><td colspan="6" style="padding:3px 10px;text-align:right;font-size:10px;color:#555">VAT (${inv.vatOverride||0}%)</td><td style="padding:3px 10px;text-align:right;font-size:10px;color:#555">${fmt(inv.vatTotal||0)}</td></tr>`:""}
              ${(inv.globalDisc||0)>0?`<tr style="background:#f8faff"><td colspan="6" style="padding:3px 10px;text-align:right;font-size:10px;color:#c00">Discount (${inv.discount||0}%)</td><td style="padding:3px 10px;text-align:right;font-size:10px;color:#c00">-${fmt(inv.globalDisc||0)}</td></tr>`:""}
              ${(inv.ewtAmt||0)>0?`<tr style="background:#f8faff"><td colspan="6" style="padding:3px 10px;text-align:right;font-size:10px;color:#c00">EWT (${inv.ewtPct||0}%)</td><td style="padding:3px 10px;text-align:right;font-size:10px;color:#c00">-${fmt(inv.ewtAmt||0)}</td></tr>`:""}
              <tr style="background:#2d2080"><td colspan="6" style="padding:8px 10px;text-align:right;font-size:12px;font-weight:900;color:#fff">TOTAL DUE</td><td style="padding:8px 10px;text-align:right;font-size:13px;font-weight:900;color:#00c4d4">${fmt(inv.total||0)}</td></tr>
              ${outstandingRow}
            </tbody>
          </table>
        </div>`;
      }).join("");
      const grandTotal = soaInvs.reduce((s,i)=>s+(i.total||0),0);
      const grandPaid  = payments.filter(p=>soaInvs.some(i=>i.invoiceNo===p.invoiceNo)).reduce((s,p)=>s+(p.amount||0),0);
      const grandBal   = soaInvs.reduce((s,inv)=>{const p=payments.filter(x=>x.invoiceNo===inv.invoiceNo).reduce((a,x)=>a+(x.amount||0),0);return s+Math.max(0,(inv.total||0)-p);},0);
      const overdueAmt = soaInvs.filter(i=>i.status==="Unpaid"&&i.dueDate&&new Date(i.dueDate)<new Date()).reduce((s,i)=>s+(i.total||0),0);
      const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"/><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Arial',sans-serif;background:#fff;color:#111;padding:24px 28px;max-width:860px;margin:0 auto}@page{margin:12mm}@media print{body{padding:0}}</style></head><body>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;border-bottom:4px solid #2d2080;padding-bottom:16px;margin-bottom:20px">
        <div style="display:flex;align-items:center;gap:14px">${co.logo?`<img src="${co.logo}" style="height:56px;object-fit:contain"/>`:""}<div><div style="font-size:22px;font-weight:900;color:#2d2080;letter-spacing:2px">${co.name||"BREEKS"}</div><div style="font-size:9px;font-weight:700;color:#00c4d4;letter-spacing:3px;text-transform:uppercase;margin-top:2px">${co.tagline||"Digital Marketing Services"}</div><div style="font-size:10px;color:#555;margin-top:4px;line-height:1.7">${co.address||""}<br/>${co.phone||""}${co.email?" · "+co.email:""}</div></div></div>
        <div style="text-align:right"><div style="background:#2d2080;color:#fff;font-size:18px;font-weight:900;padding:8px 20px;border-radius:6px;letter-spacing:3px">STATEMENT</div><div style="font-size:10px;color:#555;margin-top:8px;line-height:1.9">Date: <b>${new Date().toLocaleDateString("en-PH",{day:"2-digit",month:"short",year:"numeric"})}</b><br/>Period: <b>${soaMonth==="All"?"All Time":soaMonth}</b></div></div>
      </div>
      <div style="background:#eeedf8;border-radius:8px;padding:12px 16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
        <div><div style="font-size:9px;font-weight:800;color:#2d2080;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Client</div><div style="font-size:16px;font-weight:900;color:#2d2080">${soaClient.name}</div>${soaClient.contact?`<div style="font-size:11px;color:#333;margin-top:2px">${soaClient.contact}</div>`:""}${soaClient.phone?`<div style="font-size:11px;color:#555">${soaClient.phone}</div>`:""}${soaClient.address?`<div style="font-size:11px;color:#555">${soaClient.address}</div>`:""}${soaClient.tin?`<div style="font-size:11px;color:#2d2080;font-weight:700">TIN: ${soaClient.tin}</div>`:""}</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <div style="border:1px solid #c7c4e8;border-radius:8px;padding:10px 14px;min-width:100px;text-align:right"><div style="font-size:9px;color:#555;font-weight:700;text-transform:uppercase">Total Billed</div><div style="font-size:16px;font-weight:900;color:#2d2080;margin-top:2px">₱${Number(grandTotal).toLocaleString("en-PH",{minimumFractionDigits:2})}</div></div>
          <div style="border:1px solid #86efac;border-radius:8px;padding:10px 14px;min-width:100px;text-align:right;background:#f0fdf4"><div style="font-size:9px;color:#166534;font-weight:700;text-transform:uppercase">Collected</div><div style="font-size:16px;font-weight:900;color:#166534;margin-top:2px">₱${Number(grandPaid).toLocaleString("en-PH",{minimumFractionDigits:2})}</div></div>
          <div style="border:1px solid #fde68a;border-radius:8px;padding:10px 14px;min-width:100px;text-align:right;background:#fefce8"><div style="font-size:9px;color:#b45309;font-weight:700;text-transform:uppercase">Balance Due</div><div style="font-size:16px;font-weight:900;color:#d97706;margin-top:2px">₱${Number(grandBal).toLocaleString("en-PH",{minimumFractionDigits:2})}</div></div>
          ${overdueAmt>0?`<div style="border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;min-width:100px;text-align:right;background:#fef2f2"><div style="font-size:9px;color:#dc2626;font-weight:700;text-transform:uppercase">Overdue</div><div style="font-size:16px;font-weight:900;color:#dc2626;margin-top:2px">₱${Number(overdueAmt).toLocaleString("en-PH",{minimumFractionDigits:2})}</div></div>`:""}
        </div>
      </div>
      <div style="font-size:13px;font-weight:900;color:#2d2080;text-transform:uppercase;letter-spacing:2px;border-left:4px solid #2d2080;padding-left:10px;margin-bottom:16px">INVOICE DETAILS</div>
      ${invRows}
      <div style="border:1.5px solid #2d2080;border-radius:8px;overflow:hidden;margin-top:8px">
        <div style="background:#2d2080;color:#fff;padding:8px 16px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px">Summary — ${soaInvs.length} Invoice${soaInvs.length!==1?"s":""}</div>
        <div style="display:flex;flex-wrap:wrap">
          <div style="flex:1;min-width:100px;padding:10px 16px;border-right:1px solid #e2e8f0;text-align:center"><div style="font-size:9px;color:#555;font-weight:700;text-transform:uppercase">Total Billed</div><div style="font-size:17px;font-weight:900;color:#2d2080;margin-top:2px">₱${Number(grandTotal).toLocaleString("en-PH",{minimumFractionDigits:2})}</div></div>
          <div style="flex:1;min-width:100px;padding:10px 16px;border-right:1px solid #e2e8f0;text-align:center"><div style="font-size:9px;color:#166534;font-weight:700;text-transform:uppercase">Collected</div><div style="font-size:17px;font-weight:900;color:#16a34a;margin-top:2px">₱${Number(grandPaid).toLocaleString("en-PH",{minimumFractionDigits:2})}</div></div>
          <div style="flex:1;min-width:100px;padding:10px 16px;${overdueAmt>0?"border-right:1px solid #e2e8f0;":""}text-align:center"><div style="font-size:9px;color:#b45309;font-weight:700;text-transform:uppercase">Balance Due</div><div style="font-size:17px;font-weight:900;color:#d97706;margin-top:2px">₱${Number(grandBal).toLocaleString("en-PH",{minimumFractionDigits:2})}</div></div>
          ${overdueAmt>0?`<div style="flex:1;min-width:100px;padding:10px 16px;text-align:center;background:#fef2f2"><div style="font-size:9px;color:#dc2626;font-weight:700;text-transform:uppercase">Overdue</div><div style="font-size:17px;font-weight:900;color:#dc2626;margin-top:2px">₱${Number(overdueAmt).toLocaleString("en-PH",{minimumFractionDigits:2})}</div></div>`:""}
        </div>
      </div>
      <div style="margin-top:28px;border-top:1px solid #ccc;padding-top:14px;display:flex;justify-content:space-between;font-size:11px;color:#555">
        <div style="text-align:center;min-width:180px"><div style="border-bottom:1px solid #2d2080;height:28px;margin-bottom:6px"></div><div style="font-size:10px;font-weight:700;color:#2d2080">Prepared by</div><div style="font-size:10px;color:#555;margin-top:2px">${co.name||"Breeks Digital"}</div></div>
        <div style="text-align:center;min-width:180px"><div style="border-bottom:1px solid #555;height:28px;margin-bottom:6px"></div><div style="font-size:10px;font-weight:700">Received by</div><div style="font-size:10px;color:#555;margin-top:2px">Date: ________________</div></div>
      </div>
      <div style="text-align:center;margin-top:14px;font-size:9px;color:#aaa">Computer-generated Statement of Account · ${co.name||"Breeks Digital Marketing Services"} · ${new Date().toLocaleDateString("en-PH",{day:"2-digit",month:"short",year:"numeric"})}</div>
      </body></html>`;
      const w = window.open("","_blank");
      w.document.write(html);
      w.document.close();
      setTimeout(()=>w.print(),600);
    };
    return (
      <div style={{minHeight:"100vh",background:"var(--bg)"}}>
        {badge&&<div className="save-badge">✅ Saved</div>}
        {syncStatus&&<div className={`sync-indicator sync-${syncStatus}`}>{syncStatus==='saving'?'☁️ Saving...':syncStatus==='saved'?'✅ Saved to Drive':'❌ Sync Error'}</div>}
        <div style={{background:"linear-gradient(135deg,var(--brand-purple-dark),var(--brand-purple))",padding:"12px 20px",display:"flex",alignItems:"center",gap:12,borderBottom:"2px solid var(--brand-cyan)",flexWrap:"wrap"}}>
          <button onClick={()=>navigateTo("history")} className="nav-btn" style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",color:"#fff",borderRadius:7,padding:"7px 14px",fontWeight:700,fontSize:13}}>← History</button>
          <button onClick={()=>navigateTo("pos")} className="nav-btn" style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",color:"#fff",borderRadius:7,padding:"7px 14px",fontWeight:700,fontSize:13}}>🧾 POS</button>
          <div style={{fontWeight:800,fontSize:16,color:"#fff"}}>📒 Client Ledger</div>
          <div style={{marginLeft:"auto",display:"flex",gap:16,fontSize:11}}>
            <span style={{color:"var(--bm)"}}>Outstanding: <b style={{color:"#f59e0b",fontSize:13}}>{peso(totalOutstanding)}</b></span>
            <span style={{color:"var(--bm)"}}>Collected: <b style={{color:"#22c55e",fontSize:13}}>{peso(totalCollected)}</b></span>
          </div>
        </div>
        <div style={{display:"flex",height:"calc(100vh - 56px)",overflow:"hidden"}}>
          <div style={{width:280,flexShrink:0,borderRight:"2px solid var(--brand-border)",display:"flex",flexDirection:"column",background:"var(--bs)"}}>
            <div style={{padding:"10px 12px"}}>
              <input value={ledgerSearch} onChange={e=>setLedgerSearch(e.target.value)} placeholder="🔍 Search client…" style={{width:"100%",padding:"7px 10px",background:"var(--bg)",border:"1px solid var(--bb)",borderRadius:7,color:"var(--bt)",fontSize:12}}/>
            </div>
            <div style={{flex:1,overflowY:"auto"}}>
              {filtered.length===0&&<div style={{padding:20,color:"var(--bm)",fontSize:12,textAlign:"center"}}>No clients with invoices yet.</div>}
              {filtered.map(c=>(
                <div key={c.id} onClick={()=>{setLedgerClient(c);setSoaMonth("All");}}
                  style={{padding:"12px 14px",borderBottom:"1px solid var(--brand-border)",cursor:"pointer",background:ledgerClient?.id===c.id?"rgba(0,196,212,0.12)":"transparent",borderLeft:ledgerClient?.id===c.id?"3px solid var(--brand-cyan)":"3px solid transparent",transition:"all 0.1s"}}>                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:12,color:"#f1f5f9",display:"flex",alignItems:"center",gap:5}}>
                        {c.overdue&&<span style={{color:"#ef4444",fontSize:9}}>⚠</span>}
                        <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</span>
                      </div>
                      <div style={{fontSize:10,color:"var(--bm)",marginTop:1}}>{c.invoices} invoice{c.invoices!==1?"s":""}</div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0,marginLeft:6}}>
                      <div style={{fontSize:12,fontWeight:800,color:c.balance>0?"#f59e0b":"#22c55e"}}>{peso(c.balance)}</div>
                      <div style={{fontSize:9,color:"var(--bm)"}}>balance</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:20,background:"var(--bg)"}}>
            {!ledgerClient ? (
              <div style={{textAlign:"center",padding:80,color:"var(--bm)"}}>
                <div style={{fontSize:48,marginBottom:12}}>📒</div>
                <div style={{fontSize:15,fontWeight:700}}>Select a client to view their ledger & generate SOA</div>
              </div>
            ) : (() => {
              const c = soaClient;
              if(!c) return null;
              const runningBal = [...c.cInvs].reverse().reduce((acc,inv,i)=>{
                const pAmt = payments.filter(p=>p.invoiceNo===inv.invoiceNo).reduce((s,p)=>s+(p.amount||0),0);
                const prev = i===0?0:acc[i-1].runBal;
                acc.push({inv, pAmt, runBal: prev + (inv.total||0) - pAmt});
                return acc;
              },[]).reverse();
              return (
                <div>

                    <div style={{flex:1,minWidth:200}}>
                      <div style={{fontWeight:900,fontSize:18,color:"var(--bc)",marginBottom:2}}>{c.name}</div>
                      {c.contact&&<div style={{fontSize:12,color:"#94a3b8"}}>{c.contact}</div>}
                      {c.phone&&<div style={{fontSize:12,color:"#94a3b8"}}>{c.phone}</div>}
                      {c.address&&<div style={{fontSize:11,color:"#64748b"}}>{c.address}</div>}

                      {[["Total Billed",c.total,"var(--bc)"],["Collected",c.paid,"#22c55e"],["Balance Due",c.balance,c.balance>0?"#f59e0b":"#22c55e"]].map(([lbl,val,col])=>(

                      ))}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:10,marginBottom:16,alignItems:"center",flexWrap:"wrap"}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",flex:1}}>Statement of Account</div>

                      {months.map(m=><option key={m} value={m}>{m==="All"?"All Time":m}</option>)}
                    </select>
                    <button onClick={generateSOA} style={{padding:"8px 16px",background:"linear-gradient(135deg,#2d2080,#3a2db5)",border:"none",borderRadius:7,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:12}}>🖨️ Print / Download SOA</button>
                  </div>
                  <div style={{background:"var(--bs)",borderRadius:12,border:"1px solid var(--bb)",overflow:"hidden"}}>
                    <div style={{display:"grid",gridTemplateColumns:"120px 1fr 100px 100px 100px 80px 90px",padding:"8px 12px",background:"var(--bs2)",fontSize:10,fontWeight:700,color:"var(--bm)",textTransform:"uppercase",letterSpacing:0.5,gap:4}}>
                      <span>Invoice</span><span>Date / Due</span><span style={{textAlign:"right"}}>Amount</span><span style={{textAlign:"right"}}>Paid</span><span style={{textAlign:"right"}}>Balance</span><span style={{textAlign:"center"}}>Status</span><span></span>

                      const bal  = (inv.total||0)-pAmt;
                      const over = inv.status==="Unpaid"&&inv.dueDate&&new Date(inv.dueDate)<new Date();
                      const sc   = {Paid:"#22c55e",Unpaid:"#f59e0b",Partial:"#60a5fa",VOID:"#ef4444"}[inv.status]||"#64748b";
                      return (
                        <div key={inv.invoiceNo} style={{display:"grid",gridTemplateColumns:"120px 1fr 100px 100px 100px 80px 90px",padding:"10px 12px",borderTop:"1px solid var(--brand-border)",background:i%2===0?"transparent":"rgba(255,255,255,0.02)",alignItems:"center",gap:4}}>

                          <div>
                            <div style={{fontSize:11,color:"#94a3b8"}}>{fmtDate(inv.date)}</div>

              </label>
              <button onClick={()=>setOtherCharges(p=>[...p,{label:"",amount:""}])} style={{fontSize:9,color:"var(--bc)",background:"transparent",border:"1px dashed var(--brand-cyan)",borderRadius:3,padding:"1px 6px",cursor:"pointer",fontWeight:700}}>+ Charge</button>
            </div>
            {otherCharges.map((oc,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:4,marginTop:4}}>
                <input type="text" value={oc.label} onChange={e=>setOtherCharges(p=>p.map((x,j)=>j===i?{...x,label:e.target.value}:x))} placeholder="Label…" style={{flex:1,padding:"2px 5px",border:"1px solid var(--bb)",borderRadius:3,fontSize:10,color:"var(--bt)",background:"var(--bg)"}}/>
                <input type="number" min="0" step="0.01" value={oc.amount} onChange={e=>setOtherCharges(p=>p.map((x,j)=>j===i?{...x,amount:e.target.value}:x))} placeholder="0.00" style={{width:60,textAlign:"right",padding:"2px 4px",border:"1px solid var(--bb)",borderRadius:3,fontSize:10,color:"var(--bc)",fontWeight:600,background:"var(--bg)"}}/>
                <button onClick={()=>setOtherCharges(p=>p.filter((_,j)=>j!==i))} style={{width:16,height:16,background:"#ef444420",border:"1px solid #ef4444",color:"#ef4444",borderRadius:2,cursor:"pointer",fontSize:9,lineHeight:1}}>✕</button>
              </div>
            ))}
          </div>
          <div style={{padding:"7px 10px",borderBottom:"1px solid var(--brand-border)",flexShrink:0}}>
            <div style={{fontSize:9,fontWeight:800,color:"var(--bc)",textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>💳 Payment</div>
            <div style={{display:"flex",gap:6,marginBottom:5}}>
              <div style={{flex:1}}>
                <div style={{fontSize:8,color:"var(--bm)",fontWeight:700,marginBottom:2}}>MODE</div>
                <select value={paymentMode} onChange={e=>setPaymentMode(e.target.value)} style={{width:"100%",padding:"5px 7px",background:"var(--bg)",border:"1.5px solid var(--brand-border)",borderRadius:5,color:"var(--bt)",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                  {["Cash","COD","Terms","GCash","Maya","Bank Transfer","Cheque"].map(m=><option key={m}>{m}</option>)}
                </select>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:8,color:"var(--bm)",fontWeight:700,marginBottom:2}}>TERMS</div>
                <select value={paymentTerms} onChange={e=>setPaymentTerms(e.target.value)} style={{width:"100%",padding:"5px 7px",background:"var(--bg)",border:"1.5px solid var(--brand-border)",borderRadius:5,color:"var(--bt)",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                  {["COD","Net 15","Net 30","Net 45","Net 60","Upon Delivery","Upon PO","Full Payment"].map(t=><option key={t}>{t}</option>)}
                </select>

                <span style={{fontSize:13,fontWeight:900,color:(parseFloat(amountTendered)||0)>=total?"#22c55e":"#ef4444"}}>{peso(Math.abs((parseFloat(amountTendered)||0)-total))}</span>

      {showCompany&&coForm&&(

<div style={{marginBottom:12}}>
  <div className="form-label">Company Logo</div>

    type="file"

          {[["Company Name","name"],["Tagline / Description","tagline"],["Address","address"],["Phone","phone"],["Email","email"],["Bank / Payment Details","bank"]].map(([lbl,key])=>(
            <div key={key} style={{marginBottom:12}}><div className="form-label">{lbl}</div><input className="form-input" type="text" value={coForm[key]||""} onChange={e=>setCoForm(f=>({...f,[key]:e.target.value}))}/></div>
          ))}

            <button onClick={()=>{setCompany({...coForm});setShowCompany(false);showBadge();}} style={{flex:1,padding:"10px 0",background:"#3b82f6",border:"none",borderRadius:8,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:14}}>💾 Save</button>

            <div style={{display:"flex",gap:8,marginBottom:10}}>

                  invCounter, company,
                  quoteHistory, quoteCounter:qCounter,
                  drHistory, drCounter,
                  joHistory, joCounter,
                  poHistory, poCounter};
                const json = JSON.stringify(data, null, 2);
                const blob = new Blob([json], {type:"application/json"});
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "breeks_pos_backup_" + new Date().toISOString().slice(0,10) + ".json";
                a.click();
                URL.revokeObjectURL(url);
              }} style={{flex:1,padding:"9px 0",background:"linear-gradient(135deg,#2d2080,#3a2db5)",border:"none",borderRadius:7,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13}}>
                ⬇️ Export Backup (JSON)
              </button>
            </div>
            <div style={{position:"relative"}}>
              <input type="file" accept=".json" id="restore-input" style={{display:"none"}}
                onChange={(e)=>{
                  const file = e.target.files[0];
                  if(!file) return;
                  const reader = new FileReader();
                  reader.onload = (ev) => {
                    try {
                      const d = JSON.parse(ev.target.result);
                      if(!d.version || !d.history) { alert("Invalid backup file. Please use a file exported from this app."); return; }
                      if(!window.confirm(`Restore backup from ${d.exported ? new Date(d.exported).toLocaleDateString("en-PH") : "unknown date"}?\n\nThis will REPLACE all current data including ${d.history?.length||0} invoices, ${d.clients?.length||0} clients, and ${d.products?.length||0} products.\n\nMake sure to export a backup first if needed.`)) return;
                      if(d.products)    setProducts(d.products);
                      if(d.clients)     setClients(d.clients);
                      if(d.history)     setHistory(d.history);
                      if(d.salesItems)  setSalesItems(d.salesItems);
                      if(d.payments)    setPayments(d.payments);
                      if(d.invCounter)  setInvCounter(d.invCounter);
                      if(d.company)     setCompany(d.company);
                      if(d.quoteHistory) setQuoteHistory(d.quoteHistory);
                      if(d.quoteCounter) setQCounter(d.quoteCounter);
                      if(d.drHistory)   setDrHistory(d.drHistory);
                      if(d.drCounter)   setDrCounter(d.drCounter);
                      if(d.joHistory)   setJoHistory(d.joHistory);
                      if(d.joCounter)   setJoCounter(d.joCounter);
                      if(d.poHistory)   setPoHistory(d.poHistory);
                      if(d.poCounter)   setPoCounter(d.poCounter);
                      showBadge();
                      setShowCompany(false);
                      alert("✅ Data restored successfully! " + (d.history?.length||0) + " invoices loaded.");
                    } catch(err) { alert("Failed to parse backup file: " + err.message); }
                  };
                  reader.readAsText(file);
                  e.target.value = "";
                }}
              />
              <button onClick={()=>document.getElementById("restore-input").click()} style={{width:"100%",padding:"9px 0",background:"#f59e0b20",border:"1.5px solid #f59e0b",borderRadius:7,color:"#f59e0b",fontWeight:700,cursor:"pointer",fontSize:13}}>
                ⬆️ Import / Restore from Backup
              </button>
            </div>
            <div style={{marginTop:8,fontSize:10,color:"#64748b",textAlign:"center"}}>
              Backup includes: invoices · clients · products · payments · quotes · delivery receipts
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
// ── PERF FIX 1: Deferred Babel compilation with loading screen ──
(function() {
  var msgs = ["Starting up…", "Loading scripts…", "Initialising app…", "Almost ready…"];
  var mi = 0;
  var msgEl = document.getElementById("loading-msg");
  var msgTimer = setInterval(function() {
    mi++; if(mi < msgs.length && msgEl) msgEl.textContent = msgs[mi];
  }, 600);

  function hideSplash() {
    clearInterval(msgTimer);
    var el = document.getElementById("app-loading");
    if(el){ el.classList.add("fade-out"); setTimeout(function(){ el.style.display="none"; }, 450); }
  }

  // Load Babel async (non-blocking)
  var babelScript = document.createElement("script");
  babelScript.src = "https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js";
  babelScript.onload = function() {
    // Compile the JSX source
    ["jsx-source"].forEach(function(id) {
      var src = document.getElementById(id);
      if(!src) return;
      try {
        var compiled = Babel.transform(src.textContent, {
          presets: ["react"],
          plugins: ["proposal-optional-chaining","proposal-nullish-coalescing-operator"],
          compact: false,
          sourceType: "script"
        }).code;
        var execScript = document.createElement("script");
        execScript.textContent = compiled;
        document.head.appendChild(execScript);
      } catch(e) {
        console.error("Babel compile error in " + id + ":", e);
      }
    });
    hideSplash();
  };
  babelScript.onerror = function() {
    // Fallback: change type to text/babel and use inline babel if available
    console.warn("Babel CDN failed, trying fallback");
    hideSplash();
  };
  document.head.appendChild(babelScript);
})();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/Breeks-App/service-worker.js')
      .then(r => console.log('SW registered:', r.scope))
      .catch(e => console.warn('SW registration failed:', e));
  });
}
</script>
