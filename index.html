          </div>
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"10px 14px 8px",background:"var(--brand-surface)",borderBottom:"1px solid var(--brand-border)",flexShrink:0}}>
              <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-start"}}>
                <div style={{position:"relative",flex:"0 0 220px"}}>
                  <div style={{fontSize:9,color:"#4ade80",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Client / Consignee</div>
                  <button onClick={()=>setDrClientOpen(!drClientOpen)} style={{width:"100%",padding:"7px 12px",background:"var(--brand-bg)",border:`1.5px solid ${drSelClient?"#22c55e":"var(--brand-border)"}`,borderRadius:7,color:drSelClient?"#86efac":"var(--brand-muted)",fontSize:12,textAlign:"left",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",fontWeight:600}}>
                    <span>👤 {drSelClient?drSelClient.name:"Select Client"}</span><span style={{fontSize:10}}>{drClientOpen?"▲":"▼"}</span>
                  </button>
                  {drClientOpen&&<div style={{position:"absolute",top:"100%",left:0,width:280,background:"var(--brand-surface)",border:"1px solid var(--brand-border)",borderRadius:8,boxShadow:"0 8px 24px rgba(0,0,0,0.4)",maxHeight:220,overflowY:"auto",zIndex:30}}>
                    {clients.map(cl=>(<div key={cl.id} onClick={()=>{setDrSelClient(cl);setDrAddress(cl.address||"");setDrClientOpen(false);}} style={{padding:"9px 14px",cursor:"pointer",borderBottom:"1px solid var(--brand-border)"}} onMouseEnter={e=>e.currentTarget.style.background="var(--brand-surface2)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <div style={{fontWeight:700,fontSize:12,color:"#86efac"}}>{cl.name}</div>
                      <div style={{fontSize:10,color:"var(--brand-muted)"}}>{cl.address}</div>
                    </div>))}
                  </div>}
                </div>
                <div style={{flex:"0 0 130px"}}>
                  <div style={{fontSize:9,color:"#4ade80",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Ref. Invoice No</div>
                  <input value={drInvoiceNo} onChange={e=>setDrInvoiceNo(e.target.value)} placeholder="INV-0001" style={{width:"100%",padding:"7px 10px",background:"var(--brand-bg)",border:"1px solid var(--brand-border)",borderRadius:7,color:"var(--brand-text)",fontSize:12,outline:"none"}}/>
                </div>
                <div style={{flex:"0 0 140px"}}>
                  <div style={{fontSize:9,color:"#4ade80",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Delivered By</div>
                  <input value={drDeliveredBy} onChange={e=>setDrDeliveredBy(e.target.value)} placeholder="Driver / Courier" style={{width:"100%",padding:"7px 10px",background:"var(--brand-bg)",border:"1px solid var(--brand-border)",borderRadius:7,color:"var(--brand-text)",fontSize:12,outline:"none"}}/>
                </div>
              </div>
              <div style={{marginTop:8}}>
                <div style={{fontSize:9,color:"#4ade80",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Delivery Address</div>
                <input value={drAddress} onChange={e=>setDrAddress(e.target.value)} placeholder="Full delivery address..." style={{width:"100%",padding:"7px 10px",background:"var(--brand-bg)",border:"1px solid var(--brand-border)",borderRadius:7,color:"var(--brand-text)",fontSize:12,outline:"none"}}/>
              </div>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"8px 14px"}}>
              {drCart.length===0?(
                <div style={{textAlign:"center",padding:50,color:"var(--brand-muted)"}}>
                  <div style={{fontSize:36,marginBottom:10}}>📦</div>
                  <div style={{fontSize:13,fontWeight:600}}>Click products on the left to add items to deliver</div>
                </div>
              ):(
                <div style={{background:"var(--brand-surface)",borderRadius:8,overflow:"hidden",border:"1px solid var(--brand-border)"}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 80px 100px 28px",background:"var(--brand-surface2)",padding:"6px 10px",fontSize:9,fontWeight:800,color:"var(--brand-muted)",textTransform:"uppercase",letterSpacing:0.5,gap:4}}>
                    <div>Description</div><div style={{textAlign:"center"}}>Qty</div><div>Custom Label</div><div></div>
                  </div>
                  {drCart.map((item,idx)=>(
                    <div key={item.lineId} style={{display:"grid",gridTemplateColumns:"1fr 80px 100px 28px",padding:"7px 10px",borderTop:"1px solid var(--brand-border)",background:idx%2===0?"transparent":"rgba(255,255,255,0.02)",alignItems:"center",gap:4}}>
                      <div style={{position:"relative"}}>
{/* ── Autocomplete description field ── */}
                        <div className="pac-wrap">
                          <input
                            className={"pac-input dr"}
                            value={pickerOpen===item.lineId ? pickerSearch : (item.customName||item.name||"")}
                            placeholder={item.name?"":"Search product…"}
                            onFocus={()=>{setPickerOpen(item.lineId);setPickerSearch(item.customName||item.name||"");}}
                            onChange={e=>{setPickerOpen(item.lineId);setPickerSearch(e.target.value);}}
                            onBlur={e=>{if(!e.relatedTarget||!e.relatedTarget.closest(".pac-drop"))setTimeout(()=>setPickerOpen(p=>p===item.lineId?null:p),150);}}
                            onKeyDown={e=>{if(e.key==="Escape")setPickerOpen(null);}}
                            style={{fontStyle:(!item.name&&pickerOpen!==item.lineId)?"italic":"normal"}}
                          />
                          {pickerOpen===item.lineId&&(
                            <div className="pac-drop">
                              <div className="pac-list">
                                {products.filter(p=>!pickerSearch||(p.name+p.sku).toLowerCase().includes(pickerSearch.toLowerCase())).slice(0,40).map(p=>(
                                  <div key={p.sku} className="pac-item" onMouseDown={e=>{e.preventDefault();setDrCart(prev=>prev.map(i=>i.lineId===item.lineId?{...i,sku:p.sku,name:p.name,unit:p.unit||"piece",category:p.category,customName:""}:i));setPickerOpen(null);setPickerSearch("");}}>
                                    <div><div className="pac-iname">{p.name}</div><div className="pac-imeta">{p.sku}{p.category?" · "+p.category:""}</div></div>
                                    <div className="pac-iprice">{p.unit||"piece"}</div>
                                  </div>
                                ))}
                                {products.filter(p=>!pickerSearch||(p.name+p.sku).toLowerCase().includes(pickerSearch.toLowerCase())).length===0&&<div className="pac-empty">No products found</div>}
                              </div>
                            </div>
                          )}
                        </div>
                        <div style={{fontSize:9,color:"var(--brand-muted)",marginTop:1}}>{item.sku&&item.name?item.sku+" · "+item.unit:""}</div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:2}}>
                        <button onClick={()=>{const n=item.qty-1;if(n<=0)setDrCart(p=>p.filter(i=>i.lineId!==item.lineId));else setDrCart(p=>p.map(i=>i.lineId===item.lineId?{...i,qty:n}:i));}} style={{width:18,height:18,background:"#166534",border:"none",borderRadius:3,color:"#fff",cursor:"pointer",fontSize:12,lineHeight:1}}>−</button>
                        <input type="number" min="1" step="1" value={item.qty} onChange={e=>{const n=parseInt(e.target.value)||1;setDrCart(p=>p.map(i=>i.lineId===item.lineId?{...i,qty:n}:i));}} style={{width:32,textAlign:"center",background:"transparent",border:"1px solid var(--brand-border)",borderRadius:3,color:"var(--brand-text)",fontSize:10,padding:"1px 2px",fontWeight:700}}/>
                        <button onClick={()=>setDrCart(p=>p.map(i=>i.lineId===item.lineId?{...i,qty:i.qty+1}:i))} style={{width:18,height:18,background:"#166534",border:"none",borderRadius:3,color:"#fff",cursor:"pointer",fontSize:12,lineHeight:1}}>+</button>
                      </div>

                      <button onClick={()=>setDrCart(p=>p.filter(i=>i.lineId!==item.lineId))} className="rm-btn" style={{background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.3)",color:"#f87171",borderRadius:4,padding:"2px 5px",cursor:"pointer",fontSize:10}}>✕</button>
                    </div>
                  ))}
                </div>
              )}
              <div style={{padding:"5px 8px",borderTop:"1px dashed var(--brand-border)",background:"rgba(34,197,94,0.03)"}}>
                <button onClick={()=>setDrCart(p=>[...p,{sku:"",name:"",qty:1,unit:"piece",category:"",lineId:genLineId(),customName:""}])} style={{width:"100%",padding:"5px 0",background:"transparent",border:"1.5px dashed #22c55e",borderRadius:6,color:"#4ade80",fontWeight:700,cursor:"pointer",fontSize:11}}>＋ Add Line</button>
              </div>
            </div>
            <div style={{borderTop:"2px solid #22c55e",background:"var(--brand-surface)",flexShrink:0,padding:"10px 14px"}}>
              <div style={{marginBottom:8}}>
                <div style={{fontSize:9,color:"#4ade80",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Notes / Remarks</div>
                <textarea value={drNotes} onChange={e=>setDrNotes(e.target.value)} placeholder="Handling instructions, delivery conditions..." style={{width:"100%",padding:"6px 8px",background:"var(--brand-bg)",border:"1px solid var(--brand-border)",borderRadius:5,color:"var(--brand-text)",fontSize:10,resize:"vertical",minHeight:50,outline:"none",fontFamily:"inherit"}}/>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{if(drCart.length===0||window.confirm("Clear delivery receipt?")){ setDrCart([]);setDrSelClient(null);setDrNotes("");setDrDeliveredBy("");setDrReceivedBy("");setDrAddress("");setDrInvoiceNo(""); }}} style={{flex:1,padding:"8px 0",background:"rgba(34,197,94,0.12)",border:"1.5px solid #22c55e",borderRadius:7,color:"#86efac",fontWeight:700,cursor:"pointer",fontSize:12}}>✚ New DR</button>
                <button onClick={()=>{setDrCart([]);setDrSelClient(null);setDrNotes("");setDrDeliveredBy("");setDrReceivedBy("");setDrAddress("");setDrInvoiceNo("");}} style={{flex:1,padding:"8px 0",background:"rgba(255,255,255,0.05)",border:"1.5px solid var(--brand-border)",borderRadius:7,color:"var(--brand-muted)",fontWeight:700,cursor:"pointer",fontSize:12}}>🗑 Clear</button>
                <button onClick={handleSaveDr} disabled={drCart.length===0||!drSelClient} style={{flex:2,padding:"8px 0",background:(drCart.length===0||!drSelClient)?"#1e293b":"linear-gradient(135deg,#166534,#22c55e)",border:"none",borderRadius:7,color:(drCart.length===0||!drSelClient)?"#475569":"#fff",fontWeight:800,cursor:(drCart.length===0||!drSelClient)?"not-allowed":"pointer",fontSize:13}}>📄 Preview & Save DR</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── DELIVERY RECEIPT PREVIEW ───────────────────────────────────────────────
  if(view==="delivery_receipt" && viewDr && currentDr) {
    const dr = currentDr;
    const co = dr.companySnap||company;
    const tStyle={borderCollapse:"collapse",width:"100%",fontSize:11};
    const th={background:"#166534",color:"#fff",padding:"6px 8px",border:"1px solid #166534",fontWeight:700,fontSize:11};
    const td=(extra={})=>({padding:"6px 8px",border:"1px solid #ccc",verticalAlign:"top",...extra});
    const tdAlt=(extra={})=>({padding:"6px 8px",border:"1px solid #ccc",background:"#f0fdf4",verticalAlign:"top",...extra});
    return (
      <div style={{background:"var(--brand-bg)",minHeight:"100vh",paddingTop:16}}>
        {syncStatus&&<div className={`sync-indicator sync-${syncStatus}`}>{syncStatus==='saving'?'☁️ Saving...':syncStatus==='saved'?'✅ Saved to Drive':'❌ Sync Error'}</div>}
        <div id="dr-area" style={{fontFamily:"'Roboto','Arial',sans-serif",width:"100%",margin:"0 auto",padding:"20px 28px",background:"#fff",color:"#111"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,paddingBottom:14,borderBottom:"3px solid #166534"}}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              {co.logo&&<img src={co.logo} alt="Logo" style={{height:60,maxWidth:120,objectFit:"contain"}}/>}
              <div>
                <div style={{fontSize:20,fontWeight:900,color:"#166534",letterSpacing:2,lineHeight:1.1}}>{co.name||"BREEKS"}</div>
                <div style={{fontSize:10,fontWeight:700,color:"#4ade80",letterSpacing:2,textTransform:"uppercase",marginTop:2}}>DIGITAL MARKETING SERVICES</div>
                {co.tagline&&<div style={{fontSize:10,color:"#555",marginTop:3}}>{co.tagline}</div>}
                <div style={{fontSize:10,color:"#555",marginTop:3,lineHeight:1.7}}><div>{co.address}</div><div>{co.phone}{co.email&&" · "+co.email}</div></div>
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:28,fontWeight:900,color:"#166534",letterSpacing:3}}>DELIVERY RECEIPT</div>
              <div style={{fontSize:11,color:"#555",marginTop:6,lineHeight:1.9}}>
                <div>DR No: <b style={{color:"#166534"}}>{dr.drNo}</b></div>
                <div>Date: <b>{fmtDate(dr.date||new Date())}</b></div>
                {dr.invoiceNo&&<div>Ref Invoice: <b style={{color:"#166534"}}>{dr.invoiceNo}</b></div>}
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:16,marginBottom:16}}>
            <div style={{flex:1,background:"#f0fdf4",borderRadius:6,padding:"10px 14px",border:"1px solid #86efac"}}>
              <div style={{fontSize:9,fontWeight:800,color:"#166534",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Deliver To</div>
              <div style={{fontWeight:700,fontSize:13,color:"#111"}}>{dr.client?.name}</div>
              {dr.deliveryAddress&&<div style={{fontSize:11,color:"#555",marginTop:3}}>{dr.deliveryAddress}</div>}
            </div>
            <div style={{flex:1,background:"#f0fdf4",borderRadius:6,padding:"10px 14px",border:"1px solid #86efac"}}>
              <div style={{fontSize:9,fontWeight:800,color:"#166534",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Delivery Details</div>
              <div style={{fontSize:11,color:"#333",lineHeight:1.8}}>
                <div><b>Delivered By:</b> {dr.deliveredBy||"—"}</div>
                <div><b>Date:</b> {fmtDate(dr.date||new Date())}</div>
              </div>
            </div>
          </div>
          <table style={tStyle}>
            <thead><tr>{["#","SKU","Description","Qty","Unit"].map((h,i)=>(
              <th key={i} style={{...th,textAlign:i===0||i===3||i===4?"center":"left",width:i===0?28:i===3?60:i===4?80:undefined}}>{h}</th>
            ))}</tr></thead>
            <tbody>
              {dr.items?.map((item,idx)=>{
                const R=idx%2===0?td:tdAlt;
                return(<tr key={item.lineId||item.sku+idx}>
                  <td style={R({textAlign:"center",color:"#888"})}>{idx+1}</td>
                  <td style={R({fontSize:10,color:"#555"})}>{item.sku}</td>
                  <td style={R()}><div style={{fontWeight:700}}>{item.customName||item.name}</div>{item.customName&&<div style={{fontSize:9,color:"#555",fontStyle:"italic"}}>{item.name}</div>}</td>
                  <td style={R({textAlign:"center",fontWeight:700,fontSize:13})}>{item.qty}</td>
                  <td style={R({textAlign:"center",color:"#555"})}>{item.unit}</td>
                </tr>);
              })}
              {(dr.items?.length||0)<8&&Array.from({length:8-(dr.items?.length||0)}).map((_,i)=>(
                <tr key={"edr"+i}><td style={td()}>&nbsp;</td><td style={td()}></td><td style={td()}></td><td style={td()}></td><td style={td()}></td></tr>
              ))}
            </tbody>
          </table>
          {dr.notes&&(<div style={{marginTop:12,background:"#f0fdf4",border:"1px solid #86efac",borderRadius:4,padding:"8px 14px",fontSize:11}}>
            <span style={{fontWeight:700,color:"#166534",marginRight:8}}>Notes:</span><span style={{color:"#333"}}>{dr.notes}</span>
          </div>)}
          <div style={{marginTop:28,borderTop:"1px solid #ccc",paddingTop:16}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#555",gap:24}}>
              {[["deliveredBy","Delivered By"],["checkedBy","Checked By"],["receivedBy","Received By"]].map(([key,label])=>(
                <div key={key} style={{flex:1,textAlign:"center"}}>
                  <div style={{marginBottom:6,minHeight:40,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
                    <span style={{fontWeight:700,fontSize:12,color:"#166534",borderBottom:"1px solid #166534",minWidth:140,display:"inline-block",textAlign:"center",paddingBottom:2}}>{(key==="deliveredBy"?dr.deliveredBy:key==="receivedBy"?dr.receivedBy:"")||" "}</span>
                  </div>
                  <div style={{fontSize:10,color:"#555",fontWeight:600}}>{label}</div>
                  <input className="no-print" type="text" defaultValue={key==="deliveredBy"?dr.deliveredBy||"":""} placeholder="Enter name" onChange={key==="receivedBy"?e=>setCurrentDr(d=>({...d,receivedBy:e.target.value})):undefined} style={{marginTop:6,width:"100%",padding:"4px 8px",border:"1px solid #86efac",borderRadius:4,fontSize:11,color:"#333",outline:"none",textAlign:"center",fontFamily:"inherit",background:key==="deliveredBy"?"#f0fdf4":"#fff",readOnly:key==="deliveredBy"}}/>
                </div>
              ))}
            </div>
          </div>
          <div style={{textAlign:"center",marginTop:14,fontSize:9,color:"#aaa"}}>This is a computer-generated delivery receipt. · {co.name}</div>
        </div>
        <div className="no-print" style={{textAlign:"center",padding:20,background:"#0f172a",display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
          <button onClick={()=>{const el=document.getElementById("dr-area");const filename=(dr.drNo||"dr")+"_"+(dr.client?.name||"").replace(/\s+/g,"_")+".pdf";const opt={margin:[5,5,5,5],filename,image:{type:"jpeg",quality:0.98},html2canvas:{scale:2,useCORS:true,letterRendering:true,scrollY:0},jsPDF:{unit:"mm",format:"a4",orientation:"portrait"},pagebreak:{mode:["avoid-all","css","legacy"]}};window.html2pdf().set(opt).from(el).save();}} style={{padding:"11px 24px",background:"linear-gradient(135deg,#166534,#22c55e)",color:"#fff",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:14}}>⬇️ Download PDF</button>
          <button onClick={()=>window.print()} style={{padding:"11px 24px",background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:14}}>🖨️ Print</button>
          <button onClick={()=>{setDrCart([]);setDrSelClient(null);setDrNotes("");setDrDeliveredBy("");setDrReceivedBy("");setDrAddress("");setDrInvoiceNo("");setViewDr(false);}} style={{padding:"11px 24px",background:"#334155",color:"#f1f5f9",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:14}}>✚ New DR</button>
          <button onClick={()=>setViewDr(false)} style={{padding:"11px 24px",background:"#1e293b",color:"#94a3b8",border:"1px solid #334155",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:14}}>← Back to DR</button>
          <button onClick={()=>setView("dr_history")} style={{padding:"11px 24px",background:"#166534",color:"#86efac",border:"1px solid #22c55e",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:14}}>📋 DR History</button>
        </div>
      </div>
    );
  }

  // ── DELIVERY RECEIPT HISTORY ───────────────────────────────────────────────
  if(view==="dr_history") {
    const drFiltered2 = drHistory.filter(d=>
      !drHistSearch ||
      (d.drNo||"").toLowerCase().includes(drHistSearch.toLowerCase()) ||
      (d.client?.name||"").toLowerCase().includes(drHistSearch.toLowerCase()) ||
      (d.invoiceNo||"").toLowerCase().includes(drHistSearch.toLowerCase())
    );

    // ── Save edits back into drHistory ──
    const saveDrEdit = () => {
      if(!editDr) return;
      setDrHistory(hs=>hs.map(d=>d.drNo===editDr.drNo?{...editDr}:d));
      showBadge();
      setEditDr(null);
    };

    return (
      <div style={{minHeight:"100vh",background:"var(--brand-bg)"}}>
        {badge&&<div className="save-badge">✅ Saved</div>}
        {syncStatus&&<div className={`sync-indicator sync-${syncStatus}`}>{syncStatus==='saving'?'☁️ Saving...':syncStatus==='saved'?'✅ Saved to Drive':'❌ Sync Error'}</div>}
        <div style={{background:"linear-gradient(135deg,#14532d,#166534)",padding:"12px 20px",display:"flex",alignItems:"center",gap:12,borderBottom:"2px solid #22c55e",flexWrap:"wrap"}}>
          <button onClick={()=>setView("delivery_receipt")} className="nav-btn" style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",color:"#fff",borderRadius:7,padding:"7px 14px",fontWeight:700,fontSize:13}}>← Delivery</button>
          <div style={{fontWeight:800,fontSize:16,color:"#86efac"}}>📦 Delivery Receipt History</div>
          <div style={{marginLeft:"auto",fontSize:12,color:"#64748b"}}>{drHistory.length} saved</div>
          {drHistory.length>0&&<button onClick={()=>{if(window.confirm("Clear all DR history?"))setDrHistory([]);}} style={{background:"#ef444420",border:"1px solid #ef4444",color:"#ef4444",borderRadius:7,padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>🗑 Clear All</button>}
        </div>
        <div style={{padding:"12px 16px",background:"#0f172a",borderBottom:"1px solid #1e293b",maxWidth:900,margin:"0 auto",paddingTop:16}}>
          <input value={drHistSearch} onChange={e=>setDrHistSearch(e.target.value)} placeholder="🔍  Search by DR no., client or invoice ref..." style={{width:"100%",padding:"10px 14px",background:"var(--brand-surface)",border:"1px solid var(--brand-border)",borderRadius:8,color:"var(--brand-text)",fontSize:13,outline:"none"}}/>
        </div>
        <div style={{padding:16,maxWidth:900,margin:"0 auto"}}>
          {drFiltered2.length===0
            ? <div style={{textAlign:"center",padding:60,color:"#475569"}}><div style={{fontSize:40,marginBottom:10}}>📭</div><div>{drHistory.length===0?"No delivery receipts saved yet.":"No results found."}</div></div>
            : drFiltered2.map((d,i)=>(
              <div key={i} style={{background:"var(--brand-surface)",border:"1px solid var(--brand-border)",borderRadius:12,padding:"14px 18px",marginBottom:10,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                <div style={{flex:1,minWidth:200}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap"}}>
                    <span style={{fontWeight:800,color:"#86efac",fontSize:14}}>{d.drNo}</span>
                    {d.invoiceNo&&<span style={{fontSize:10,color:"#4ade80",fontWeight:600}}>Ref: {d.invoiceNo}</span>}
                    <span style={{background:"#22c55e20",color:"#22c55e",fontSize:10,padding:"2px 8px",borderRadius:10,fontWeight:700}}>{d.status||"Delivered"}</span>
                  </div>
                  <div style={{fontSize:12,color:"#f1f5f9",fontWeight:600}}>{d.client?.name}</div>
                  <div style={{fontSize:11,color:"#64748b"}}>{fmtDate(d.date)} · {(d.items||[]).length} item{(d.items||[]).length!==1?"s":""}{d.deliveredBy&&" · By: "+d.deliveredBy}</div>
                </div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  <button onClick={()=>{setCurrentDr(d);setViewDr(true);setView("delivery_receipt");}} style={{background:"#22c55e20",border:"1px solid #22c55e",color:"#86efac",borderRadius:7,padding:"7px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>👁 View</button>
                  <button onClick={()=>setEditDr({...d,editClientOpen:false})} style={{background:"#3b82f620",border:"1px solid #3b82f6",color:"#60a5fa",borderRadius:7,padding:"7px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>✏️ Edit</button>
                  <button onClick={()=>{if(window.confirm("Delete DR "+d.drNo+"?"))setDrHistory(hs=>hs.filter((_,j)=>j!==i));}} style={{background:"#ef444420",border:"1px solid #ef4444",color:"#ef4444",borderRadius:7,padding:"7px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>🗑</button>
                </div>
              </div>
            ))
          }
        </div>

        {/* ── Edit DR Modal ── */}
        {editDr&&(
          <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setEditDr(null)}>
            <div style={{background:"var(--brand-surface)",borderRadius:14,padding:0,width:"100%",maxWidth:600,border:"1px solid #22c55e",maxHeight:"92vh",overflowY:"auto",boxShadow:"0 8px 40px rgba(0,0,0,0.6)"}}>
              {/* Modal Header */}
              <div style={{background:"linear-gradient(135deg,#14532d,#166534)",padding:"16px 20px",borderRadius:"14px 14px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontWeight:900,fontSize:16,color:"#86efac"}}>✏️ Edit Delivery Receipt</div>
                  <div style={{fontSize:11,color:"#4ade80",marginTop:2}}>{editDr.drNo} · {editDr.client?.name}</div>
                </div>
                <button onClick={()=>setEditDr(null)} style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",color:"#fff",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:16}}>✕</button>
              </div>

              <div style={{padding:"18px 20px",display:"flex",flexDirection:"column",gap:14}}>

                {/* Client */}
                <div>
                  <div className="form-label" style={{color:"#4ade80"}}>Client / Consignee</div>
                  <div style={{position:"relative"}}>
                    <button onClick={()=>setEditDr(e=>({...e,editClientOpen:!e.editClientOpen}))} style={{width:"100%",marginTop:4,padding:"9px 12px",background:"var(--brand-bg)",border:`1.5px solid ${editDr.client?"#22c55e":"var(--brand-border)"}`,borderRadius:7,color:editDr.client?"#86efac":"var(--brand-muted)",fontSize:12,textAlign:"left",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",fontWeight:600}}>
                      <span>👤 {editDr.client?.name||"Select Client"}</span>
                      <span style={{fontSize:10}}>{editDr.editClientOpen?"▲":"▼"}</span>
                    </button>
                    {editDr.editClientOpen&&(
                      <div style={{position:"absolute",top:"100%",left:0,right:0,background:"var(--brand-surface2)",border:"1px solid var(--brand-border)",borderRadius:8,boxShadow:"0 8px 24px rgba(0,0,0,0.5)",maxHeight:200,overflowY:"auto",zIndex:50}}>
                        {clients.map(cl=>(
                          <div key={cl.id} onClick={()=>setEditDr(e=>({...e,client:{...cl},deliveryAddress:e.deliveryAddress||cl.address||"",editClientOpen:false}))}
                            style={{padding:"9px 14px",cursor:"pointer",borderBottom:"1px solid var(--brand-border)"}}
                            onMouseEnter={ev=>ev.currentTarget.style.background="var(--brand-surface)"}
                            onMouseLeave={ev=>ev.currentTarget.style.background="transparent"}>
                            <div style={{fontWeight:700,fontSize:12,color:"#86efac"}}>{cl.name}</div>
                            <div style={{fontSize:10,color:"var(--brand-muted)"}}>{cl.address}</div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>

                {/* Two-col row: Ref Invoice & Status */}
                <div style={{display:"flex",gap:12}}>
                  <div style={{flex:1}}>
                    <div className="form-label" style={{color:"#4ade80"}}>Ref. Invoice No</div>
                    <input className="form-input" value={editDr.invoiceNo||""} onChange={e=>setEditDr(d=>({...d,invoiceNo:e.target.value}))} placeholder="INV-0001" style={{marginTop:4}}/>
                  </div>
                  <div style={{flex:1}}>
                    <div className="form-label" style={{color:"#4ade80"}}>Status</div>
                    <select className="form-input" value={editDr.status||"Delivered"} onChange={e=>setEditDr(d=>({...d,status:e.target.value}))} style={{marginTop:4}}>
                      <option value="Delivered">Delivered</option>
                      <option value="Partial">Partial</option>
                      <option value="Pending">Pending</option>
                      <option value="Cancelled">Cancelled</option>
                    </select>
                  </div>
                </div>

                {/* Delivery Address */}
                <div>
                  <div className="form-label" style={{color:"#4ade80"}}>Delivery Address</div>
                  <input className="form-input" value={editDr.deliveryAddress||""} onChange={e=>setEditDr(d=>({...d,deliveryAddress:e.target.value}))} placeholder="Full delivery address" style={{marginTop:4}}/>
                </div>

                {/* Two-col row: Delivered By & Received By */}
                <div style={{display:"flex",gap:12}}>
                  <div style={{flex:1}}>
                    <div className="form-label" style={{color:"#4ade80"}}>Delivered By</div>
                    <input className="form-input" value={editDr.deliveredBy||""} onChange={e=>setEditDr(d=>({...d,deliveredBy:e.target.value}))} placeholder="Name of deliverer" style={{marginTop:4}}/>
                  </div>
                  <div style={{flex:1}}>
                    <div className="form-label" style={{color:"#4ade80"}}>Received By</div>
                    <input className="form-input" value={editDr.receivedBy||""} onChange={e=>setEditDr(d=>({...d,receivedBy:e.target.value}))} placeholder="Name of receiver" style={{marginTop:4}}/>
                  </div>
                </div>

                {/* Items */}
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <div className="form-label" style={{color:"#4ade80"}}>Items</div>
                    <button onClick={()=>setEditDr(d=>({...d,items:[...(d.items||[]),{lineId:genLineId(),sku:"",name:"",qty:1,unit:"piece",customName:""}]}))}
                      style={{background:"#22c55e20",border:"1px solid #22c55e",color:"#4ade80",borderRadius:5,padding:"3px 10px",cursor:"pointer",fontSize:11,fontWeight:700}}>+ Add Row</button>
                  </div>
                  <div style={{background:"var(--brand-bg)",borderRadius:8,border:"1px solid var(--brand-border)",overflow:"hidden"}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 80px 70px 70px 28px",background:"var(--brand-surface2)",padding:"6px 10px",fontSize:9,fontWeight:800,color:"var(--brand-muted)",textTransform:"uppercase",letterSpacing:0.5,gap:4}}>
                      <div>Description</div><div style={{textAlign:"center"}}>SKU</div><div style={{textAlign:"center"}}>Qty</div><div style={{textAlign:"center"}}>Unit</div><div></div>
                    </div>
                    {(editDr.items||[]).map((item,idx)=>(
                      <div key={item.lineId||idx} style={{display:"grid",gridTemplateColumns:"1fr 80px 70px 70px 28px",gap:4,padding:"6px 10px",borderTop:"1px solid var(--brand-border)",alignItems:"center"}}>
                        <input value={item.customName||item.name||""} onChange={e=>{const v=e.target.value;setEditDr(d=>({...d,items:d.items.map((it,j)=>j===idx?{...it,customName:v,name:v}:it)}));}} placeholder="Item description" style={{padding:"5px 8px",background:"var(--brand-surface)",border:"1px solid var(--brand-border)",borderRadius:5,color:"var(--brand-text)",fontSize:11,outline:"none",fontFamily:"inherit"}}/>
                        <input value={item.sku||""} onChange={e=>{const v=e.target.value;setEditDr(d=>({...d,items:d.items.map((it,j)=>j===idx?{...it,sku:v}:it)}));}} placeholder="SKU" style={{padding:"5px 6px",background:"var(--brand-surface)",border:"1px solid var(--brand-border)",borderRadius:5,color:"var(--brand-text)",fontSize:10,outline:"none",fontFamily:"inherit",textAlign:"center"}}/>
                        <input type="number" min="0.01" step="0.01" value={item.qty||1} onChange={e=>{const v=parseFloat(e.target.value)||1;setEditDr(d=>({...d,items:d.items.map((it,j)=>j===idx?{...it,qty:v}:it)}));}} style={{padding:"5px 6px",background:"var(--brand-surface)",border:"1px solid var(--brand-border)",borderRadius:5,color:"#86efac",fontSize:11,outline:"none",fontFamily:"inherit",textAlign:"center",fontWeight:700}}/>
                        <input value={item.unit||"piece"} onChange={e=>{const v=e.target.value;setEditDr(d=>({...d,items:d.items.map((it,j)=>j===idx?{...it,unit:v}:it)}));}} placeholder="unit" style={{padding:"5px 6px",background:"var(--brand-surface)",border:"1px solid var(--brand-border)",borderRadius:5,color:"var(--brand-muted)",fontSize:10,outline:"none",fontFamily:"inherit",textAlign:"center"}}/>
                        <button onClick={()=>setEditDr(d=>({...d,items:d.items.filter((_,j)=>j!==idx)}))} className="rm-btn" style={{background:"transparent",border:"none",color:"#ef4444",cursor:"pointer",fontSize:14,fontWeight:700,borderRadius:4,padding:"2px 4px"}}>×</button>
                      </div>
                    ))}
                    {(editDr.items||[]).length===0&&(
                      <div style={{padding:"20px",textAlign:"center",color:"var(--brand-muted)",fontSize:12}}>No items — click "+ Add Row" to add</div>
                    )}
                  </div>
                </div>

                {/* Notes */}
                <div>
                  <div className="form-label" style={{color:"#4ade80"}}>Notes / Remarks</div>
                  <textarea className="form-input" value={editDr.notes||""} onChange={e=>setEditDr(d=>({...d,notes:e.target.value}))} placeholder="Delivery notes, instructions..." rows={3} style={{marginTop:4,resize:"vertical"}}/>
                </div>

                {/* Actions */}
                <div style={{display:"flex",gap:10,paddingTop:4}}>
                  <button onClick={saveDrEdit} style={{flex:2,padding:"11px 0",background:"linear-gradient(135deg,#166534,#22c55e)",border:"none",borderRadius:8,color:"#fff",fontWeight:800,cursor:"pointer",fontSize:14,boxShadow:"0 2px 12px rgba(34,197,94,0.35)"}}>💾 Save Changes</button>
                  <button onClick={()=>setEditDr(null)} style={{flex:1,padding:"11px 0",background:"#334155",border:"none",borderRadius:8,color:"#94a3b8",fontWeight:700,cursor:"pointer",fontSize:14}}>Cancel</button>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ── MANAGE PRODUCTS ───────────────────────────────────────────────────────
  if(view==="manage_products") {
    const filteredProds = products.filter(p=>
      p.name.toLowerCase().includes(prodSearch.toLowerCase()) ||
      p.sku.toLowerCase().includes(prodSearch.toLowerCase()) ||
      (p.category||"").toLowerCase().includes(prodSearch.toLowerCase()) ||
      (p.description||"").toLowerCase().includes(prodSearch.toLowerCase())
    );
    const catGroups = ["All",...Array.from(new Set(products.map(p=>p.category))).sort()];
    const displayProds = prodCatFilter==="All" ? filteredProds : filteredProds.filter(p=>p.category===prodCatFilter);

    return (
    <div style={{minHeight:"100vh",background:"var(--brand-bg)"}}>
      {badge&&<div className="save-badge">✅ Saved to Google Drive</div>}

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,var(--brand-purple-dark),var(--brand-purple))",padding:"12px 20px",display:"flex",alignItems:"center",gap:12,borderBottom:"2px solid var(--brand-cyan)",flexWrap:"wrap"}}>
        <button onClick={()=>setView("pos")} className="nav-btn" style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",color:"#fff",borderRadius:7,padding:"7px 14px",fontWeight:700,fontSize:13}}>← POS</button>
        <div style={{fontWeight:800,fontSize:16,color:"#fff"}}>📦 Products ({products.length})</div>
        <div style={{fontSize:11,color:"var(--brand-muted)",marginLeft:4}}>· prices are starting rates — edit freely per job</div>
        <button onClick={()=>{setPForm(emptyP);setEditProd(null);setShowAddProd(true);}} style={{marginLeft:"auto",background:"#22c55e",border:"none",color:"#fff",borderRadius:7,padding:"8px 16px",fontWeight:700,cursor:"pointer",fontSize:13}}>+ Add Product</button>
        <button onClick={()=>{
          const data={version:2,exported:new Date().toISOString(),products,clients,history,salesItems,payments,invCounter,company,quoteHistory,drHistory};
          const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
          const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="breeks_backup_"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(url);
        }} style={{background:"rgba(0,196,212,0.12)",border:"1px solid var(--brand-cyan)",color:"var(--brand-cyan)",borderRadius:7,padding:"7px 12px",fontWeight:700,cursor:"pointer",fontSize:12}}>⬇️ Backup</button>
        <button onClick={()=>{if(window.confirm("Replace ALL products with the Breeks Digital default catalog?\n\nThis cannot be undone — your custom products will be removed.")){setProducts(DEFAULT_PRODUCTS);showBadge();}}} style={{background:"#f59e0b20",border:"1px solid #f59e0b",color:"#f59e0b",borderRadius:7,padding:"7px 14px",fontWeight:700,cursor:"pointer",fontSize:12}}>↺ Reset to Breeks Catalog</button>
      </div>

      {/* Search + Category Filter */}
      <div style={{padding:"12px 16px 10px",background:"#0f172a",borderBottom:"1px solid #1e293b",maxWidth:960,margin:"0 auto"}}>
        <input value={prodSearch} onChange={e=>setProdSearch(e.target.value)} placeholder="🔍  Search by name, SKU, category or description…" style={{width:"100%",padding:"10px 14px",background:"var(--brand-surface)",border:"1px solid var(--brand-border)",borderRadius:8,color:"var(--brand-text)",fontSize:13,outline:"none",marginBottom:10,boxSizing:"border-box"}}/>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {catGroups.map(cat=>{
            const col = CAT_COLORS[cat]||"#64748b";
            const active = prodCatFilter===cat;
            return <button key={cat} onClick={()=>setProdCatFilter(cat)} style={{padding:"4px 12px",borderRadius:20,fontSize:11,fontWeight:700,border:`1.5px solid ${active?col:"transparent"}`,background:active?col+"22":"rgba(255,255,255,0.05)",color:active?col:"var(--brand-muted)",cursor:"pointer"}}>{cat}</button>;
          })}
        </div>
      </div>

      {/* Product List */}
      <div style={{padding:16,maxWidth:960,margin:"0 auto"}}>
        {displayProds.length===0&&<div style={{textAlign:"center",padding:40,color:"var(--brand-muted)",fontSize:13}}>No products match your search.</div>}
        {displayProds.map(p=>{
          const dot = CAT_COLORS[p.category]||"#64748b";
          return (
          <div key={p.sku} style={{background:"var(--brand-surface)",border:"1px solid var(--brand-border)",borderRadius:10,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}>
            {/* Color dot */}
            <div style={{width:9,height:9,borderRadius:"50%",background:dot,flexShrink:0,marginTop:4}}/>
            {/* Info */}
            <div style={{flex:1,minWidth:200}}>
              <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:2}}>
                <span style={{fontWeight:700,fontSize:13,color:"#f1f5f9"}}>{p.name}</span>
                {p.dimBased&&<span style={{fontSize:9,background:"#0891b222",color:"#38bdf8",border:"1px solid #0891b2",borderRadius:4,padding:"1px 6px",fontWeight:700}}>📐 DIM-BASED</span>}
              </div>
              <div style={{fontSize:10,color:"#64748b",marginBottom:p.description?3:0}}>
                <span style={{background:dot+"22",color:dot,borderRadius:4,padding:"1px 6px",fontWeight:700,marginRight:6}}>{p.category}</span>
                {p.sku} · per {p.unit}
                {p.minPrice>0&&<span style={{color:"#f59e0b",marginLeft:8}}>· floor ₱{Number(p.minPrice).toLocaleString("en-PH",{minimumFractionDigits:2})}</span>}
              </div>
              {p.description&&<div style={{fontSize:10,color:"#8b89c0",fontStyle:"italic"}}>{p.description}</div>}
            </div>
            {/* Price */}
            <div style={{textAlign:"right",minWidth:100}}>
              <div style={{fontWeight:900,color:"#38bdf8",fontSize:14}}>{peso(p.price)}</div>
              <div style={{fontSize:9,color:"var(--brand-muted)"}}>per {p.unit}</div>
              {p.vat>0&&<div style={{fontSize:9,color:"#60a5fa"}}>{(p.vat*100).toFixed(0)}% VAT</div>}
            </div>
            {/* Actions */}
            <div style={{display:"flex",gap:5,flexShrink:0}}>
              <button onClick={()=>startEditProd(p)} style={{background:"#3b82f620",border:"1px solid #3b82f6",color:"#60a5fa",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:12}}>✏️ Edit</button>
              <button onClick={()=>{const dupSku=p.sku+"-2";if(products.find(x=>x.sku===dupSku)){alert("Copy SKU already exists: "+dupSku);return;}setProducts(ps=>[...ps,{...p,sku:dupSku,name:p.name+" (Copy)"}]);showBadge();}} style={{background:"#0ea5e920",border:"1px solid #0ea5e9",color:"#38bdf8",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:12}}>⧉</button>
              <button onClick={()=>delProd(p.sku)} style={{background:"#ef444420",border:"1px solid #ef4444",color:"#ef4444",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:12}}>🗑</button>
            </div>
          </div>
        );})}
      </div>

      {/* Add / Edit Modal */}
      {showAddProd&&(
        <Modal title={editProd?"✏️ Edit Product":"➕ Add New Product"} onClose={()=>{setShowAddProd(false);setEditProd(null);setPForm(emptyP);}}>
          {/* Name & SKU */}
          <div style={{marginBottom:12}}>
            <div className="form-label">Product / Service Name *</div>
            <input className="form-input" type="text" value={pForm.name} onChange={e=>setPForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Lighted Acrylic Signage"/>
          </div>
          <div style={{display:"flex",gap:10,marginBottom:12}}>
            <div style={{flex:1}}>
              <div className="form-label">SKU / Code *</div>
              <input className="form-input" type="text" value={pForm.sku} onChange={e=>setPForm(f=>({...f,sku:e.target.value}))} placeholder="e.g. SGN-001"/>
            </div>
            <div style={{flex:1}}>
              <div className="form-label">Category *</div>
              <select className="form-input" value={pForm.category} onChange={e=>setPForm(f=>({...f,category:e.target.value}))}>
                {["Signage","Stickers","Industrial","Apparel","Services","Print Labels","Other"].map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
          </div>

          {/* Description */}
          <div style={{marginBottom:12}}>
            <div className="form-label">Description / Specs (shown on product list)</div>
            <input className="form-input" type="text" value={pForm.description||""} onChange={e=>setPForm(f=>({...f,description:e.target.value}))} placeholder="e.g. Eco-solvent print on PVC tarpaulin. Price per sq ft."/>
          </div>

          {/* Pricing */}
          <div style={{background:"rgba(0,196,212,0.06)",border:"1px solid var(--brand-border)",borderRadius:8,padding:"12px",marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--brand-cyan)",marginBottom:10,textTransform:"uppercase",letterSpacing:0.5}}>💰 Pricing</div>
            <div style={{fontSize:10,color:"var(--brand-muted)",marginBottom:10,lineHeight:1.5}}>
              Set a <b style={{color:"#fff"}}>base / starting price</b> — this is your default rate that populates the invoice. You can always edit the price directly on any invoice line for custom quotes.
            </div>
            <div style={{display:"flex",gap:10,marginBottom:10}}>
              <div style={{flex:2}}>
                <div className="form-label">Base / Starting Price (₱) *</div>
                <input className="form-input" type="number" min="0" step="0.01" value={pForm.price} onChange={e=>setPForm(f=>({...f,price:e.target.value}))} placeholder="0.00"/>
                <div style={{fontSize:9,color:"var(--brand-muted)",marginTop:3}}>Default rate that appears when you add this to an invoice</div>
              </div>
              <div style={{flex:1}}>
                <div className="form-label">Min / Floor Price (₱)</div>
                <input className="form-input" type="number" min="0" step="0.01" value={pForm.minPrice||""} onChange={e=>setPForm(f=>({...f,minPrice:e.target.value}))} placeholder="0.00"/>
                <div style={{fontSize:9,color:"var(--brand-muted)",marginTop:3}}>Optional. Lowest you'll go.</div>
              </div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <div style={{flex:1}}>
                <div className="form-label">Unit</div>
                <select className="form-input" value={pForm.unit} onChange={e=>setPForm(f=>({...f,unit:e.target.value}))}>
                  {["sq ft","sq in","piece","set","project","day","trip","revision","hour","month"].map(u=><option key={u}>{u}</option>)}
                </select>
              </div>
              <div style={{flex:1}}>
                <div className="form-label">VAT Rate</div>
                <select className="form-input" value={String(pForm.vat)} onChange={e=>setPForm(f=>({...f,vat:e.target.value}))}>
                  <option value="0">VAT-Exempt (0%)</option>
                  <option value="0.12">VATable (12%)</option>
                </select>
              </div>
            </div>
          </div>

          {/* DIM toggle */}
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,padding:"10px 12px",background:"rgba(8,145,178,0.08)",border:"1px solid #0891b2",borderRadius:8,cursor:"pointer"}} onClick={()=>setPForm(f=>({...f,dimBased:!f.dimBased}))}>
            <div style={{width:36,height:20,borderRadius:10,background:pForm.dimBased?"#0891b2":"var(--brand-surface2)",position:"relative",flexShrink:0,transition:"background 0.2s"}}>
              <div style={{position:"absolute",top:2,left:pForm.dimBased?18:2,width:16,height:16,borderRadius:"50%",background:"#fff",transition:"left 0.2s"}}/>
            </div>
            <div>
              <div style={{fontWeight:700,fontSize:12,color:"#38bdf8"}}>📐 Dimension-based pricing</div>
              <div style={{fontSize:10,color:"var(--brand-muted)"}}>When ON, the DIM tool auto-activates when this product is added to an invoice — great for signage and stickers priced per sq ft.</div>
            </div>
          </div>

          <div style={{display:"flex",gap:10}}>
            <button onClick={saveProd} style={{flex:2,padding:"11px 0",background:"linear-gradient(135deg,#2d2080,#3a2db5)",border:"none",borderRadius:8,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:14}}>💾 Save Product</button>
            <button onClick={()=>{setShowAddProd(false);setEditProd(null);setPForm(emptyP);}} style={{flex:1,padding:"11px 0",background:"#334155",border:"none",borderRadius:8,color:"#94a3b8",fontWeight:700,cursor:"pointer",fontSize:14}}>Cancel</button>
          </div>
        </Modal>
      )}
    </div>
  );}

  // ── MANAGE CLIENTS ────────────────────────────────────────────────────────
  if(view==="manage_clients") {
    const filteredClis = clients.filter(c=>c.name.toLowerCase().includes(cliSearch.toLowerCase())||(c.contact&&c.contact.toLowerCase().includes(cliSearch.toLowerCase()))||(c.phone&&c.phone.includes(cliSearch))||(c.address&&c.address.toLowerCase().includes(cliSearch.toLowerCase())));
    return (
    <div style={{minHeight:"100vh",background:"var(--brand-bg)"}}>
      {badge&&<div className="save-badge">✅ Saved to Google Drive</div>}
      <div style={{background:"linear-gradient(135deg,var(--brand-purple-dark),var(--brand-purple))",padding:"12px 20px",display:"flex",alignItems:"center",gap:12,borderBottom:"2px solid var(--brand-cyan)",flexWrap:"wrap"}}>
        <button onClick={()=>setView("pos")} className="nav-btn" style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",color:"#fff",borderRadius:7,padding:"7px 14px",fontWeight:700,fontSize:13}}>← POS</button>
        <div style={{fontWeight:800,fontSize:16,color:"#fff"}}>👥 Manage Clients ({clients.length})</div>
        <button onClick={()=>{setCForm(emptyC);setEditCli(null);setShowAddCli(true);}} style={{marginLeft:"auto",background:"#22c55e",border:"none",color:"#fff",borderRadius:7,padding:"8px 16px",fontWeight:700,cursor:"pointer",fontSize:13}}>+ Add Client</button>
      </div>
      <div style={{padding:"12px 16px",background:"#0f172a",borderBottom:"1px solid #1e293b",maxWidth:900,margin:"0 auto",paddingTop:16}}>
        <input value={cliSearch} onChange={e=>setCliSearch(e.target.value)} placeholder="🔍  Search by name, contact, phone or address..." style={{width:"100%",padding:"10px 14px",background:"var(--brand-surface)",border:"1px solid var(--brand-border)",borderRadius:8,color:"var(--brand-text)",fontSize:13,outline:"none"}}/>
      </div>
      <div style={{padding:16,maxWidth:900,margin:"0 auto"}}>
        {filteredClis.map(c=>(
          <div key={c.id} style={{background:"var(--brand-surface)",border:"1px solid var(--brand-border)",borderRadius:10,padding:"11px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:160}}>
              <div style={{fontWeight:700,fontSize:12,color:"#f1f5f9"}}>{c.name}</div>
              <div style={{fontSize:10,color:"#64748b"}}>{c.contact&&c.contact+" · "}{c.phone}</div>
              <div style={{fontSize:10,color:"#64748b"}}>{c.address}</div>
              {c.tin&&<div style={{fontSize:10,color:"#94a3b8"}}>TIN: {c.tin}</div>}
            </div>
            <button onClick={()=>startEditCli(c)} style={{background:"#3b82f620",border:"1px solid #3b82f6",color:"#60a5fa",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:12}}>✏️ Edit</button>
            <button onClick={()=>delCli(c.id)} style={{background:"#ef444420",border:"1px solid #ef4444",color:"#ef4444",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:12}}>🗑</button>
          </div>
        ))}
      </div>
      {showAddCli&&(
        <Modal title={editCli?"Edit Client":"Add New Client"} onClose={()=>{setShowAddCli(false);setEditCli(null);setCForm(emptyC);}}>
          {[["Company Name *","name"],["Contact Person","contact"],["Phone","phone"],["Address","address"],["TIN Number","tin"]].map(([lbl,key])=>(
            <div key={key} style={{marginBottom:12}}><div className="form-label">{lbl}</div><input className="form-input" type="text" value={cForm[key]||""} onChange={e=>setCForm(f=>({...f,[key]:e.target.value}))}/></div>
          ))}
          <div style={{display:"flex",gap:10}}>
            <button onClick={saveCli} style={{flex:1,padding:"10px 0",background:"#3b82f6",border:"none",borderRadius:8,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:14}}>💾 Save</button>
            <button onClick={()=>{setShowAddCli(false);setEditCli(null);setCForm(emptyC);}} style={{flex:1,padding:"10px 0",background:"#334155",border:"none",borderRadius:8,color:"#94a3b8",fontWeight:700,cursor:"pointer",fontSize:14}}>Cancel</button>
          </div>
        </Modal>
      )}
    </div>
  );}

  // ── REPORTS ───────────────────────────────────────────────────────────────
  if(view==="reports") {
    const activeInv = history.filter(i=>i.status!=="VOID");

    const totalSales    = activeInv.reduce((s,i)=>s+(i.total||0),0);
    const totalPaid     = activeInv.filter(i=>i.status==="Paid").reduce((s,i)=>s+(i.total||0),0);
    const totalUnpaid   = activeInv.filter(i=>i.status==="Unpaid").reduce((s,i)=>s+(i.total||0),0);
    const totalInvoices = activeInv.length;
    const totalVAT      = activeInv.reduce((s,i)=>s+(i.vatTotal||0),0);

    // Payment-aware: cash actually received (sum of payments table)
    const totalCollected  = payments.reduce((s,p)=>s+(p.amount||0),0);
    const totalBalance    = activeInv.reduce((s,inv)=>{
      const paid = payments.filter(p=>p.invoiceNo===inv.invoiceNo).reduce((a,p)=>a+(p.amount||0),0);
      return s + Math.max(0,(inv.total||0)-paid);
    },0);
    const overdueInvs = activeInv.filter(inv=>inv.status==="Unpaid"&&inv.dueDate&&new Date(inv.dueDate)<new Date());
    const totalOverdue = overdueInvs.reduce((s,i)=>s+(i.total||0),0);

    // ── Sales by Client ──
    const byClient = {};
    activeInv.forEach(inv => {
      const name = inv.client?.name || "Unknown";
      if (!byClient[name]) byClient[name] = { name, invoices:0, total:0, paid:0, unpaid:0, collected:0, balance:0, items:[] };
      byClient[name].invoices++;
      byClient[name].total += inv.total||0;
      if(inv.status==="Paid") byClient[name].paid += inv.total||0;
      else byClient[name].unpaid += inv.total||0;
      const cPaid = payments.filter(p=>p.invoiceNo===inv.invoiceNo).reduce((s,p)=>s+(p.amount||0),0);
      byClient[name].collected += cPaid;
      byClient[name].balance   += Math.max(0,(inv.total||0)-cPaid);
      (inv.cart||[]).forEach(item => byClient[name].items.push(item));
    });
    const clientRows = Object.values(byClient).sort((a,b)=>b.total-a.total);

    // ── Products Sold ──
    const byProduct = {};
    activeInv.forEach(inv => {
      (inv.cart||[]).forEach(item => {
        const key = item.sku;
        if(!byProduct[key]) byProduct[key] = { sku:item.sku, name:item.name, category:item.category||"", qty:0, revenue:0, orders:0 };
        byProduct[key].qty     += item.qty||0;
        byProduct[key].revenue += item.price*(item.qty||0)*(1-(item.disc||0)/100);
        byProduct[key].orders++;
      });
    });
    const productRows = Object.values(byProduct).sort((a,b)=>b.revenue-a.revenue);

    // ── Period-aware grouping (daily / weekly / monthly) ──
    const getPeriodKey = (dateStr, period) => {
      const d = new Date(dateStr);
      if(period==="daily") {
        return d.toLocaleDateString("en-PH",{weekday:"short",month:"short",day:"2-digit",year:"numeric"});
      } else if(period==="weekly") {
        // Get Monday of the week
        const day = d.getDay(); // 0=Sun
        const diff = (day===0?-6:1-day);
        const mon = new Date(d); mon.setDate(d.getDate()+diff);
        const sun = new Date(mon); sun.setDate(mon.getDate()+6);
        const fmt = dt=>dt.toLocaleDateString("en-PH",{month:"short",day:"2-digit"});
        return `${fmt(mon)} – ${fmt(sun)}, ${sun.getFullYear()}`;
      } else {
        return d.toLocaleDateString("en-PH",{month:"short",year:"numeric"});
      }
    };
    const byPeriod = {};
    activeInv.forEach(inv => {
      const key = getPeriodKey(inv.date, rPeriod);
      if(!byPeriod[key]) byPeriod[key] = { period:key, total:0, count:0, paid:0, date:inv.date };
      byPeriod[key].total += inv.total||0;
      byPeriod[key].count++;
      if(inv.status==="Paid") byPeriod[key].paid += inv.total||0;
    });
    // Sort chronologically by the earliest invoice date in each bucket
    const periodRows = Object.values(byPeriod).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const maxPeriodTotal = Math.max(...periodRows.map(r=>r.total), 1);

    // ── Monthly Sales (kept for backwards compat with monthly drill-down PDF) ──
    const byMonth = {};
    activeInv.forEach(inv => {
      const m = new Date(inv.date).toLocaleDateString("en-PH",{month:"short",year:"numeric"});
      if(!byMonth[m]) byMonth[m] = { month:m, total:0, count:0, paid:0 };
      byMonth[m].total += inv.total||0;
      byMonth[m].count++;
      if(inv.status==="Paid") byMonth[m].paid += inv.total||0;
    });
    const monthRows = Object.values(byMonth).reverse();
    const maxMonthTotal = Math.max(...monthRows.map(m=>m.total), 1);

    // ── Collections by month (from payments table) ──
    const byPayMonth = {};
    payments.forEach(p => {
      const m = new Date(p.date).toLocaleDateString("en-PH",{month:"short",year:"numeric"});
      if(!byPayMonth[m]) byPayMonth[m] = { month:m, collected:0, count:0, methods:{} };
      byPayMonth[m].collected += p.amount||0;
      byPayMonth[m].count++;
      byPayMonth[m].methods[p.method||"Cash"] = (byPayMonth[m].methods[p.method||"Cash"]||0) + (p.amount||0);
    });
    const payMonthRows = Object.values(byPayMonth).reverse();
    const maxPayMonth  = Math.max(...payMonthRows.map(m=>m.collected), 1);

    const cardStyle = (bg,border) => ({background:bg,border:`1px solid ${border}`,borderRadius:12,padding:"16px 20px",flex:1,minWidth:130});
    const tabStyle  = active => ({padding:"8px 18px",borderRadius:20,fontSize:12,fontWeight:700,border:"none",cursor:"pointer",background:active?"var(--brand-cyan)":"var(--brand-surface2)",color:active?"#fff":"var(--brand-muted)"});

    return (
      <div style={{minHeight:"100vh",background:"var(--brand-bg)"}}>
        {/* Header */}
        <div style={{background:"linear-gradient(135deg,var(--brand-purple-dark),var(--brand-purple))",padding:"12px 20px",display:"flex",alignItems:"center",gap:12,borderBottom:"2px solid var(--brand-cyan)",flexWrap:"wrap"}}>
          <button onClick={()=>setView("pos")} className="nav-btn" style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",color:"#fff",borderRadius:7,padding:"7px 14px",fontWeight:700,fontSize:13}}>← POS</button>
          <div style={{fontWeight:800,fontSize:16,color:"#fff"}}>📊 Reports & Analytics</div>
          <button onClick={()=>setView("ledger")} className="nav-btn" style={{background:"rgba(0,196,212,0.15)",border:"1px solid var(--brand-cyan)",color:"var(--brand-cyan)",borderRadius:7,padding:"7px 14px",fontWeight:700,fontSize:12}}>📒 Client Ledger</button>
          <div style={{marginLeft:"auto",fontSize:11,color:"#64748b"}}>{activeInv.length} invoices</div>
        </div>

        {history.length===0 ? (
          <div style={{textAlign:"center",padding:80,color:"#475569"}}>
            <div style={{fontSize:48,marginBottom:12}}>📊</div>
            <div style={{fontSize:16,fontWeight:700,color:"var(--brand-muted)"}}>No invoices yet</div>
          </div>
        ) : (
          <div style={{padding:"20px",maxWidth:1100,margin:"0 auto"}}>

            {/* Summary Cards */}
            <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
              <div style={cardStyle("rgba(0,184,212,0.1)","var(--brand-cyan)")}>
                <div style={{fontSize:9,color:"var(--brand-cyan)",fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Total Billed</div>
                <div style={{fontSize:20,fontWeight:900,color:"#fff",marginTop:4}}>{peso(totalSales)}</div>
                <div style={{fontSize:10,color:"var(--brand-muted)",marginTop:1}}>{totalInvoices} invoices</div>
              </div>
              <div style={cardStyle("rgba(34,197,94,0.1)","#22c55e")}>
                <div style={{fontSize:9,color:"#22c55e",fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Collected (Cash In)</div>
                <div style={{fontSize:20,fontWeight:900,color:"#fff",marginTop:4}}>{peso(totalCollected)}</div>
                <div style={{fontSize:10,color:"var(--brand-muted)",marginTop:1}}>{payments.length} payment{payments.length!==1?"s":""}</div>
              </div>
              <div style={cardStyle("rgba(245,158,11,0.12)","#f59e0b")}>
                <div style={{fontSize:9,color:"#f59e0b",fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Balance Due</div>
                <div style={{fontSize:20,fontWeight:900,color:"#fff",marginTop:4}}>{peso(totalBalance)}</div>
                <div style={{fontSize:10,color:"var(--brand-muted)",marginTop:1}}>{activeInv.filter(i=>i.status==="Unpaid").length} unpaid</div>
              </div>
              <div style={cardStyle("rgba(239,68,68,0.1)","#ef4444")}>
                <div style={{fontSize:9,color:"#ef4444",fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Overdue</div>
                <div style={{fontSize:20,fontWeight:900,color:"#fff",marginTop:4}}>{peso(totalOverdue)}</div>
                <div style={{fontSize:10,color:"var(--brand-muted)",marginTop:1}}>{overdueInvs.length} invoice{overdueInvs.length!==1?"s":""}</div>
              </div>
              <div style={cardStyle("rgba(99,102,241,0.1)","#6366f1")}>
                <div style={{fontSize:9,color:"#a5b4fc",fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Total VAT</div>
                <div style={{fontSize:20,fontWeight:900,color:"#fff",marginTop:4}}>{peso(totalVAT)}</div>
                <div style={{fontSize:10,color:"var(--brand-muted)",marginTop:1}}>from invoices</div>
              </div>
            </div>

            {/* Tabs */}
            <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
              {[["overview", rPeriod==="daily"?"📅 Daily Sales":rPeriod==="weekly"?"📆 Weekly Sales":"📈 Monthly Sales"],["collections","💳 Collections"],["clients","👥 By Client"],["products","📦 Products Sold"]].map(([t,l])=>(
                <button key={t} onClick={()=>setRTab(t)} style={tabStyle(rTab===t)}>{l}</button>
              ))}
            </div>

            {/* ── COLLECTIONS TAB ── */}
            {rTab==="collections" && (
              <div>
                {/* Method breakdown */}
                <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
                  {(()=>{
                    const byMethod = {};
                    payments.forEach(p=>{byMethod[p.method||"Cash"]=(byMethod[p.method||"Cash"]||0)+(p.amount||0);});
                    return Object.entries(byMethod).sort((a,b)=>b[1]-a[1]).map(([method,amt])=>(
                      <div key={method} style={{background:"var(--brand-surface)",border:"1px solid var(--brand-border)",borderRadius:10,padding:"12px 16px",flex:"1 1 130px"}}>
                        <div style={{fontSize:10,color:"var(--brand-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>{method}</div>
                        <div style={{fontSize:18,fontWeight:900,color:"#22c55e",marginTop:3}}>{peso(amt)}</div>
                        <div style={{fontSize:10,color:"var(--brand-muted)",marginTop:1}}>{payments.filter(p=>(p.method||"Cash")===method).length} payment{payments.filter(p=>(p.method||"Cash")===method).length!==1?"s":""}</div>
                      </div>
                    ));
                  })()}
                </div>

                {/* Monthly collections bar chart */}
                <div style={{background:"var(--brand-surface)",borderRadius:12,border:"1px solid var(--brand-border)",padding:"20px",marginBottom:16}}>
                  <div style={{fontWeight:800,fontSize:14,color:"#fff",marginBottom:16}}>💳 Collections by Month</div>
                  {payMonthRows.length===0
                    ? <div style={{color:"var(--brand-muted)",textAlign:"center",padding:30}}>No payments recorded yet. Use the 💳 Pay button on invoices.</div>
                    : payMonthRows.map((m,i)=>(
                    <div key={i} style={{marginBottom:14}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:12}}>
                        <span style={{fontWeight:700,color:"#f1f5f9"}}>{m.month}</span>
                        <span style={{color:"#22c55e",fontWeight:700}}>{peso(m.collected)}</span>
                      </div>
                      <div style={{height:10,background:"var(--brand-surface2)",borderRadius:5,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${(m.collected/maxPayMonth)*100}%`,background:"linear-gradient(90deg,#22c55e,#16a34a)",borderRadius:5,transition:"width 0.4s"}}/>
                      </div>
                      <div style={{display:"flex",gap:12,marginTop:4,fontSize:10,color:"var(--brand-muted)",flexWrap:"wrap"}}>
                        <span>{m.count} payment{m.count!==1?"s":""}</span>
                        {Object.entries(m.methods).map(([mth,amt])=>(
                          <span key={mth}>{mth}: <b style={{color:"#22c55e"}}>{peso(amt)}</b></span>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>

                {/* Full payment ledger */}
                <div style={{background:"var(--brand-surface)",borderRadius:12,border:"1px solid var(--brand-border)",overflow:"hidden"}}>
                  <div style={{padding:"12px 16px",borderBottom:"1px solid var(--brand-border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{fontWeight:700,fontSize:13,color:"#fff"}}>All Payments</div>
                    <div style={{fontSize:11,color:"var(--brand-muted)"}}>{payments.length} record{payments.length!==1?"s":""}</div>
                  </div>
                  {payments.length===0
                    ? <div style={{padding:30,color:"var(--brand-muted)",textAlign:"center",fontSize:12}}>No payments yet.</div>
                    : (<>
                      <div style={{display:"grid",gridTemplateColumns:"110px 110px 1fr 100px 90px 100px 32px",padding:"7px 14px",background:"var(--brand-surface2)",fontSize:9,fontWeight:700,color:"var(--brand-muted)",textTransform:"uppercase",letterSpacing:0.5,gap:8}}>
                        <span>Date</span><span>Invoice</span><span>Client</span><span>Method</span><span>Ref</span><span style={{textAlign:"right"}}>Amount</span><span/>
                      </div>
                      {[...payments].reverse().map((p,i)=>{
                        const inv = history.find(x=>x.invoiceNo===p.invoiceNo);
                        return (
                          <div key={p.id||i} style={{display:"grid",gridTemplateColumns:"110px 110px 1fr 100px 90px 100px 32px",padding:"9px 14px",borderTop:"1px solid var(--brand-border)",background:i%2===0?"transparent":"rgba(255,255,255,0.02)",alignItems:"center",gap:8}}>
                            <div style={{fontSize:11,color:"var(--brand-muted)"}}>{new Date(p.date).toLocaleDateString("en-PH",{day:"2-digit",month:"short",year:"numeric"})}</div>
                            <div style={{fontSize:11,fontWeight:700,color:"var(--brand-cyan)"}}>{p.invoiceNo}</div>
                            <div style={{fontSize:11,color:"#f1f5f9",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{inv?.client?.name||"—"}</div>
                            <div style={{fontSize:11,color:"var(--brand-muted)"}}>{p.method||"Cash"}</div>
                            <div style={{fontSize:10,color:"#64748b"}}>{p.ref||"—"}</div>
                            <div style={{textAlign:"right",fontWeight:800,fontSize:12,color:"#22c55e"}}>{peso(p.amount)}</div>
                            <button onClick={()=>{if(window.confirm("Delete this payment record?"))setPayments(prev=>prev.filter(x=>x.id!==p.id&&!(x.invoiceNo===p.invoiceNo&&x.date===p.date&&x.amount===p.amount)));}} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:12,padding:0}}>✕</button>
                          </div>
                        );
                      })}
                      <div style={{display:"grid",gridTemplateColumns:"110px 110px 1fr 100px 90px 100px 32px",padding:"10px 14px",borderTop:"2px solid var(--brand-border)",background:"rgba(34,197,94,0.08)",gap:8}}>
                        <div style={{gridColumn:"1/6",fontWeight:800,fontSize:11,color:"#22c55e",textTransform:"uppercase",letterSpacing:0.5}}>Total Collected</div>
                        <div style={{textAlign:"right",fontWeight:900,color:"#22c55e",fontSize:14}}>{peso(payments.reduce((s,p)=>s+(p.amount||0),0))}</div>
                        <div/>
                      </div>
                    </>)
                  }
                </div>
              </div>
            )}

            {/* ── OVERVIEW TAB ── */}
            {rTab==="overview" && (
              <div style={{background:"var(--brand-surface)",borderRadius:12,border:"1px solid var(--brand-border)",padding:"20px"}}>
                {/* Header + Period Toggle */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
                  <div style={{fontWeight:800,fontSize:14,color:"#fff"}}>
                    📈 {rPeriod==="daily"?"Daily":rPeriod==="weekly"?"Weekly":"Monthly"} Sales Overview
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{display:"flex",background:"var(--brand-surface2)",borderRadius:20,padding:3,gap:2}}>
                      {[["daily","📅 Daily"],["weekly","📆 Weekly"],["monthly","🗓 Monthly"]].map(([p,l])=>(
                        <button key={p} onClick={()=>{setRPeriod(p);setSelectedMonth(null);}}
                          style={{padding:"5px 14px",borderRadius:16,fontSize:11,fontWeight:700,border:"none",cursor:"pointer",

                            const bg = idx%2===0?"transparent":"rgba(255,255,255,0.025)";
                            return (
                              <tr key={idx} style={{background:bg}}>
                                <td style={cell2({color:"var(--brand-muted)",whiteSpace:"nowrap"})}>{new Date(inv.date).toLocaleDateString("en-PH",{day:"2-digit",month:"short",year:"numeric"})}</td>
                                <td style={cell2({color:"var(--brand-cyan)",fontWeight:700,whiteSpace:"nowrap"})}>{inv.invoiceNo}</td>
                                <td style={cell2({color:"#f1f5f9",fontWeight:600})}>{inv.client?.name||"—"}</td>
                                <td style={cell2({textAlign:"center",fontWeight:800,color:"var(--brand-cyan)",fontSize:14})}>{lineItem.qty||0}</td>
                                <td style={cell2({textAlign:"right",color:"#f1f5f9"})}>{peso(lineItem.price||0)}</td>
                                <td style={cell2({textAlign:"right",fontWeight:800,color:"#22c55e"})}>{peso(lineAmt)}</td>
                                <td style={cell2({textAlign:"center"})}><span style={{fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:5,background:isPaid?"rgba(34,197,94,0.15)":"rgba(245,158,11,0.15)",color:isPaid?"#22c55e":"#f59e0b"}}>{inv.status||"Unpaid"}</span></td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              );
            })()}

          </div>
        )}
      </div>
    );
  }
