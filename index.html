const { useState, useEffect, useCallback, useRef } = React;

// ── Google Apps Script bridge ─────────────────────────────────────────────
const GAS = {
  call: (fn, ...args) => new Promise((resolve, reject) => {
    if (typeof google === 'undefined' || !google.script) {
      resolve(null);
      return;
    }
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(reject)
      [fn](...args);
  })
};

// ── PERF: Debounced write queue — batches rapid saves, fires 800ms after last call ──
const _writeQueue = {};
const _writeTimers = {};
const debouncedSave = (key, value) => {
  _writeQueue[key] = value;
  if (_writeTimers[key]) clearTimeout(_writeTimers[key]);
  _writeTimers[key] = setTimeout(() => {
    if (isGAS()) {
      GAS.call('saveKey', key, JSON.stringify(_writeQueue[key]))
        .catch(e => console.warn('Debounced save error:', key, e));
    } else {
      LS.set(key, _writeQueue[key]);
    }
    delete _writeQueue[key];
    delete _writeTimers[key];
  }, 800);
};

// ── Fallback localStorage (used only if not in GAS environment) ──────────
const LS = {
  get: (k, fb) => { try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : fb; } catch { return fb; } },
  set: (k, v)  => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

  // Initialize immediately from localStorage so UI is never blank
  const [val, setValRaw] = useState(() => {
    const lsVal = LS.get(key, null);
    if (lsVal !== null) {
      // Migrate old cart items that lack lineId

  useEffect(() => {
    if (loaded && !initialized.current) {
      initialized.current = true;
      const cloudVal = cloudData[key];
      if (cloudVal !== null && cloudVal !== undefined) {
        // Migrate old cart items that lack lineId (backward compat)
        if (key === 'pos_cart' && Array.isArray(cloudVal)) {
          setValRaw(cloudVal.map(item => item.lineId ? item : {...item, lineId:'line_'+Math.random().toString(36).slice(2,10)}));
        } else {
          setValRaw(cloudVal);
        }
      }
    }
  }, [loaded]);

  const set = useCallback((updater) => {
    setValRaw(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      // Always save to localStorage as local backup
      LS.set(key, next);
      // Also save to GAS cloud if available
      if (isGAS()) {
        // Debounce writes so rapid state changes (qty, discount, etc.) don't each fire a GAS call
        debouncedSave(key, next);
      } else {
        LS.set(key, next);
      }
      return next;
    });
  }, [key]);

  return [val, set];
}

function Modal({ title, onClose, children }) {
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <div style={{fontWeight:800,fontSize:16,color:"#f1f5f9"}}>{title}</div>
          <button onClick={onClose} style={{background:"#334155",border:"none",color:"#94a3b8",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:16}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

  const updateDim = (lineId, field, val) => setCart(p=>p.map(i=>{
    if(i.lineId!==lineId) return i;

    const rateUnit=field==="rateUnit"?val:(updated.rateUnit||"sq ft");
    // Calculate area in the chosen rate unit
    let area;
    if(rateUnit==="sq in") {
      const toIn = unit==="ft"?144:unit==="cm"?(1/6.4516):unit==="m"?1550.0031:1;

      const tens=["","","TWENTY","THIRTY","FORTY","FIFTY","SIXTY","SEVENTY","EIGHTY","NINETY"];
      const toW = x => {

        if(x<20)return ones[x]+" ";
        if(x<100)return tens[Math.floor(x/10)]+(x%10?" "+ones[x%10]:" ")+" ";
        return ones[Math.floor(x/100)]+" HUNDRED "+(x%100?toW(x%100):"");
      };
      const pesos = Math.floor(n);
      const cents = Math.round((n-pesos)*100);
      let w = "";
      if(pesos>=1000000) w+=toW(Math.floor(pesos/1000000))+"MILLION ";
      if(pesos>=1000) w+=toW(Math.floor((pesos%1000000)/1000))+"THOUSAND ";

      const rate=parseFloat(field==="ratePerSqFt"?val:updated.ratePerSqFt)||0;
      const rateUnit=field==="rateUnit"?val:(updated.rateUnit||"sq ft");
      let area;
      if(rateUnit==="sq in") {
        const toIn = unit==="ft"?144:unit==="cm"?(1/6.4516):unit==="m"?1550.0031:1;
        area = w*h*toIn;
      } else {
        const toFt = unit==="in"?(1/144):unit==="cm"?(1/929.03):unit==="m"?10.7639:1;

      if(i.lineId!==lineId) return i;

      const rate=parseFloat(field==="ratePerSqFt"?val:updated.ratePerSqFt)||0;
      const rateUnit=field==="rateUnit"?val:(updated.rateUnit||"sq ft");
      let area;
      if(rateUnit==="sq in") {
        const toIn = unit==="ft"?144:unit==="cm"?(1/6.4516):unit==="m"?1550.0031:1;
        area = w*h*toIn;
      } else {
        const toFt=unit==="in"?(1/144):unit==="cm"?(1/929.03):unit==="m"?10.7639:1;
        area=w*h*toFt;
      }
      const newPrice=area>0&&rate>0?parseFloat((area*rate).toFixed(4)):updated.price;
      return {...updated,rateUnit,price:area>0&&rate>0?newPrice:updated.price};
    }));

                            <button onClick={()=>setQCart(p=>p.map(i=>i.lineId===item.lineId?{...i,qty:i.qty+1}:i))} style={{width:18,height:18,background:"#2d2080",border:"none",borderRadius:3,color:"#fff",cursor:"pointer",fontSize:12,lineHeight:1}}>+</button>

                          <div>
                            <input type="number" min="0" step="0.01" value={item.price} onChange={e=>setQCart(p=>p.map(i=>i.lineId===item.lineId?{...i,price:parseFloat(e.target.value)||0,ratePerSqFt:i.dimMode?i.ratePerSqFt:parseFloat(e.target.value)||0}:i))} style={{width:"100%",textAlign:"right",background:item.dimMode?"rgba(8,145,178,0.15)":(item.minPrice>0&&item.price<item.minPrice)?"rgba(245,158,11,0.12)":"transparent",border:`1px solid ${item.minPrice>0&&item.price<item.minPrice?"#f59e0b":"var(--brand-border)"}`,borderRadius:3,color:item.dimMode?"#38bdf8":"#fcd34d",fontSize:10,padding:"2px 3px",fontWeight:700}}/>
                            {item.dimMode&&<div style={{fontSize:7,color:"#38bdf8",textAlign:"right",marginTop:1}}>auto-calc</div>}
                            {item.minPrice>0&&item.price<item.minPrice&&!item.dimMode&&<div style={{fontSize:7,color:"#f59e0b",textAlign:"right",marginTop:1}}>⚠ floor ₱{Number(item.minPrice).toFixed(2)}</div>}
                          </div>
                          <div><input type="number" min="0" max="100" step="1" value={item.disc} onChange={e=>setQCart(p=>p.map(i=>i.lineId===item.lineId?{...i,disc:Math.min(100,Math.max(0,parseFloat(e.target.value)||0))}:i))} style={{width:"100%",textAlign:"center",background:"transparent",border:"1px solid var(--brand-border)",borderRadius:3,color:"#f87171",fontSize:10,padding:"2px 3px",fontWeight:600}}/></div>
                          <div style={{textAlign:"center",fontSize:10,color:"#34d399",fontWeight:600}}>{vatPct>0?vatPct+"%":"0%"}</div>
                          <div style={{textAlign:"right",fontSize:11,fontWeight:700,color:"var(--brand-text)"}}>{Number(la).toLocaleString("en-PH",{minimumFractionDigits:2})}</div>
                          <button onClick={()=>setQCart(p=>p.filter(i=>i.lineId!==item.lineId))} className="rm-btn" style={{background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.3)",color:"#f87171",borderRadius:4,padding:"2px 5px",cursor:"pointer",fontSize:10}}>✕</button>
                        </div>
                        {item.dimMode&&(
                          <div style={{background:"rgba(8,145,178,0.1)",borderTop:"1px dashed #0891b2",padding:"7px 10px 8px 14px",display:"flex",gap:6,alignItems:"flex-end",flexWrap:"wrap"}}>
                            <div>
                              <div style={{fontSize:8,color:"#38bdf8",fontWeight:700,marginBottom:2}}>WIDTH</div>
                              <input type="number" min="0" step="0.01" value={item.dimW} onChange={e=>updateQDim(item.lineId,"dimW",e.target.value)} placeholder="0" style={{width:54,textAlign:"center",background:"var(--brand-bg)",border:"1px solid #0891b2",borderRadius:3,color:"#e0f2fe",fontSize:11,padding:"3px 4px",fontWeight:700}}/>
                            </div>
                            <div style={{fontSize:12,color:"#0891b2",fontWeight:900,paddingBottom:4}}>×</div>
                            <div>
                              <div style={{fontSize:8,color:"#38bdf8",fontWeight:700,marginBottom:2}}>HEIGHT</div>
                              <input type="number" min="0" step="0.01" value={item.dimH} onChange={e=>updateQDim(item.lineId,"dimH",e.target.value)} placeholder="0" style={{width:54,textAlign:"center",background:"var(--brand-bg)",border:"1px solid #0891b2",borderRadius:3,color:"#e0f2fe",fontSize:11,padding:"3px 4px",fontWeight:700}}/>
                            </div>
                            <div>
                              <div style={{fontSize:8,color:"#38bdf8",fontWeight:700,marginBottom:2}}>UNIT</div>
                              <select value={item.dimUnit||"ft"} onChange={e=>updateQDim(item.lineId,"dimUnit",e.target.value)} style={{background:"var(--brand-bg)",border:"1px solid #0891b2",borderRadius:3,color:"#e0f2fe",fontSize:11,padding:"3px 4px",fontWeight:700}}>
                                <option value="ft">ft</option>
                                <option value="in">in</option>
                                <option value="m">m</option>
                                <option value="cm">cm</option>
                              </select>
                            </div>
                            <div>
                              <div style={{fontSize:8,color:"#38bdf8",fontWeight:700,marginBottom:2}}>
                                RATE / 
                                <select value={item.rateUnit||"sq ft"} onChange={e=>updateQDim(item.lineId,"rateUnit",e.target.value)} style={{background:"transparent",border:"none",color:"#38bdf8",fontSize:8,fontWeight:700,cursor:"pointer",padding:0,outline:"none"}}>
                                  <option value="sq ft">SQ FT</option>
                                  <option value="sq in">SQ IN</option>
                                </select>
                                (₱)
                              </div>
                              <input type="number" min="0" step="0.01" value={item.ratePerSqFt||""} onChange={e=>updateQDim(item.lineId,"ratePerSqFt",e.target.value)} placeholder="e.g. 25" style={{width:70,textAlign:"center",background:"var(--brand-bg)",border:"1px solid #0891b2",borderRadius:3,color:"#e0f2fe",fontSize:11,padding:"3px 4px",fontWeight:700}}/>
                            </div>
                            {(parseFloat(item.dimW)>0&&parseFloat(item.dimH)>0)&&(
                              <div style={{background:"#0891b2",color:"#fff",borderRadius:5,padding:"3px 8px",fontSize:10,fontWeight:700}}>
                                {(()=>{
                                  const w=parseFloat(item.dimW)||0,h=parseFloat(item.dimH)||0,u=item.dimUnit||"ft",ru=item.rateUnit||"sq ft";
                                  if(ru==="sq in"){const toIn=u==="ft"?144:u==="cm"?(1/6.4516):u==="m"?1550.0031:1;return(w*h*toIn).toFixed(3)+" sq in";}
                                  const toFt=u==="in"?(1/144):u==="cm"?(1/929.03):u==="m"?10.7639:1;return(w*h*toFt).toFixed(3)+" sq ft";
                                })()} → ₱{Number(item.price).toLocaleString("en-PH",{minimumFractionDigits:2})}
                              </div>
                            )}
                          </div>
                        )}
                      </React.Fragment>
                    );
                  })}
                </div>
              )}
              {/* Add line button */}
              <div style={{padding:"5px 8px",borderTop:"1px dashed var(--brand-border)",background:"rgba(245,158,11,0.04)"}}>
                <button onClick={()=>setQCart(p=>[...p,{sku:"",name:"",price:0,vat:0.12,unit:"piece",category:"",lineId:genLineId(),qty:1,disc:0,dimMode:false,dimW:"",dimH:"",dimUnit:"ft",ratePerSqFt:0,customName:""}])} style={{width:"100%",padding:"5px 0",background:"transparent",border:"1.5px dashed #f59e0b",borderRadius:6,color:"#f59e0b",fontWeight:700,cursor:"pointer",fontSize:11}}>＋ Add Line</button>
              </div>
            </div>

            {/* Totals + Actions */}
            <div style={{borderTop:"2px solid #f59e0b",background:"var(--brand-surface)",flexShrink:0,padding:"10px 14px"}}>
              <div style={{display:"flex",gap:12}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:9,fontWeight:800,color:"#fcd34d",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Notes / Remarks</div>
                  <textarea value={qNotes} onChange={e=>setQNotes(e.target.value)} placeholder="Validity, terms, delivery notes..." style={{width:"100%",padding:"6px 8px",background:"var(--brand-bg)",border:"1px solid var(--brand-border)",borderRadius:5,color:"var(--brand-text)",fontSize:10,resize:"vertical",minHeight:65,outline:"none",fontFamily:"inherit"}}/>
                </div>
                <div style={{width:210,flexShrink:0,fontSize:11}}>
                  <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid var(--brand-border)",color:"var(--brand-muted)"}}><span>Subtotal</span><span style={{fontWeight:600,color:"var(--brand-text)"}}>{peso(qSubtotal)}</span></div>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid var(--brand-border)",color:"var(--brand-muted)"}}>
                    <span style={{display:"flex",alignItems:"center",gap:4}}>VAT
                      <span onClick={()=>setQVatOverride(qVatOverride===null?12:null)} style={{fontSize:9,color:qVatOverride!==null?"#f59e0b":"#888",cursor:"pointer",border:`1px solid ${qVatOverride!==null?"#f59e0b":"#555"}`,borderRadius:3,padding:"0 4px"}}>{qVatOverride!==null?"custom":"per-item"}</span>
                      {qVatOverride!==null&&<input type="number" min="0" max="100" step="0.01" value={qVatOverride} onChange={e=>setQVatOverride(Math.max(0,parseFloat(e.target.value)||0))} style={{width:40,textAlign:"center",background:"var(--brand-bg)",border:"1px solid #f59e0b",borderRadius:3,color:"#f59e0b",fontSize:10,padding:"1px 3px"}}/>}
                    </span>
                    <span style={{fontWeight:600,color:"var(--brand-text)"}}>{peso(qVatTotal)}</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid var(--brand-border)",color:"#f87171"}}>
                    <span style={{display:"flex",alignItems:"center",gap:4}}>Discount <input type="number" min="0" max="100" step="0.01" value={qDiscount} onChange={e=>setQDiscount(Math.min(100,Math.max(0,parseFloat(e.target.value)||0)))} style={{width:36,textAlign:"center",background:"var(--brand-bg)",border:"1px solid var(--brand-border)",borderRadius:3,color:"#f87171",fontSize:10,padding:"1px 3px"}}/>%</span>
                    <span style={{fontWeight:600}}>-{peso(qGlobalDisc)}</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid var(--brand-border)",color:qEwtPct>0?"#f87171":"var(--brand-muted)"}}>
                    <span style={{display:"flex",alignItems:"center",gap:4}}>EWT <input type="number" min="0" max="100" step="0.01" value={qEwtPct} onChange={e=>setQEwtPct(Math.min(100,Math.max(0,parseFloat(e.target.value)||0)))} style={{width:36,textAlign:"center",background:"var(--brand-bg)",border:"1px solid var(--brand-border)",borderRadius:3,color:"#f87171",fontSize:10,padding:"1px 3px"}}/>%</span>
                    <span style={{fontWeight:600}}>{qEwtPct>0?"-"+peso(qEwtAmt):"—"}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",padding:"8px",background:"linear-gradient(135deg,#92400e,#d97706)",borderRadius:5,marginTop:6,color:"#fff",fontWeight:900,fontSize:13}}><span>QUOTE TOTAL</span><span>{peso(qTotal)}</span></div>
                </div>
              </div>
              <div style={{display:"flex",gap:8,marginTop:10}}>
                <button onClick={()=>{if(qCart.length===0||window.confirm("Start a new quotation?")){ setQCart([]);setQDiscount(0);setQSelClient(null);setQVatOverride(null);setQEwtPct(0);setQNotes(""); }}} style={{flex:1,padding:"8px 0",background:"rgba(245,158,11,0.12)",border:"1.5px solid #f59e0b",borderRadius:7,color:"#fcd34d",fontWeight:700,cursor:"pointer",fontSize:12}}>✚ New Quote</button>
                <button onClick={clearQCart} style={{flex:1,padding:"8px 0",background:"rgba(255,255,255,0.05)",border:"1.5px solid var(--brand-border)",borderRadius:7,color:"var(--brand-muted)",fontWeight:700,cursor:"pointer",fontSize:12}}>🗑 Clear</button>
                <button onClick={handleSaveQuote} disabled={qCart.length===0||!qSelClient} style={{flex:2,padding:"8px 0",background:(qCart.length===0||!qSelClient)?"#1e293b":"linear-gradient(135deg,#d97706,#f59e0b)",border:"none",borderRadius:7,color:(qCart.length===0||!qSelClient)?"#475569":"#1a1560",fontWeight:800,cursor:(qCart.length===0||!qSelClient)?"not-allowed":"pointer",fontSize:13,boxShadow:(qCart.length===0||!qSelClient)?"none":"0 2px 12px rgba(245,158,11,0.4)"}}>📄 Preview & Save Quote</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── QUOTATION RECEIPT ────────────────────────────────────────────────────
  if(view==="quotation" && viewQuote && currentQuote) {
    const q = currentQuote;
    const co = q.companySnap||company;
    const numToWordsQ = n => {
      if(!n||n===0) return "ZERO PESOS";
      const ones=["","ONE","TWO","THREE","FOUR","FIVE","SIX","SEVEN","EIGHT","NINE","TEN","ELEVEN","TWELVE","THIRTEEN","FOURTEEN","FIFTEEN","SIXTEEN","SEVENTEEN","EIGHTEEN","NINETEEN"];
      const tens=["","","TWENTY","THIRTY","FORTY","FIFTY","SIXTY","SEVENTY","EIGHTY","NINETY"];
      const toW = x => {
        if(x===0)return "";
        if(x<20)return ones[x]+" ";
        if(x<100)return tens[Math.floor(x/10)]+(x%10?" "+ones[x%10]:" ")+" ";
        return ones[Math.floor(x/100)]+" HUNDRED "+(x%100?toW(x%100):"");
      };
      const pesos=Math.floor(n);const cents=Math.round((n-pesos)*100);
      let w="";
      if(pesos>=1000000)w+=toW(Math.floor(pesos/1000000))+"MILLION ";
      if(pesos>=1000)w+=toW(Math.floor((pesos%1000000)/1000))+"THOUSAND ";
      w+=toW(pesos%1000);
      return w.trim()+" PESOS"+(cents>0?" AND "+toW(cents).trim()+" CENTAVOS":"")+" ONLY";
    };
    const tStyle={borderCollapse:"collapse",width:"100%",fontSize:11};
    const th={background:"#d97706",color:"#fff",padding:"6px 8px",border:"1px solid #d97706",fontWeight:700,fontSize:11};
    const td=(extra={})=>({padding:"6px 8px",border:"1px solid #ccc",verticalAlign:"top",...extra});
    const tdAlt=(extra={})=>({padding:"6px 8px",border:"1px solid #ccc",background:"#fef9ec",verticalAlign:"top",...extra});
    return (
      <div style={{background:"var(--brand-bg)",minHeight:"100vh",paddingTop:16}}>
        <div id="quote-area" style={{fontFamily:"'Roboto','Arial',sans-serif",width:"100%",margin:"0 auto",padding:"20px 28px",background:"#fff",color:"#111"}}>
          {/* Header */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,paddingBottom:14,borderBottom:"3px solid #d97706"}}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              {co.logo&&<img src={co.logo} alt="Logo" style={{height:60,maxWidth:120,objectFit:"contain"}}/>}
              <div>
                <div style={{fontSize:20,fontWeight:900,color:"#d97706",letterSpacing:2,lineHeight:1.1}}>{co.name||"BREEKS"}</div>
                <div style={{fontSize:10,fontWeight:700,color:"#92400e",letterSpacing:2,textTransform:"uppercase",marginTop:2}}>DIGITAL MARKETING SERVICES</div>
                {co.tagline&&<div style={{fontSize:10,color:"#555",marginTop:3}}>{co.tagline}</div>}
                <div style={{fontSize:10,color:"#555",marginTop:3,lineHeight:1.7}}>
                  <div>{co.address}</div>
                  <div>{co.phone}{co.email&&" · "+co.email}</div>
                </div>
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:28,fontWeight:900,color:"#d97706",letterSpacing:3}}>QUOTATION</div>
              <div style={{fontSize:11,color:"#555",marginTop:6,lineHeight:1.9}}>
                <div>Quote No: <b style={{color:"#d97706"}}>{q.quoteNo}</b></div>
                <div>Date: <b>{fmtDate(q.date)}</b></div>
                <div>Valid Until: <b style={{color:"#d97706"}}>{fmtDate(q.validUntil)}</b></div>
              </div>
            </div>
          </div>
          {/* Bill To */}
          <div style={{display:"flex",gap:16,marginBottom:16}}>
            <div style={{flex:1,background:"#fef9ec",borderRadius:6,padding:"10px 14px",border:"1px solid #fde68a"}}>
              <div style={{fontSize:9,fontWeight:800,color:"#92400e",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Quote To</div>
              <div style={{fontWeight:700,fontSize:13,color:"#111"}}>{q.client?.name}</div>
              {q.client?.contact&&<div style={{fontSize:11,color:"#333",marginTop:2}}>{q.client.contact}</div>}
              {q.client?.phone&&<div style={{fontSize:11,color:"#555"}}>{q.client.phone}</div>}
              {q.client?.address&&<div style={{fontSize:11,color:"#555"}}>{q.client.address}</div>}
              {q.client?.tin&&<div style={{fontSize:11,color:"#92400e",fontWeight:600}}>TIN: {q.client.tin}</div>}
            </div>
          </div>
          {/* Items Table */}
          <table style={tStyle}>
            <thead>
              <tr>{["#","Description","Qty","Unit","Unit Price (₱)","Disc %","VAT %","Amount (₱)"].map((h,i)=>(
                <th key={i} style={{...th,textAlign:i<=1?"left":"center",width:i===0?28:i===7?100:undefined}}>{h}</th>
              ))}</tr>
            </thead>
            <tbody>
              {q.cart?.map((item,idx)=>{
                const la=item.price*item.qty*(1-item.disc/100);
                const vatPct=q.vatOverride!==null&&q.vatOverride!==undefined?q.vatOverride:(item.vat*100);
                const R=idx%2===0?td:tdAlt;
                const dimInfo = item.dimMode&&parseFloat(item.dimW)>0&&parseFloat(item.dimH)>0?(()=>{
                  const w=parseFloat(item.dimW)||0,h=parseFloat(item.dimH)||0,u=item.dimUnit||"ft",ru=item.rateUnit||"sq ft";
                  if(ru==="sq in"){const toIn=u==="ft"?144:u==="cm"?(1/6.4516):u==="m"?1550.0031:1;return`${w}×${h} ${u} = ${(w*h*toIn).toFixed(3)} sq in @ ₱${item.ratePerSqFt}/sq in`;}
                  const toFt=u==="in"?(1/144):u==="cm"?(1/929.03):u==="m"?10.7639:1;
                  return`${w}×${h} ${u} = ${(w*h*toFt).toFixed(3)} sq ft @ ₱${item.ratePerSqFt}/sq ft`;
                })():null;
                return(
                  <tr key={item.lineId||item.sku+idx}>
                    <td style={R({textAlign:"center",color:"#888"})}>{idx+1}</td>
                    <td style={R()}><div style={{fontWeight:700}}>{item.customName||item.name}</div>{item.customName&&<div style={{fontSize:9,color:"#555",fontStyle:"italic"}}>{item.name}</div>}<div style={{fontSize:9,color:"#888"}}>{item.sku}</div>{dimInfo&&<div style={{fontSize:9,color:"#0891b2",marginTop:2}}>📐 {dimInfo}</div>}</td>
                    <td style={R({textAlign:"center"})}>{item.qty}</td>
                    <td style={R({textAlign:"center",color:"#555"})}>{item.unit}</td>
                    <td style={R({textAlign:"right"})}>{Number(item.price).toLocaleString("en-PH",{minimumFractionDigits:2})}</td>
                    <td style={R({textAlign:"center",color:"#c00"})}>{item.disc>0?item.disc+"%":"—"}</td>
                    <td style={R({textAlign:"center",color:"#1a6b3a"})}>{vatPct>0?vatPct+"%":"0%"}</td>
                    <td style={R({textAlign:"right",fontWeight:700})}>{Number(la).toLocaleString("en-PH",{minimumFractionDigits:2})}</td>
                  </tr>
                );
              })}
              {(q.cart?.length||0)<8&&Array.from({length:8-(q.cart?.length||0)}).map((_,i)=>(
                <tr key={"eq"+i}><td style={td()}>&nbsp;</td><td style={td()}></td><td style={td()}></td><td style={td()}></td><td style={td()}></td><td style={td()}></td><td style={td()}></td><td style={td()}></td></tr>
              ))}
            </tbody>
          </table>
          {/* Summary */}
          <div style={{display:"flex",gap:16,marginTop:0}}>
            <div style={{flex:1}}>
              <table style={{...tStyle,marginTop:0}}>
                <tbody>
                  <tr><td style={{...td(),borderTop:"none",paddingTop:10,verticalAlign:"top"}}>
                    <div style={{fontSize:10,fontWeight:700,color:"#92400e",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Notes / Terms</div>
                    <div style={{fontSize:11,color:"#333",minHeight:48,whiteSpace:"pre-wrap"}}>{q.notes||<span style={{color:"#aaa",fontStyle:"italic"}}>—</span>}</div>
                  </td></tr>
                  <tr><td style={{...td(),paddingTop:10}}>
                    <div style={{fontSize:10,fontWeight:700,color:"#92400e",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Payment Details</div>
                    <div style={{fontSize:11,color:"#333"}}>{co.bank}</div>
                  </td></tr>
                </tbody>
              </table>
            </div>
            <div style={{width:300,flexShrink:0}}>
              <table style={{...tStyle,marginTop:0}}>
                <tbody>
                  <tr><td style={tdAlt({fontWeight:600})}>Subtotal</td><td style={tdAlt({textAlign:"right",fontWeight:600})}>{Number(q.subtotal).toLocaleString("en-PH",{minimumFractionDigits:2})}</td></tr>
                  {(q.discount||0)>0?<tr><td style={td({color:"#c00"})}>Less: Discount ({q.discount}%)</td><td style={td({textAlign:"right",color:"#c00"})}>-{Number(q.globalDisc).toLocaleString("en-PH",{minimumFractionDigits:2})}</td></tr>:<tr><td style={td()}>Less: Discounts</td><td style={td({textAlign:"right"})}>0.00</td></tr>}
                  <tr><td style={tdAlt()}>VAT</td><td style={tdAlt({textAlign:"right"})}>{Number(q.vatTotal||0).toLocaleString("en-PH",{minimumFractionDigits:2})}</td></tr>
                  {(q.ewtPct||0)>0&&<tr><td style={td({color:"#c00"})}>Less: EWT ({q.ewtPct}%)</td><td style={td({textAlign:"right",color:"#c00"})}>-{Number(q.ewtAmt||0).toLocaleString("en-PH",{minimumFractionDigits:2})}</td></tr>}
                  <tr><td style={{background:"#d97706",color:"#fff",fontWeight:900,fontSize:14,padding:"10px 8px",border:"1px solid #d97706"}}>TOTAL AMOUNT (₱)</td><td style={{background:"#d97706",color:"#fff",fontWeight:900,fontSize:14,padding:"10px 8px",border:"1px solid #d97706",textAlign:"right"}}>{Number(q.total||0).toLocaleString("en-PH",{minimumFractionDigits:2})}</td></tr>
                </tbody>
              </table>
            </div>
          </div>
          <div style={{marginTop:12,background:"#fef9ec",border:"1px solid #fde68a",borderRadius:4,padding:"8px 14px",fontSize:11}}>
            <span style={{fontWeight:700,color:"#92400e",marginRight:8}}>Amount in Words:</span>
            <span style={{fontStyle:"italic",color:"#333"}}>{numToWordsQ(q.total||0)}</span>
          </div>
          {/* Signatories */}
          <div style={{marginTop:24,borderTop:"1px solid #ccc",paddingTop:12}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#555",gap:16}}>
              {[["preparedBy","Prepared by"],["checkedBy","Checked by"],["receivedBy","Received by"]].map(([key,label])=>(
                <div key={key} style={{flex:1,textAlign:"center"}}>
                  <div style={{marginBottom:6,minHeight:32,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
                    <span style={{fontWeight:700,fontSize:12,color:"#d97706",borderBottom:"1px solid #d97706",minWidth:140,display:"inline-block",textAlign:"center",paddingBottom:2}}>{qSignatories[key]||" "}</span>
                  </div>
                  <div style={{fontSize:10,color:"#555",fontWeight:600}}>{label}</div>
                  <input className="no-print" type="text" value={qSignatories[key]} onChange={e=>setQSignatories(s=>({...s,[key]:e.target.value}))} placeholder={"Enter name"} style={{marginTop:6,width:"100%",padding:"4px 8px",border:"1px solid #fde68a",borderRadius:4,fontSize:11,color:"#333",outline:"none",textAlign:"center",fontFamily:"inherit"}}/>
                </div>
              ))}
            </div>
          </div>
          <div style={{textAlign:"center",marginTop:14,fontSize:9,color:"#aaa"}}>This is a computer-generated quotation. This quote is valid for {qValidDays} days from date of issue. · {co.name}</div>
        </div>
        {/* Action Buttons */}
        <div className="no-print" style={{textAlign:"center",padding:20,background:"#0f172a",display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
          <button onClick={()=>{
            const el=document.getElementById("quote-area");
            const filename=(q.quoteNo||"quote")+"_"+(q.client?.name||"").replace(/\s+/g,"_")+".pdf";
            const opt={margin:[5,5,5,5],filename,image:{type:"jpeg",quality:0.98},html2canvas:{scale:2,useCORS:true,letterRendering:true,scrollY:0},jsPDF:{unit:"mm",format:"a4",orientation:"portrait"},pagebreak:{mode:["avoid-all","css","legacy"]}};
            window.html2pdf().set(opt).from(el).save();
          }} style={{padding:"11px 24px",background:"linear-gradient(135deg,#d97706,#f59e0b)",color:"#1a1560",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:14}}>⬇️ Download PDF</button>
          <button onClick={()=>window.print()} style={{padding:"11px 24px",background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:14}}>🖨️ Print</button>
          <button onClick={()=>{
            if(window.confirm("Convert this quotation to an Invoice? A new invoice will be added to history.")){
              const no="INV-"+String(invCounter).padStart(4,"0");
              setInvCounter(c=>c+1);
              const resolvedDue=new Date(q.validUntil).toISOString();
              const inv={invoiceNo:no,date:new Date().toISOString(),dueDate:resolvedDue,client:q.client,cart:[...q.cart],discount:q.discount,vatOverride:q.vatOverride,ewtPct:q.ewtPct,ewtAmt:q.ewtAmt,subtotal:q.subtotal,vatTotal:q.vatTotal,globalDisc:q.globalDisc,total:q.total,notes:(q.notes||"")+(q.notes?"\n":"")+"[Converted from "+q.quoteNo+"]",status:"Unpaid",companySnap:{...q.companySnap},signatories:{...qSignatories}};
              setHistory(h=>[inv,...h]);
              // Write normalized salesItems rows
              const convertedItems=(q.cart||[]).map((item,idx)=>({invoiceNo:no,lineNo:idx+1,sku:item.sku||"",name:item.customName||item.name,qty:item.qty,unit:item.unit||"",price:item.price,disc:item.disc||0,subtotal:parseFloat((item.price*item.qty*(1-(item.disc||0)/100)).toFixed(4))}));
              setSalesItems(prev=>[...convertedItems,...prev]);
              setQuoteHistory(qs=>qs.map(x=>x.quoteNo===q.quoteNo?{...x,status:"Converted",convertedTo:no}:x));
              setCurrentInv(inv);
              setViewQuote(false);
              showBadge();
              alert("Invoice "+no+" created!");
              setView("receipt");
            }
          }} style={{padding:"11px 24px",background:"#22c55e",color:"#fff",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:14}}>🧾 Convert to Invoice</button>
          <button onClick={()=>{setViewQuote(false);}} style={{padding:"11px 24px",background:"#334155",color:"#f1f5f9",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:14}}>← Back to Quote</button>
        </div>
      </div>
    );
  }

  if(view==="history") {
    // ── Filter logic ──
    const histFiltered = history.filter(inv => {
      if(hStatusFilter==="Overdue") {
        if(!(inv.status==="Unpaid" && inv.dueDate && new Date(inv.dueDate)<new Date())) return false;
      } else if(hStatusFilter!=="All" && inv.status!==hStatusFilter) return false;
      if(hClientFilter!=="All" && (inv.client?.name||"")!==hClientFilter) return false;
      if(hSearch && !(inv.invoiceNo||"").toLowerCase().includes(hSearch.toLowerCase()) && !(inv.client?.name||"").toLowerCase().includes(hSearch.toLowerCase())) return false;
      if(hDateFrom && new Date(inv.date)<new Date(hDateFrom)) return false;
      if(hDateTo   && new Date(inv.date)>new Date(hDateTo+"T23:59:59")) return false;
      return true;
    });
    const clientNames = ["All", ...Array.from(new Set(history.map(i=>i.client?.name).filter(Boolean))).sort()];
    const filteredTotal   = histFiltered.filter(i=>i.status!=="VOID").reduce((s,i)=>s+(i.total||0),0);
    const filteredPaid    = histFiltered.filter(i=>i.status==="Paid").reduce((s,i)=>s+(i.total||0),0);
    const filteredUnpaid  = histFiltered.filter(i=>i.status==="Unpaid").reduce((s,i)=>s+(i.total||0),0);

    // ── Payment helper ──
    const invPayments = inv => payments.filter(p=>p.invoiceNo===inv.invoiceNo);
    const amountPaid  = inv => invPayments(inv).reduce((s,p)=>s+(p.amount||0),0);
    const balance     = inv => (inv.total||0) - amountPaid(inv);

    return (
    <div style={{minHeight:"100vh",background:"var(--brand-bg)"}}>
      {badge&&<div className="save-badge">✅ Saved to Google Drive</div>}
      {syncStatus&&<div className={`sync-indicator sync-${syncStatus}`}>{syncStatus==='saving'?'☁️ Saving...':syncStatus==='saved'?'✅ Saved to Drive':'❌ Sync Error'}</div>}

      {/* ── Header ── */}
      <div style={{background:"linear-gradient(135deg,var(--brand-purple-dark),var(--brand-purple))",padding:"12px 20px",display:"flex",alignItems:"center",gap:12,borderBottom:"2px solid var(--brand-cyan)",flexWrap:"wrap"}}>
        <button onClick={()=>setView("pos")} className="nav-btn" style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",color:"#fff",borderRadius:7,padding:"7px 14px",fontWeight:700,fontSize:13}}>← POS</button>
        <div style={{fontWeight:800,fontSize:16,color:"#fff"}}>📋 Invoice History</div>
        <button onClick={()=>setView("ledger")} className="nav-btn" style={{background:"rgba(0,196,212,0.15)",border:"1px solid var(--brand-cyan)",color:"var(--brand-cyan)",borderRadius:7,padding:"7px 14px",fontWeight:700,fontSize:12}}>📒 Client Ledger</button>
        <div style={{marginLeft:"auto",fontSize:12,color:"#64748b"}}>{histFiltered.length}/{history.length} shown</div>
        <button onClick={handleExportSheet} style={{background:"#22c55e",border:"none",color:"#fff",borderRadius:7,padding:"7px 14px",cursor:"pointer",fontSize:12,fontWeight:700}}>{exportMsg||(isGAS()?"📊 Export to Sheet":"📥 Download CSV")}</button>
        {history.length>0&&<button onClick={()=>{if(window.confirm("Clear all history?"))setHistory([]);}} style={{background:"#ef444420",border:"1px solid #ef4444",color:"#ef4444",borderRadius:7,padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>🗑 Clear All</button>}
      </div>

      {/* ── Filter Bar ── */}
      <div style={{background:"var(--brand-surface)",borderBottom:"1px solid var(--brand-border)",padding:"10px 20px",display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
        <input value={hSearch} onChange={e=>setHSearch(e.target.value)} placeholder="🔍 Search invoice # or client…" style={{flex:"1 1 180px",padding:"7px 10px",background:"var(--brand-bg)",border:"1px solid var(--brand-border)",borderRadius:7,color:"var(--brand-text)",fontSize:12,outline:"none"}}/>
        <select value={hStatusFilter} onChange={e=>setHStatusFilter(e.target.value)} style={{padding:"7px 10px",background:"var(--brand-bg)",border:"1px solid var(--brand-border)",borderRadius:7,color:"var(--brand-text)",fontSize:12,outline:"none",cursor:"pointer"}}>
          {["All","Unpaid","Paid","Overdue","VOID"].map(s=><option key={s} value={s}>{s==="All"?"All Statuses":s==="Overdue"?"⚠ Overdue":s}</option>)}
        </select>
        <select value={hClientFilter} onChange={e=>setHClientFilter(e.target.value)} style={{padding:"7px 10px",background:"var(--brand-bg)",border:"1px solid var(--brand-border)",borderRadius:7,color:"var(--brand-text)",fontSize:12,outline:"none",cursor:"pointer",maxWidth:200}}>
          {clientNames.map(n=><option key={n} value={n}>{n==="All"?"All Clients":n}</option>)}
        </select>
        <div style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"var(--brand-muted)"}}>
          <span>From</span>
          <input type="date" value={hDateFrom} onChange={e=>setHDateFrom(e.target.value)} style={{padding:"6px 8px",background:"var(--brand-bg)",border:"1px solid var(--brand-border)",borderRadius:7,color:"var(--brand-text)",fontSize:11,outline:"none",colorScheme:"dark"}}/>
          <span>To</span>
          <input type="date" value={hDateTo} onChange={e=>setHDateTo(e.target.value)} style={{padding:"6px 8px",background:"var(--brand-bg)",border:"1px solid var(--brand-border)",borderRadius:7,color:"var(--brand-text)",fontSize:11,outline:"none",colorScheme:"dark"}}/>
        </div>
        {(hSearch||hStatusFilter!=="All"||hClientFilter!=="All"||hDateFrom||hDateTo)&&(
          <button onClick={()=>{setHSearch("");setHStatusFilter("All");setHClientFilter("All");setHDateFrom("");setHDateTo("");}} style={{padding:"6px 12px",background:"#ef444420",border:"1px solid #ef4444",color:"#ef4444",borderRadius:7,fontSize:11,cursor:"pointer",fontWeight:700}}>✕ Clear</button>
        )}
      </div>

      {/* ── Summary Strip ── */}
      {histFiltered.length>0&&<div style={{background:"var(--brand-surface2)",borderBottom:"1px solid var(--brand-border)",padding:"8px 20px",display:"flex",gap:24,flexWrap:"wrap",fontSize:11}}>
        <span style={{color:"var(--brand-muted)"}}>Showing <b style={{color:"#fff"}}>{histFiltered.length}</b> invoice{histFiltered.length!==1?"s":""}</span>
        <span>Total: <b style={{color:"var(--brand-cyan)"}}>{peso(filteredTotal)}</b></span>
        <span>Paid: <b style={{color:"#22c55e"}}>{peso(filteredPaid)}</b></span>
        <span>Outstanding: <b style={{color:"#f59e0b"}}>{peso(filteredUnpaid)}</b></span>
      </div>}

      {/* ── List ── */}
      <div style={{padding:20,maxWidth:920,margin:"0 auto"}}>
        {history.length===0
          ? <div style={{textAlign:"center",padding:60,color:"#475569"}}><div style={{fontSize:40,marginBottom:10}}>📭</div><div>No invoices yet.</div></div>
          : histFiltered.length===0
          ? <div style={{textAlign:"center",padding:60,color:"#475569"}}><div style={{fontSize:36,marginBottom:10}}>🔍</div><div>No invoices match your filters.</div></div>
          : histFiltered.map((inv,i)=>{
            const isVoid = inv.status==="VOID";
            const statusColors = { Unpaid:{bg:"#f59e0b20",color:"#f59e0b"}, Paid:{bg:"#22c55e20",color:"#22c55e"}, VOID:{bg:"#ef444420",color:"#ef4444"} };
            const sc = statusColors[inv.status]||{bg:"#64748b20",color:"#64748b"};
            const paid   = amountPaid(inv);
            const bal    = balance(inv);
            const pInvs  = invPayments(inv);
            const overdue= inv.status==="Unpaid" && inv.dueDate && new Date(inv.dueDate)<new Date();
            return(
            <div key={i} style={{background:"var(--brand-surface)",border:`1px solid ${isVoid?"#ef444440":overdue?"#f59e0b60":"var(--brand-border)"}`,borderRadius:12,padding:"14px 18px",marginBottom:10,opacity:isVoid?0.6:1}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
                {/* Left: info */}
                <div style={{flex:1,minWidth:200}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap"}}>
                    <span style={{fontWeight:800,color:isVoid?"#64748b":"var(--brand-cyan)",fontSize:14,textDecoration:isVoid?"line-through":"none"}}>{inv.invoiceNo}</span>
                    <span style={{background:sc.bg,color:sc.color,fontSize:10,padding:"2px 8px",borderRadius:10,fontWeight:700}}>{inv.status}</span>
                    {overdue&&<span style={{background:"#ef444420",color:"#ef4444",fontSize:10,padding:"2px 8px",borderRadius:10,fontWeight:700}}>⚠ Overdue</span>}
                  </div>
                  <div style={{fontSize:12,color:"#f1f5f9",fontWeight:600}}>{inv.client?.name}</div>
                  <div style={{fontSize:11,color:"#64748b"}}>{fmtDate(inv.date)} · {inv.cart.length} item{inv.cart.length!==1?"s":""}</div>
                </div>

                {/* Middle: amounts */}
                <div style={{textAlign:"right",minWidth:130}}>
                  <div style={{fontSize:17,fontWeight:900,color:isVoid?"#64748b":"var(--brand-cyan)",textDecoration:isVoid?"line-through":"none"}}>{peso(inv.total)}</div>
                  {pInvs.length>0&&!isVoid&&(<>
                    <div style={{fontSize:10,color:"#22c55e",fontWeight:700}}>Paid: {peso(paid)}</div>
                    <div style={{fontSize:10,color:bal>0?"#f59e0b":"#22c55e",fontWeight:700}}>Balance: {peso(bal)}</div>
                  </>)}
                  <div style={{fontSize:11,color:"#64748b",display:"flex",alignItems:"center",gap:4,justifyContent:"flex-end"}}>Due
                    <input type="date" value={inv.dueDate?new Date(inv.dueDate).toISOString().slice(0,10):""} onChange={e=>{if(e.target.value)setHistory(h=>h.map((x,j)=>x.invoiceNo===inv.invoiceNo?{...x,dueDate:new Date(e.target.value).toISOString()}:x));}}
                      style={{background:"transparent",border:"none",borderBottom:"1px dashed #64748b",color:"#94a3b8",fontSize:11,padding:"0 2px",fontFamily:"inherit",outline:"none",cursor:"pointer",colorScheme:"dark",width:110}}/>
                  </div>
                </div>

                {/* Right: actions */}
                <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"flex-start"}}>
                  <button onClick={()=>{const paid2=payments.filter(p=>p.invoiceNo===inv.invoiceNo).reduce((s,p)=>s+(p.amount||0),0);const bal2=(inv.total||0)-paid2;setPmForm({amount:bal2>0?bal2.toFixed(2):"",method:"Cash",ref:"",date:new Date().toISOString().slice(0,10)});setShowPayModal(inv.invoiceNo);}} style={{background:"#22c55e20",border:"1px solid #22c55e",color:"#4ade80",borderRadius:7,padding:"7px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>💳 Pay</button>
                  <button onClick={()=>{setCurrentInv(inv);setView("receipt");}} style={{background:"#3b82f620",border:"1px solid #3b82f6",color:"#60a5fa",borderRadius:7,padding:"7px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>👁 View</button>
                  <button onClick={()=>{const ei={...inv,editCart:inv.cart.map(item=>item.lineId?item:{...item,lineId:'line_'+Date.now()+'_'+Math.random().toString(36).slice(2,7)}),editDiscount:inv.discount,editVatOverride:inv.vatOverride??null,editEwtPct:inv.ewtPct??0,editClient:inv.client,editNotes:inv.notes||""};setShowPicker(false);setEditInv(ei);setTimeout(()=>setView("edit_invoice"),50);}} style={{background:"#a855f720",border:"1px solid #a855f7",color:"#c084fc",borderRadius:7,padding:"7px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>✏️ Edit</button>
                  <button onClick={()=>{
                    const newNo="INV-"+String(invCounter).padStart(4,"0");
                    setInvCounter(c=>c+1);
                    const dup={...inv,invoiceNo:newNo,date:new Date().toISOString(),dueDate:new Date(Date.now()+30*86400000).toISOString(),status:"Unpaid"};
                    setHistory(h=>[dup,...h]);
                    // Write salesItems for duplicated invoice
                    const dupItems=(inv.cart||[]).map((item,idx)=>({invoiceNo:newNo,lineNo:idx+1,sku:item.sku||"",name:item.customName||item.name,qty:item.qty,unit:item.unit||"",price:item.price,disc:item.disc||0,subtotal:parseFloat((item.price*item.qty*(1-(item.disc||0)/100)).toFixed(4))}));
                    setSalesItems(prev=>[...dupItems,...prev]);
                    setShowPicker(false);
                    const ei={...dup,editCart:dup.cart.map(item=>item.lineId?item:{...item,lineId:'line_'+Date.now()+'_'+Math.random().toString(36).slice(2,7)}),editDiscount:dup.discount,editVatOverride:dup.vatOverride??null,editEwtPct:dup.ewtPct??0,editClient:dup.client,editNotes:dup.notes||""};
                    setEditInv(ei);
                    setTimeout(()=>setView("edit_invoice"),50);
                  }} style={{background:"#0ea5e920",border:"1px solid #0ea5e9",color:"#38bdf8",borderRadius:7,padding:"7px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>⧉ Dup</button>
                  <button onClick={()=>{const newStatus=isVoid?"Unpaid":"VOID";const label=isVoid?"Restore this invoice?":"Mark as VOID?";if(window.confirm(label))setHistory(h=>h.map((x,j)=>j===i?{...x,status:newStatus}:x));}} style={{background:isVoid?"#22c55e20":"#f59e0b20",border:`1px solid ${isVoid?"#22c55e":"#f59e0b"}`,color:isVoid?"#22c55e":"#f59e0b",borderRadius:7,padding:"7px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>{isVoid?"↩ Restore":"⚠ Void"}</button>
                  <button onClick={()=>{if(window.confirm("Permanently delete invoice "+inv.invoiceNo+"?"))setHistory(h=>h.filter((_,j)=>j!==i));}} style={{background:"#ef444420",border:"1px solid #ef4444",color:"#ef4444",borderRadius:7,padding:"7px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>🗑</button>
                </div>
              </div>

              {/* Payment mini-ledger inline */}
              {pInvs.length>0&&!isVoid&&(
                <div style={{marginTop:10,paddingTop:8,borderTop:"1px dashed var(--brand-border)"}}>
                  <div style={{fontSize:10,fontWeight:700,color:"var(--brand-muted)",textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>Payment History</div>
                  {pInvs.map((p,pi)=>(
                    <div key={pi} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:11,padding:"3px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                      <span style={{color:"#94a3b8"}}>{fmtDate(p.date)} · {p.method||"Cash"} {p.ref?`· Ref: ${p.ref}`:""}</span>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{color:"#22c55e",fontWeight:700}}>{peso(p.amount)}</span>
                        <button onClick={()=>setPayments(prev=>prev.filter(x=>x.id!==p.id&&!(x.invoiceNo===p.invoiceNo&&x.date===p.date&&x.amount===p.amount)))} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:10,padding:"0 3px",lineHeight:1}}>✕</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>);
          })
        }
      </div>

      {/* ── Payment Modal ── */}
      {showPayModal&&(()=>{
        const inv = history.find(x=>x.invoiceNo===showPayModal);
        if(!inv) return null;
        const paid = payments.filter(p=>p.invoiceNo===inv.invoiceNo).reduce((s,p)=>s+(p.amount||0),0);
        const bal  = (inv.total||0) - paid;
        return (
          <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowPayModal(null)}>
            <div className="modal-box" style={{maxWidth:400}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <div style={{fontWeight:800,fontSize:15,color:"#f1f5f9"}}>💳 Record Payment</div>
                <button onClick={()=>setShowPayModal(null)} style={{background:"#334155",border:"none",color:"#94a3b8",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:16}}>✕</button>
              </div>
              <div style={{background:"var(--brand-bg)",borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:12}}>
                <div style={{color:"var(--brand-muted)",fontWeight:600}}>{inv.invoiceNo} · {inv.client?.name}</div>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
                  <span style={{color:"#94a3b8"}}>Invoice Total:</span><span style={{fontWeight:700,color:"#fff"}}>{peso(inv.total)}</span>
                </div>
                {paid>0&&<div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
                  <span style={{color:"#94a3b8"}}>Already Paid:</span><span style={{fontWeight:700,color:"#22c55e"}}>{peso(paid)}</span>
                </div>}
                <div style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid var(--brand-border)",marginTop:6,paddingTop:6}}>
                  <span style={{color:"#94a3b8"}}>Balance:</span><span style={{fontWeight:900,color:bal>0?"#f59e0b":"#22c55e",fontSize:14}}>{peso(bal)}</span>
                </div>
              </div>
              <div style={{marginBottom:10}}>
                <div className="form-label">Amount (₱)</div>
                <input className="form-input" type="number" min="0" step="0.01" value={pmForm.amount} onChange={e=>setPmForm(p=>({...p,amount:e.target.value}))} placeholder="0.00"/>
              </div>
              <div style={{display:"flex",gap:10,marginBottom:10}}>
                <div style={{flex:1}}>
                  <div className="form-label">Method</div>
                  <select className="form-input" value={pmForm.method} onChange={e=>setPmForm(p=>({...p,method:e.target.value}))}>
                    {["Cash","Bank Transfer","GCash","Maya","Cheque","Other"].map(m=><option key={m}>{m}</option>)}
                  </select>
                </div>
                <div style={{flex:1}}>
                  <div className="form-label">Date</div>
                  <input className="form-input" type="date" value={pmForm.date} onChange={e=>setPmForm(p=>({...p,date:e.target.value}))} style={{colorScheme:"dark"}}/>
                </div>
              </div>
              <div style={{marginBottom:14}}>
                <div className="form-label">Reference No. (optional)</div>
                <input className="form-input" type="text" value={pmForm.ref} onChange={e=>setPmForm(p=>({...p,ref:e.target.value}))} placeholder="Transaction / cheque no."/>
              </div>
              <button onClick={()=>{
                const amt = parseFloat(pmForm.amount);
                if(!amt||amt<=0){alert("Enter a valid amount.");return;}
                const payRec = {id:"pay_"+Date.now()+"_"+Math.random().toString(36).slice(2,7),invoiceNo:inv.invoiceNo,amount:amt,method:pmForm.method,ref:pmForm.ref,date:pmForm.date?new Date(pmForm.date).toISOString():new Date().toISOString()};
                setPayments(prev=>[...prev,payRec]);
                const newPaid = paid + amt;
                if(newPaid>=(inv.total||0)-0.01 && inv.status==="Unpaid") {
                  setHistory(h=>h.map(x=>x.invoiceNo===inv.invoiceNo?{...x,status:"Paid"}:x));
                }
                showBadge();
                setShowPayModal(null);
              }} style={{width:"100%",padding:"11px 0",background:"linear-gradient(135deg,#22c55e,#16a34a)",border:"none",borderRadius:8,color:"#fff",fontWeight:800,cursor:"pointer",fontSize:14}}>
                ✅ Record Payment
              </button>
            </div>
          </div>
        );
      })()}
    </div>
  );}

  // ── CLIENT LEDGER & SOA ───────────────────────────────────────────────────
  if(view==="ledger") {
    // ledgerClient, soaMonth, ledgerSearch are declared at top-level (Rules of Hooks)

    // Build per-client summary
    const ledgerData = clients.map(c => {
      const cInvs   = history.filter(inv=>inv.client?.name===c.name && inv.status!=="VOID");
      const cPays   = payments.filter(p=>cInvs.some(inv=>inv.invoiceNo===p.invoiceNo));
      const total   = cInvs.reduce((s,inv)=>s+(inv.total||0),0);
      const paid    = cPays.reduce((s,p)=>s+(p.amount||0),0);
      const balance = total - paid;
      const overdue = cInvs.some(inv=>inv.status==="Unpaid"&&inv.dueDate&&new Date(inv.dueDate)<new Date());
      return {...c, invoices:cInvs.length, total, paid, balance, overdue, cInvs, cPays};
    }).filter(c=>c.invoices>0||ledgerSearch).sort((a,b)=>b.balance-a.balance);

    const filtered = ledgerSearch
      ? ledgerData.filter(c=>c.name.toLowerCase().includes(ledgerSearch.toLowerCase()))
      : ledgerData;

    const totalOutstanding = ledgerData.reduce((s,c)=>s+Math.max(0,c.balance),0);
    const totalCollected   = ledgerData.reduce((s,c)=>s+c.paid,0);

    // SOA generator for selected client
    const soaClient = ledgerClient ? ledgerData.find(c=>c.id===ledgerClient.id) : null;
    const months    = soaClient ? ["All",...Array.from(new Set(soaClient.cInvs.map(inv=>new Date(inv.date).toLocaleDateString("en-PH",{month:"short",year:"numeric"})))).sort()] : [];
    const soaInvs   = soaClient ? (soaMonth==="All" ? soaClient.cInvs : soaClient.cInvs.filter(inv=>new Date(inv.date).toLocaleDateString("en-PH",{month:"short",year:"numeric"})===soaMonth)) : [];

    const generateSOA = () => {
      if(!soaClient) return;
      const co = company;
      const fmt  = n => "₱" + Number(n).toLocaleString("en-PH",{minimumFractionDigits:2,maximumFractionDigits:2});
      const fmtD = d => new Date(d).toLocaleDateString("en-PH",{month:"short",day:"2-digit",year:"numeric"});
      let runBal = 0;
      const invRows = [...soaInvs].sort((a,b)=>new Date(a.date)-new Date(b.date)).map(inv => {
        const invPays = payments.filter(p=>p.invoiceNo===inv.invoiceNo);
        const paidAmt = invPays.reduce((s,p)=>s+(p.amount||0),0);
        const bal     = (inv.total||0) - paidAmt;
        runBal += bal;
        const isUnpaid = inv.status !== "Paid" && inv.status !== "VOID";
        const isVoid   = inv.status === "VOID";
        const lineRows = (inv.cart||[]).map(item => {
          const lineAmt = item.price * item.qty * (1 - (item.disc||0)/100);
          const dimStr  = item.dimMode && item.dimW && item.dimH
            ? `<div style="font-size:9px;color:#0891b2;margin-top:1px">📐 ${item.dimW}×${item.dimH}${item.dimUnit||"ft"} @ ₱${item.ratePerSqFt}/${item.rateUnit||"sq ft"}</div>`
            : "";
          const skuStr  = item.sku ? `<div style="font-size:9px;color:#94a3b8;margin-top:1px">${item.sku}</div>` : "";
          const noteStr = item.lineNote ? `<div style="font-size:9px;color:#78350f;font-style:italic;margin-top:1px">📝 ${item.lineNote}</div>` : "";
          const vatPct  = item.vat > 0 ? (item.vat*100).toFixed(0)+"%" : (inv.vatOverride!==null&&inv.vatOverride!==undefined&&inv.vatOverride>0 ? inv.vatOverride+"%" : "0%");
          const discStr = (item.disc||0) > 0 ? item.disc+"%" : "—";
          return `<tr>
              <td style="padding:7px 10px;border-bottom:1px solid #e8edf6;vertical-align:top">
                <div style="font-weight:600;font-size:11px;color:#111">${item.customName||item.name}${item.customName?`<span style="font-size:9px;color:#888;margin-left:4px">(${item.name})</span>`:""}</div>
                ${skuStr}${dimStr}${noteStr}
              </td>
              <td style="padding:7px 10px;border-bottom:1px solid #e8edf6;text-align:center;font-size:11px">${item.qty}</td>
              <td style="padding:7px 10px;border-bottom:1px solid #e8edf6;text-align:center;font-size:11px;color:#555">${item.unit||"piece"}</td>
              <td style="padding:7px 10px;border-bottom:1px solid #e8edf6;text-align:right;font-size:11px">${fmt(item.price)}</td>
              <td style="padding:7px 10px;border-bottom:1px solid #e8edf6;text-align:center;font-size:11px;color:#555">${discStr}</td>
              <td style="padding:7px 10px;border-bottom:1px solid #e8edf6;text-align:center;font-size:11px;color:#555">${vatPct}</td>
              <td style="padding:7px 10px;border-bottom:1px solid #e8edf6;text-align:right;font-size:11px;font-weight:700">${fmt(lineAmt)}</td>
            </tr>`;
        }).join("");
        const notesRow = inv.notes ? `<tr><td colspan="7" style="padding:5px 10px 8px;font-size:9px;color:#78350f;font-style:italic;border-bottom:1px solid #e8edf6;background:#fffdf0">📝 ${inv.notes}</td></tr>` : "";
        const payNotes = invPays.length > 0 ? invPays.map(p=>`<tr><td colspan="7" style="padding:3px 10px 5px;font-size:9px;color:#166534;border-bottom:1px solid #e8edf6;background:#f0fdf4">✅ Payment: ${fmtD(p.date)} · ${p.method||"Cash"}${p.ref?" · Ref: "+p.ref:""} · ${fmt(p.amount)}</td></tr>`).join("") : "";
        const statusBadge = isVoid
          ? `<span style="background:#fee2e2;color:#991b1b;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700">VOID</span>`
          : isUnpaid ? `<span style="background:#fef3c7;color:#92400e;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700">Unpaid</span>`
          : `<span style="background:#dcfce7;color:#166534;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700">Paid</span>`;
        const outstandingRow = isUnpaid && !isVoid ? `
          <tr style="background:#fefce8"><td colspan="6" style="padding:6px 10px;font-size:11px;font-weight:700;color:#b45309">⚠ OUTSTANDING — Payment pending</td><td style="padding:6px 10px;text-align:right;font-size:11px;font-weight:900;color:#b45309">${fmt(bal)}</td></tr>
          <tr style="background:#fefce8"><td colspan="6" style="padding:4px 10px 8px;font-size:11px;font-weight:600;color:#92400e">Running Balance</td><td style="padding:4px 10px 8px;text-align:right;font-size:11px;font-weight:900;color:#d97706">${fmt(runBal)}</td></tr>`
          : paidAmt > 0 ? `<tr style="background:#f0fdf4"><td colspan="6" style="padding:4px 10px 8px;font-size:11px;font-weight:600;color:#166534">✅ Paid · Running Balance</td><td style="padding:4px 10px 8px;text-align:right;font-size:11px;font-weight:900;color:#166534">${fmt(runBal)}</td></tr>` : "";
        return `<div style="margin-bottom:24px;border:1px solid #d1d9ef;border-radius:8px;overflow:hidden;page-break-inside:avoid">
          <div style="background:#2d2080;color:#fff;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
            <span style="font-size:15px;font-weight:900;letter-spacing:1px">${inv.invoiceNo}</span>
            <div style="display:flex;gap:16px;font-size:11px;align-items:center">
              <span>Date: <b>${fmtD(inv.date)}</b></span>
              ${inv.dueDate?`<span>Due: <b>${fmtD(inv.dueDate)}</b></span>`:""}
              ${statusBadge}
            </div>
          </div>
          <table style="width:100%;border-collapse:collapse">
            <thead><tr style="background:#eeedf8">
              <th style="padding:6px 10px;text-align:left;font-size:10px;font-weight:800;color:#2d2080;text-transform:uppercase;width:38%">Description</th>
              <th style="padding:6px 10px;text-align:center;font-size:10px;font-weight:800;color:#2d2080;text-transform:uppercase;width:7%">QTY</th>
              <th style="padding:6px 10px;text-align:center;font-size:10px;font-weight:800;color:#2d2080;text-transform:uppercase;width:8%">Unit</th>
              <th style="padding:6px 10px;text-align:right;font-size:10px;font-weight:800;color:#2d2080;text-transform:uppercase;width:14%">Unit Price</th>
              <th style="padding:6px 10px;text-align:center;font-size:10px;font-weight:800;color:#2d2080;text-transform:uppercase;width:8%">Disc%</th>
              <th style="padding:6px 10px;text-align:center;font-size:10px;font-weight:800;color:#2d2080;text-transform:uppercase;width:8%">VAT%</th>
              <th style="padding:6px 10px;text-align:right;font-size:10px;font-weight:800;color:#2d2080;text-transform:uppercase;width:17%">Amount</th>
            </tr></thead>
            <tbody>
              ${lineRows}${notesRow}${payNotes}
              <tr style="background:#f8faff"><td colspan="6" style="padding:6px 10px;text-align:right;font-size:11px;color:#555;font-weight:600">Subtotal</td><td style="padding:6px 10px;text-align:right;font-size:11px;font-weight:700">${fmt(inv.subtotal||0)}</td></tr>
              ${(inv.vatTotal||0)>0?`<tr style="background:#f8faff"><td colspan="6" style="padding:3px 10px;text-align:right;font-size:10px;color:#555">VAT (${inv.vatOverride||0}%)</td><td style="padding:3px 10px;text-align:right;font-size:10px;color:#555">${fmt(inv.vatTotal||0)}</td></tr>`:""}
              ${(inv.globalDisc||0)>0?`<tr style="background:#f8faff"><td colspan="6" style="padding:3px 10px;text-align:right;font-size:10px;color:#c00">Discount (${inv.discount||0}%)</td><td style="padding:3px 10px;text-align:right;font-size:10px;color:#c00">-${fmt(inv.globalDisc||0)}</td></tr>`:""}
              ${(inv.ewtAmt||0)>0?`<tr style="background:#f8faff"><td colspan="6" style="padding:3px 10px;text-align:right;font-size:10px;color:#c00">EWT (${inv.ewtPct||0}%)</td><td style="padding:3px 10px;text-align:right;font-size:10px;color:#c00">-${fmt(inv.ewtAmt||0)}</td></tr>`:""}
              <tr style="background:#2d2080"><td colspan="6" style="padding:8px 10px;text-align:right;font-size:12px;font-weight:900;color:#fff">TOTAL DUE</td><td style="padding:8px 10px;text-align:right;font-size:13px;font-weight:900;color:#00c4d4">${fmt(inv.total||0)}</td></tr>
              ${outstandingRow}
            </tbody>
          </table>
        </div>`;
      }).join("");
      const grandTotal = soaInvs.reduce((s,i)=>s+(i.total||0),0);
      const grandPaid  = payments.filter(p=>soaInvs.some(i=>i.invoiceNo===p.invoiceNo)).reduce((s,p)=>s+(p.amount||0),0);
      const grandBal   = soaInvs.reduce((s,inv)=>{const p=payments.filter(x=>x.invoiceNo===inv.invoiceNo).reduce((a,x)=>a+(x.amount||0),0);return s+Math.max(0,(inv.total||0)-p);},0);
      const overdueAmt = soaInvs.filter(i=>i.status==="Unpaid"&&i.dueDate&&new Date(i.dueDate)<new Date()).reduce((s,i)=>s+(i.total||0),0);
      const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"/><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Arial',sans-serif;background:#fff;color:#111;padding:24px 28px;max-width:860px;margin:0 auto}@page{margin:12mm}@media print{body{padding:0}}</style></head><body>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;border-bottom:4px solid #2d2080;padding-bottom:16px;margin-bottom:20px">
        <div style="display:flex;align-items:center;gap:14px">${co.logo?`<img src="${co.logo}" style="height:56px;object-fit:contain"/>`:""}<div><div style="font-size:22px;font-weight:900;color:#2d2080;letter-spacing:2px">${co.name||"BREEKS"}</div><div style="font-size:9px;font-weight:700;color:#00c4d4;letter-spacing:3px;text-transform:uppercase;margin-top:2px">${co.tagline||"Digital Marketing Services"}</div><div style="font-size:10px;color:#555;margin-top:4px;line-height:1.7">${co.address||""}<br/>${co.phone||""}${co.email?" · "+co.email:""}</div></div></div>
        <div style="text-align:right"><div style="background:#2d2080;color:#fff;font-size:18px;font-weight:900;padding:8px 20px;border-radius:6px;letter-spacing:3px">STATEMENT</div><div style="font-size:10px;color:#555;margin-top:8px;line-height:1.9">Date: <b>${new Date().toLocaleDateString("en-PH",{day:"2-digit",month:"short",year:"numeric"})}</b><br/>Period: <b>${soaMonth==="All"?"All Time":soaMonth}</b></div></div>
      </div>
      <div style="background:#eeedf8;border-radius:8px;padding:12px 16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
        <div><div style="font-size:9px;font-weight:800;color:#2d2080;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Client</div><div style="font-size:16px;font-weight:900;color:#2d2080">${soaClient.name}</div>${soaClient.contact?`<div style="font-size:11px;color:#333;margin-top:2px">${soaClient.contact}</div>`:""}${soaClient.phone?`<div style="font-size:11px;color:#555">${soaClient.phone}</div>`:""}${soaClient.address?`<div style="font-size:11px;color:#555">${soaClient.address}</div>`:""}${soaClient.tin?`<div style="font-size:11px;color:#2d2080;font-weight:700">TIN: ${soaClient.tin}</div>`:""}</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <div style="border:1px solid #c7c4e8;border-radius:8px;padding:10px 14px;min-width:100px;text-align:right"><div style="font-size:9px;color:#555;font-weight:700;text-transform:uppercase">Total Billed</div><div style="font-size:16px;font-weight:900;color:#2d2080;margin-top:2px">₱${Number(grandTotal).toLocaleString("en-PH",{minimumFractionDigits:2})}</div></div>
          <div style="border:1px solid #86efac;border-radius:8px;padding:10px 14px;min-width:100px;text-align:right;background:#f0fdf4"><div style="font-size:9px;color:#166534;font-weight:700;text-transform:uppercase">Collected</div><div style="font-size:16px;font-weight:900;color:#166534;margin-top:2px">₱${Number(grandPaid).toLocaleString("en-PH",{minimumFractionDigits:2})}</div></div>
          <div style="border:1px solid #fde68a;border-radius:8px;padding:10px 14px;min-width:100px;text-align:right;background:#fefce8"><div style="font-size:9px;color:#b45309;font-weight:700;text-transform:uppercase">Balance Due</div><div style="font-size:16px;font-weight:900;color:#d97706;margin-top:2px">₱${Number(grandBal).toLocaleString("en-PH",{minimumFractionDigits:2})}</div></div>
          ${overdueAmt>0?`<div style="border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;min-width:100px;text-align:right;background:#fef2f2"><div style="font-size:9px;color:#dc2626;font-weight:700;text-transform:uppercase">Overdue</div><div style="font-size:16px;font-weight:900;color:#dc2626;margin-top:2px">₱${Number(overdueAmt).toLocaleString("en-PH",{minimumFractionDigits:2})}</div></div>`:""}
        </div>
      </div>
      <div style="font-size:13px;font-weight:900;color:#2d2080;text-transform:uppercase;letter-spacing:2px;border-left:4px solid #2d2080;padding-left:10px;margin-bottom:16px">INVOICE DETAILS</div>
      ${invRows}
      <div style="border:1.5px solid #2d2080;border-radius:8px;overflow:hidden;margin-top:8px">
        <div style="background:#2d2080;color:#fff;padding:8px 16px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px">Summary — ${soaInvs.length} Invoice${soaInvs.length!==1?"s":""}</div>
        <div style="display:flex;flex-wrap:wrap">
          <div style="flex:1;min-width:100px;padding:10px 16px;border-right:1px solid #e2e8f0;text-align:center"><div style="font-size:9px;color:#555;font-weight:700;text-transform:uppercase">Total Billed</div><div style="font-size:17px;font-weight:900;color:#2d2080;margin-top:2px">₱${Number(grandTotal).toLocaleString("en-PH",{minimumFractionDigits:2})}</div></div>
          <div style="flex:1;min-width:100px;padding:10px 16px;border-right:1px solid #e2e8f0;text-align:center"><div style="font-size:9px;color:#166534;font-weight:700;text-transform:uppercase">Collected</div><div style="font-size:17px;font-weight:900;color:#16a34a;margin-top:2px">₱${Number(grandPaid).toLocaleString("en-PH",{minimumFractionDigits:2})}</div></div>
          <div style="flex:1;min-width:100px;padding:10px 16px;${overdueAmt>0?"border-right:1px solid #e2e8f0;":""}text-align:center"><div style="font-size:9px;color:#b45309;font-weight:700;text-transform:uppercase">Balance Due</div><div style="font-size:17px;font-weight:900;color:#d97706;margin-top:2px">₱${Number(grandBal).toLocaleString("en-PH",{minimumFractionDigits:2})}</div></div>
          ${overdueAmt>0?`<div style="flex:1;min-width:100px;padding:10px 16px;text-align:center;background:#fef2f2"><div style="font-size:9px;color:#dc2626;font-weight:700;text-transform:uppercase">Overdue</div><div style="font-size:17px;font-weight:900;color:#dc2626;margin-top:2px">₱${Number(overdueAmt).toLocaleString("en-PH",{minimumFractionDigits:2})}</div></div>`:""}
        </div>
      </div>
      <div style="margin-top:28px;border-top:1px solid #ccc;padding-top:14px;display:flex;justify-content:space-between;font-size:11px;color:#555">
        <div style="text-align:center;min-width:180px"><div style="border-bottom:1px solid #2d2080;height:28px;margin-bottom:6px"></div><div style="font-size:10px;font-weight:700;color:#2d2080">Prepared by</div><div style="font-size:10px;color:#555;margin-top:2px">${co.name||"Breeks Digital"}</div></div>
        <div style="text-align:center;min-width:180px"><div style="border-bottom:1px solid #555;height:28px;margin-bottom:6px"></div><div style="font-size:10px;font-weight:700">Received by</div><div style="font-size:10px;color:#555;margin-top:2px">Date: ________________</div></div>
      </div>
      <div style="text-align:center;margin-top:14px;font-size:9px;color:#aaa">Computer-generated Statement of Account · ${co.name||"Breeks Digital Marketing Services"} · ${new Date().toLocaleDateString("en-PH",{day:"2-digit",month:"short",year:"numeric"})}</div>
      </body></html>`;
      const w = window.open("","_blank");
      w.document.write(html);
      w.document.close();
      setTimeout(()=>w.print(),600);
    };

    return (
      <div style={{minHeight:"100vh",background:"var(--brand-bg)"}}>
        {badge&&<div className="save-badge">✅ Saved</div>}
        {syncStatus&&<div className={`sync-indicator sync-${syncStatus}`}>{syncStatus==='saving'?'☁️ Saving...':syncStatus==='saved'?'✅ Saved to Drive':'❌ Sync Error'}</div>}

        {/* Header */}
        <div style={{background:"linear-gradient(135deg,var(--brand-purple-dark),var(--brand-purple))",padding:"12px 20px",display:"flex",alignItems:"center",gap:12,borderBottom:"2px solid var(--brand-cyan)",flexWrap:"wrap"}}>
          <button onClick={()=>setView("history")} className="nav-btn" style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",color:"#fff",borderRadius:7,padding:"7px 14px",fontWeight:700,fontSize:13}}>← History</button>
          <button onClick={()=>setView("pos")} className="nav-btn" style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",color:"#fff",borderRadius:7,padding:"7px 14px",fontWeight:700,fontSize:13}}>🧾 POS</button>
          <div style={{fontWeight:800,fontSize:16,color:"#fff"}}>📒 Client Ledger</div>
          <div style={{marginLeft:"auto",display:"flex",gap:16,fontSize:11}}>
            <span style={{color:"var(--brand-muted)"}}>Outstanding: <b style={{color:"#f59e0b",fontSize:13}}>{peso(totalOutstanding)}</b></span>
            <span style={{color:"var(--brand-muted)"}}>Collected: <b style={{color:"#22c55e",fontSize:13}}>{peso(totalCollected)}</b></span>
          </div>
        </div>

        <div style={{display:"flex",height:"calc(100vh - 56px)",overflow:"hidden"}}>
          {/* ── Left: Client list ── */}
          <div style={{width:280,flexShrink:0,borderRight:"2px solid var(--brand-border)",display:"flex",flexDirection:"column",background:"var(--brand-surface)"}}>
            <div style={{padding:"10px 12px"}}>
              <input value={ledgerSearch} onChange={e=>setLedgerSearch(e.target.value)} placeholder="🔍 Search client…" style={{width:"100%",padding:"7px 10px",background:"var(--brand-bg)",border:"1px solid var(--brand-border)",borderRadius:7,color:"var(--brand-text)",fontSize:12,outline:"none",boxSizing:"border-box"}}/>
            </div>
            <div style={{flex:1,overflowY:"auto"}}>
              {filtered.length===0&&<div style={{padding:20,color:"var(--brand-muted)",fontSize:12,textAlign:"center"}}>No clients with invoices yet.</div>}
              {filtered.map(c=>(
                <div key={c.id} onClick={()=>{setLedgerClient(c);setSoaMonth("All");}}
                  style={{padding:"12px 14px",borderBottom:"1px solid var(--brand-border)",cursor:"pointer",background:ledgerClient?.id===c.id?"rgba(0,196,212,0.12)":"transparent",borderLeft:ledgerClient?.id===c.id?"3px solid var(--brand-cyan)":"3px solid transparent",transition:"all 0.1s"}}>                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:12,color:"#f1f5f9",display:"flex",alignItems:"center",gap:5}}>
                        {c.overdue&&<span style={{color:"#ef4444",fontSize:9}}>⚠</span>}
                        <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</span>
                      </div>
                      <div style={{fontSize:10,color:"var(--brand-muted)",marginTop:1}}>{c.invoices} invoice{c.invoices!==1?"s":""}</div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0,marginLeft:6}}>
                      <div style={{fontSize:12,fontWeight:800,color:c.balance>0?"#f59e0b":"#22c55e"}}>{peso(c.balance)}</div>
                      <div style={{fontSize:9,color:"var(--brand-muted)"}}>balance</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* ── Right: Client detail + SOA ── */}
          <div style={{flex:1,overflowY:"auto",padding:20,background:"var(--brand-bg)"}}>
            {!ledgerClient ? (
              <div style={{textAlign:"center",padding:80,color:"var(--brand-muted)"}}>
                <div style={{fontSize:48,marginBottom:12}}>📒</div>
                <div style={{fontSize:15,fontWeight:700}}>Select a client to view their ledger & generate SOA</div>
              </div>
            ) : (() => {
              const c = soaClient;
              if(!c) return null;
              const runningBal = [...c.cInvs].reverse().reduce((acc,inv,i)=>{
                const pAmt = payments.filter(p=>p.invoiceNo===inv.invoiceNo).reduce((s,p)=>s+(p.amount||0),0);
                const prev = i===0?0:acc[i-1].runBal;
                acc.push({inv, pAmt, runBal: prev + (inv.total||0) - pAmt});
                return acc;
              },[]).reverse();

              return (
                <div>
                  {/* Client card */}
                  <div style={{background:"var(--brand-surface)",borderRadius:12,border:"1px solid var(--brand-border)",padding:"16px 20px",marginBottom:20,display:"flex",gap:20,flexWrap:"wrap",alignItems:"flex-start"}}>
                    <div style={{flex:1,minWidth:200}}>
                      <div style={{fontWeight:900,fontSize:18,color:"var(--brand-cyan)",marginBottom:2}}>{c.name}</div>
                      {c.contact&&<div style={{fontSize:12,color:"#94a3b8"}}>{c.contact}</div>}
                      {c.phone&&<div style={{fontSize:12,color:"#94a3b8"}}>{c.phone}</div>}
                      {c.address&&<div style={{fontSize:11,color:"#64748b"}}>{c.address}</div>}
                      {c.tin&&<div style={{fontSize:11,color:"#94a3b8"}}>TIN: {c.tin}</div>}
                    </div>
                    <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                      {[["Total Billed",c.total,"var(--brand-cyan)"],["Collected",c.paid,"#22c55e"],["Balance Due",c.balance,c.balance>0?"#f59e0b":"#22c55e"]].map(([lbl,val,col])=>(
                        <div key={lbl} style={{background:"var(--brand-bg)",borderRadius:8,padding:"10px 14px",minWidth:110,textAlign:"right"}}>
                          <div style={{fontSize:9,color:"var(--brand-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>{lbl}</div>
                          <div style={{fontSize:17,fontWeight:900,color:col,marginTop:3}}>{peso(val)}</div>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* SOA controls */}
                  <div style={{display:"flex",gap:10,marginBottom:16,alignItems:"center",flexWrap:"wrap"}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",flex:1}}>Statement of Account</div>
                    <select value={soaMonth} onChange={e=>setSoaMonth(e.target.value)} style={{padding:"7px 10px",background:"var(--brand-surface)",border:"1px solid var(--brand-border)",borderRadius:7,color:"var(--brand-text)",fontSize:12,outline:"none",cursor:"pointer"}}>
                      {months.map(m=><option key={m} value={m}>{m==="All"?"All Time":m}</option>)}
                    </select>
                    <button onClick={generateSOA} style={{padding:"8px 16px",background:"linear-gradient(135deg,#2d2080,#3a2db5)",border:"none",borderRadius:7,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:12}}>🖨️ Print / Download SOA</button>
                  </div>

                  {/* Ledger table */}
                  <div style={{background:"var(--brand-surface)",borderRadius:12,border:"1px solid var(--brand-border)",overflow:"hidden"}}>
                    <div style={{display:"grid",gridTemplateColumns:"120px 1fr 100px 100px 100px 80px 90px",padding:"8px 12px",background:"var(--brand-surface2)",fontSize:10,fontWeight:700,color:"var(--brand-muted)",textTransform:"uppercase",letterSpacing:0.5,gap:4}}>
                      <span>Invoice</span><span>Date / Due</span><span style={{textAlign:"right"}}>Amount</span><span style={{textAlign:"right"}}>Paid</span><span style={{textAlign:"right"}}>Balance</span><span style={{textAlign:"center"}}>Status</span><span></span>
                    </div>
                    {runningBal.length===0&&<div style={{padding:24,color:"var(--brand-muted)",textAlign:"center",fontSize:12}}>No invoices for this period.</div>}
                    {runningBal.filter(({inv})=>soaMonth==="All"||new Date(inv.date).toLocaleDateString("en-PH",{month:"short",year:"numeric"})===soaMonth).map(({inv,pAmt,runBal},i)=>{
                      const bal  = (inv.total||0)-pAmt;
                      const over = inv.status==="Unpaid"&&inv.dueDate&&new Date(inv.dueDate)<new Date();
                      const sc   = {Paid:"#22c55e",Unpaid:"#f59e0b",VOID:"#ef4444"}[inv.status]||"#64748b";
                      return (
                        <div key={inv.invoiceNo} style={{display:"grid",gridTemplateColumns:"120px 1fr 100px 100px 100px 80px 90px",padding:"10px 12px",borderTop:"1px solid var(--brand-border)",background:i%2===0?"transparent":"rgba(255,255,255,0.02)",alignItems:"center",gap:4}}>
                          <div style={{fontWeight:700,fontSize:12,color:"var(--brand-cyan)"}}>{inv.invoiceNo}</div>
                          <div>
                            <div style={{fontSize:11,color:"#94a3b8"}}>{fmtDate(inv.date)}</div>
                            {inv.dueDate&&<div style={{fontSize:10,color:over?"#ef4444":"#64748b"}}>Due: {fmtDate(inv.dueDate)}{over?" ⚠":""}</div>}
                          </div>
                          <div style={{textAlign:"right",fontWeight:700,fontSize:12,color:"#f1f5f9"}}>{peso(inv.total)}</div>
                          <div style={{textAlign:"right",fontWeight:700,fontSize:12,color:"#22c55e"}}>{pAmt>0?peso(pAmt):"—"}</div>
                          <div style={{textAlign:"right",fontWeight:700,fontSize:12,color:bal>0?"#f59e0b":"#22c55e"}}>{peso(bal)}</div>
                          <div style={{textAlign:"center"}}><span style={{fontSize:9,padding:"2px 6px",borderRadius:8,fontWeight:700,background:sc+"22",color:sc}}>{inv.status}</span></div>
                          <div style={{display:"flex",gap:4,justifyContent:"center"}}>
